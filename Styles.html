<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zilla+Slab:wght@400;500;600;700&family=Roboto+Serif:opsz,wght@8..144,400;8..144,600&family=Barlow:wght@400;500;600;700&family=Exo+2:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap');
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --radius: 18px;
      --hover: #f8fafc;
      --success: #065f46;
      --success-bg: #d1fae5;
      --warn: #92400e;
      --warn-bg: #fef3c7;
      --info: #1e3a8a;
      --info-bg: #dbeafe;
      --idea: #5b21b6;
      --idea-bg: #ede9fe;
      --high: #9f1239;
      --high-bg: #ffe4e6;
      --medium: #9a3412;
      --medium-bg: #ffedd5;
      --low: #334155;
      --low-bg: #e2e8f0;
      --overlay: rgba(15, 23, 42, 0.45);
      --image-in-use-glow-rgb: 74, 222, 128;
      --image-in-use-glow-opacity: 0.22;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    body {
      min-height: 100vh;
    }

    body.modal-open {
      overflow: auto;
    }

    .app {
      width: 100%;
      max-width: 100%;
      margin: 0;
      padding: 16px 18px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      font-weight: 700;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 400px minmax(820px, 1fr) 520px;
      gap: 16px;
      height: calc(100vh - 100px);
    }

    .sidebar {
      min-width: 400px;
      display: flex;
      flex-direction: column;
      padding: 0;
      position: relative;
      overflow: visible;
    }

    .sidebar-scroll-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
    }

    body.resources-mode .details {
      visibility: visible;
      pointer-events: auto;
    }

    #resourceInspectorPanel[hidden],
    #projectInspectorPanel[hidden],
    #seriesKnowledgeFormsPanel[hidden],
    #writingInspectorPanel[hidden],
    #resourceTreePanel[hidden],
    #writingCodexPanel[hidden],
    #planInfoPanelSidebar[hidden],
    #searchPanelContent[hidden] {
      display: none !important;
    }

    body.resources-mode #projectInspectorPanel,
    body.resources-mode #seriesKnowledgeFormsPanel {
      display: none !important;
    }

    body:not(.resources-mode) #resourceInspectorPanel {
      display: none !important;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    main.panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-tab-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .main-tab-content[hidden] {
      display: none;
    }

    .landing-dashboard,
    .publishing-dashboard,
    .marketing-dashboard {
      display: grid;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.02), rgba(15, 23, 42, 0)),
        var(--panel);
    }

    .landing-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(320px, 0.9fr);
      gap: 8px;
      align-items: stretch;
    }

    .landing-kicker {
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7c3aed;
    }

    .landing-hero-copy {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.08), rgba(59, 130, 246, 0.04));
    }

    .landing-hero-copy h2 {
      margin: 0 0 4px;
      font-size: 19px;
      line-height: 1.04;
    }

    .landing-hero-copy p {
      margin: 0;
      max-width: 64ch;
      font-size: 11px;
      line-height: 1.32;
    }

    .landing-hero-stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .landing-stat-card {
      display: grid;
      gap: 3px;
      align-content: start;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      min-height: 68px;
    }

    .landing-stat-card .label {
      margin: 0;
    }

    .landing-stat-value {
      font-size: 21px;
      line-height: 1;
      font-weight: 700;
    }

    .landing-stat-note {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
    }

    .landing-board {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .landing-board-column,
    .landing-resource-panel,
    .landing-series-section,
    .timeline-section {
      display: grid;
      gap: 6px;
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      min-width: 0;
    }

    .landing-resource-panel {
      gap: 4px;
      padding: 7px 9px;
      align-content: start;
    }


    .timeline-card-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
    }

    .timeline-filters {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .timeline-filters select {
      font-size: 12px;
      padding: 3px 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      max-width: 200px;
    }

    .timeline-ghost-toggle {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      user-select: none;
      margin-left: auto;
    }

    .timeline-ghost-toggle input {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #6366f1;
    }

    .timeline-ghost-toggle .timeline-ghost-slider {
      white-space: nowrap;
    }

    .timeline-event.is-ghost {
      opacity: 0.3;
      pointer-events: none;
    }

    .timeline-month-card {
      flex: 0 0 260px;
      display: grid;
      gap: 6px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      scroll-snap-align: start;
      align-content: start;
    }

    .timeline-month-card:first-child {
      margin-left: 0;
    }

    .timeline-month-label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    .timeline-event {
      display: grid;
      gap: 2px;
      padding: 5px 7px;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.25;
      cursor: default;
    }

    .timeline-event.is-release {
      background: #ede9fe;
      border-left: 3px solid #7c3aed;
    }

    .timeline-event.is-milestone {
      background: #e0f2fe;
      border-left: 3px solid #0284c7;
    }

    .timeline-event.is-campaign {
      background: #fce7f3;
      border-left: 3px solid #db2777;
    }

    .timeline-event-title {
      font-weight: 600;
    }

    .timeline-event-date {
      font-size: 10px;
      color: var(--muted);
    }

    .timeline-event-ghost-line {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timeline-event.is-ghost {
      opacity: 0.3;
      pointer-events: none;
      padding: 2px 8px;
    }

    .landing-section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .landing-series-heading {
      align-items: center;
      gap: 12px;
    }

    .landing-series-heading-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .landing-section-heading strong {
      font-size: 15px;
    }

    .landing-task-list,
    .landing-quick-access {
      display: grid;
      gap: 6px;
    }

    .landing-task-card,
    .landing-access-card {
      display: grid;
      gap: 4px;
      padding: 8px 9px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
      min-width: 0;
    }

    .landing-task-card {
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      text-align: left;
    }

    .landing-task-thumb {
      width: 38px;
      height: 54px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #e2e8f0;
      flex-shrink: 0;
    }

    .landing-task-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: transparent;
    }

    .landing-task-body {
      display: grid;
      gap: 4px;
      min-width: 0;
      align-content: start;
    }

    .landing-task-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .landing-task-card-title {
      font-weight: 700;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .landing-task-card-title.is-compact-title {
      font-size: 11px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .landing-task-card-meta,
    .landing-selected-meta,
    .landing-series-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .landing-task-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .landing-task-card-step {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 11px;
      line-height: 1.3;
    }

    .landing-series-deck {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 172px;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
      scroll-snap-type: x proximity;
    }

    .landing-series-deck::-webkit-scrollbar {
      display: none;
    }

    .landing-series-card {
      display: grid;
      grid-template-rows: auto 198px;
      gap: 4px;
      padding: 6px 5px 5px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.96));
      min-height: 236px;
      text-align: center;
      scroll-snap-align: start;
    }

    .landing-series-card.is-active {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.14);
    }

    .landing-series-cover {
      width: min(132px, 100%);
      height: 198px;
      justify-self: center;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #e2e8f0;
    }

    .landing-series-cover img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: transparent;
    }

    .landing-series-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
      align-content: start;
      justify-items: center;
    }

    .landing-series-title {
      font-size: 11px;
      font-weight: 700;
      overflow-wrap: anywhere;
      text-align: center;
      line-height: 1.12;
      min-height: 1.9em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .landing-series-meta {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      text-align: center;
    }

    .landing-series-pills {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .landing-series-alpha {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 3px;
      min-width: 0;
    }

    .landing-series-alpha-button {
      min-width: 24px;
      min-height: 22px;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 10px;
      line-height: 1;
      background: #1f2937;
      border-color: #1f2937;
      color: #f8fafc;
    }

    .landing-series-alpha-button:hover {
      background: #111827;
      border-color: #111827;
    }

    .landing-series-alpha-button.is-active {
      background: #ff6b57;
      border-color: #ff6b57;
      color: #ffffff;
    }

    .landing-series-alpha-button.is-empty,
    .landing-series-alpha-button:disabled {
      opacity: 0.28;
      cursor: default;
    }

    .landing-resource-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
      gap: 10px;
    }

    .landing-selected-project {
      display: grid;
      align-content: start;
      min-width: 0;
    }

    .landing-quick-access {
      align-content: start;
    }

    .landing-resource-buttons {
      display: none;
    }

    .landing-resource-button {
      width: auto;
      min-width: 0;
      padding: 8px 11px;
      font-size: 12px;
    }

    .landing-empty {
      padding: 10px 11px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      background: #f8fafc;
    }

    .details {
      padding: 16px;
    }

    #mainTabContentPlan {
      display: flex;
      flex-direction: column;
    }

    .plan-panel {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .details-error-log-panel {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }

    .details-error-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .details-error-log-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .details-error-log-full-btn {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .details-error-log-full-btn:hover {
      background: var(--hover);
      color: var(--text);
    }

    .details-error-log-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 4px 0;
    }

    .details-error-log-entry {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 12px;
      font-size: 11px;
      line-height: 1.4;
      border-bottom: 1px solid transparent;
    }

    .details-error-log-entry:last-child {
      border-bottom: 0;
    }

    .details-error-log-entry-time {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 10px;
      min-width: 48px;
    }

    .details-error-log-entry-message {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .details-error-log-entry.mode-ok .details-error-log-entry-message { color: #16a34a; }
    .details-error-log-entry.mode-warn .details-error-log-entry-message { color: #d97706; }
    .details-error-log-entry.mode-error .details-error-log-entry-message { color: #dc2626; }

    body.dark-mode .details-error-log-entry.mode-ok .details-error-log-entry-message { color: #4ade80; }
    body.dark-mode .details-error-log-entry.mode-warn .details-error-log-entry-message { color: #fbbf24; }
    body.dark-mode .details-error-log-entry.mode-error .details-error-log-entry-message { color: #f87171; }

    .sidebar-bottom-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 50px;
      padding: 0 12px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }

    .sidebar-avatar-btn {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 2px solid var(--muted);
      border-radius: 999px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
    }

    .sidebar-avatar-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .sidebar-avatar-btn[aria-expanded="true"] {
      border-color: #ff6b57;
      box-shadow: 0 0 0 3px rgba(255, 107, 87, 0.16);
    }

    .sidebar-avatar-icon {
      width: 18px;
      height: 18px;
    }

    .sidebar-toolbar-divider {
      width: 1px;
      height: 24px;
      background: var(--border);
      flex-shrink: 0;
    }

    .sidebar-toolbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .sidebar-toolbar-pill {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
      white-space: nowrap;
      line-height: 1;
    }

    .sidebar-account-popover {
      position: absolute;
      left: 12px;
      bottom: 60px;
      width: calc(60% - 12px);
      max-height: calc(100vh - 180px);
      overflow-y: auto;
      z-index: 950;
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--panel);
      box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.12);
      visibility: hidden;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 140ms ease, transform 140ms ease, visibility 140ms ease;
      pointer-events: none;
    }

    .sidebar-account-popover.is-open {
      visibility: visible !important;
      opacity: 1 !important;
      transform: translateY(0) !important;
      pointer-events: auto !important;
    }

    .sidebar-ai-btn {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg);
      color: var(--muted);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }
    .sidebar-ai-btn-timer {
      position: absolute;
      top: -2px;
      left: -2px;
    }
    .sidebar-ai-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }
    .sidebar-ai-btn[aria-expanded="true"] {
      border-color: #ff6b57;
      color: #ff6b57;
    }
    .sidebar-ai-btn svg {
      width: 14px;
      height: 14px;
    }

    .sidebar-ai-popover {
      position: absolute;
      right: 12px;
      bottom: 60px;
      width: calc(60% - 12px);
      max-height: calc(100vh - 180px);
      overflow-y: auto;
      z-index: 950;
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--panel);
      box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.12);
      visibility: hidden;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 140ms ease, transform 140ms ease, visibility 140ms ease;
      pointer-events: none;
    }
    .sidebar-ai-popover.is-open {
      visibility: visible !important;
      opacity: 1 !important;
      transform: translateY(0) !important;
      pointer-events: auto !important;
    }
    body.dark-mode .sidebar-ai-popover {
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.36);
    }

    .sidebar-popover-trial {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 30px;
      margin: 8px 6px 10px;
      border-radius: 8px;
      background: #451a03;
      color: #fdba74;
      font-size: 12px;
      font-weight: 700;
    }

    body:not(.dark-mode) .sidebar-popover-trial {
      background: #ffedd5;
      color: #9a3412;
    }

    .sidebar-popover-summary {
      padding: 0 14px 12px;
    }

    .sidebar-popover-name {
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
    }

    .sidebar-popover-email {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
    }

    .sidebar-popover-theme-row {
      display: flex;

      font-size: 13px;
      font-weight: 600;

    .sidebar-popover-icon {

      align-content: start;

      height: 100%;
      min-height: 0;
      overflow: hidden;

      gap: 4px;

      font-size: 18px;
      line-height: 1.15;

      gap: 12px;
      min-height: 0;
      flex: 1;

    }

    .resource-inspector-toolbar {
      display: flex;
      gap: 8px;
      align-items: end;
      flex-wrap: wrap;

      gap: 4px;

      padding-bottom: 6px;

      border-radius: 12px;

      min-height: 30px;

      font-weight: 700;

      color: #a5a5ad;

      padding: 3px 8px;
      border: none;
      border-radius: 0;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.2;
      background: transparent;
      color: #777884;
      cursor: pointer;
      position: relative;

    .writing-codex-filter.is-active {
      color: #a5a5ad;
      font-weight: 600;

    .writing-codex-filter.is-active::after {
      content: "";
      position: absolute;
      bottom: -1px;
      left: 4px;

      height: 2px;
      background: #7fa7d9;

      text-transform: uppercase;

      font-size: 10px;

      justify-content: center;

      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;

    .plan-editor-area {

    .plan-outline-grid {

      padding-left: 0;
      padding-right: 0;
      padding-bottom: 0;
      border-top: 1px solid var(--border);
      border-left: 0;
      border-right: 0;
      border-bottom: 0;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-align: left;
      cursor: pointer;
    }

    .links-section-heading:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .links-section-heading:hover {
      color: var(--text);
      background: transparent;
    }

    .links-section-toggle {
      font-size: 14px;
      line-height: 1;
      opacity: 0.75;
    }

    .links-section-heading[aria-expanded="true"] .links-section-toggle::before {
      content: "-";
    }

    .links-section-heading[aria-expanded="false"] .links-section-toggle::before {
      content: "+";
    }

    .links-section-body {
      display: grid;
      gap: 9px;
      grid-column: 1 / -1;
    }

    .links-section-body[hidden] {
      display: none !important;
    }

    .toolbar-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-width: 0;
    }

    .toolbar-row.quad {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    .toolbar-row.quint {
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    }

    .toolbar-row.trio {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .toolbar-row.six {
      grid-template-columns: repeat(6, 1fr);
    }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .toggle-button {
      padding: 6px 10px;
      font-size: 12px;
    }

    .collapsible {
      overflow: auto;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease;
      max-height: min(52vh, 560px);
      opacity: 1;
      margin-top: 8px;
      padding-right: 4px;
      overscroll-behavior: contain;
    }

    .collapsible.is-collapsed {
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      overflow: hidden;
      padding-right: 0;
      pointer-events: none;
    }

    .doc-links {
      display: grid;
      gap: 8px;
    }

    .doc-links a {
      display: block;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      text-decoration: none;
      color: var(--text);
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .doc-links a:hover {
      background: #eef2ff;
    }

    .doc-link-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 6px;
      align-items: end;
    }

    .legacy-workspace-actions {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      justify-content: flex-start;
      margin-top: -2px;
      margin-bottom: 4px;
    }

    .legacy-links-note {
      grid-column: 1 / -1;
      color: var(--muted);
      line-height: 1.4;
      margin-top: -2px;
      margin-bottom: 2px;
    }

    .legacy-workspace-actions button {
      padding: 7px 10px;
      font-size: 11px;
    }

    #linksPanel .doc-link-row,
    #linksPanel .links-section-heading[data-link-section="edit"],
    #linksPanel .links-section-heading[data-link-section="series"] {
      display: none !important;
    }

    .doc-link-row .label {
      margin-bottom: 4px;
    }

    .doc-link-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-bottom: 1px;
    }

    .doc-link-actions button,
    .doc-markdown-button,
    .doc-open-button,
    .doc-change-button,
    .doc-create-button {
      white-space: nowrap;
      padding: 7px 9px;
      font-size: 11px;
    }

    #linksPanel .doc-open-button,
    #linksPanel .doc-change-button,
    #linksPanel .doc-create-button {
      opacity: 0.92;
    }

    .doc-create-button {
      background: #ecfdf5;
      color: #166534;
      border-color: #bbf7d0;
    }

    .image-link-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .image-link-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-bottom: 1px;
    }

    .image-link-actions button {
      white-space: nowrap;
      padding: 8px 10px;
      font-size: 12px;
    }

    .series-owned-panel {
      display: grid;
      gap: 9px;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid color-mix(in srgb, var(--border) 86%, transparent);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel) 82%, var(--card) 18%);
    }

    .series-owned-panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .series-owned-panel-title {
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .series-owned-panel-copy,
    .series-owned-note,
    .series-owned-summary-preview {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .series-owned-summary-preview {
      padding: 8px 10px;
      border: 1px solid color-mix(in srgb, var(--border) 88%, transparent);
      border-radius: 10px;
      background: color-mix(in srgb, var(--card) 88%, transparent);
      min-height: 48px;
      white-space: pre-wrap;
    }

    .series-owned-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .series-owned-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      padding-bottom: 1px;
    }

    .series-owned-actions button,
    .series-link-save-button {
      white-space: nowrap;
      padding: 7px 10px;
      font-size: 11px;
    }

    .image-picker-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .image-choice {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fff;
      padding: 8px;
      cursor: pointer;
      text-align: left;
      display: grid;
      gap: 6px;
      min-width: 0;
      align-content: start;
      position: relative;
      overflow: hidden;
    }

    .image-choice-thumb {
      width: 100%;
      height: 180px;
      border-radius: 10px;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .image-choice-thumb img {
      width: 100%;
      height: 100% !important;
      object-fit: contain;
      object-position: center;
    }

    .image-choice:hover,
    .image-choice.is-selected {
      border-color: #6366f1;
      box-shadow: inset 0 0 0 2px rgba(99, 102, 241, 0.22);
    }

    .image-choice.is-in-use::after {
      content: "";
      position: absolute;
      top: 10px;
      right: 10px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(var(--image-in-use-glow-rgb), 1);
      border: 2px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.14);
      pointer-events: none;
      z-index: 2;
    }

    .image-choice.is-in-use.is-selected {
      box-shadow: inset 0 0 0 2px rgba(99, 102, 241, 0.22);
    }

    .image-choice img {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      background: transparent;
      display: block;
    }

    .image-choice-name {
      font-size: 11px;
      color: var(--text);
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .image-picker-hidden-input {
      display: none;
    }

    .link-health-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
      max-width: 100%;
    }

    .link-health-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 400;
      line-height: 1.2;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .link-health-pill.ok {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }

    .link-health-pill.missing {
      background: #ffe4e6;
      border-color: #fda4af;
      color: #9f1239;
    }

    .workspace-complete {
      background: #fee2e2 !important;
      color: #991b1b !important;
      border-color: #fecaca !important;
      cursor: not-allowed;
      opacity: 1 !important;
    }

    .single-markdown-entry {
      min-width: 160px;
    }

    .markdown-doc-control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 28px;
    }

    .markdown-edit-tabs {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      min-width: 0;
    }

    .markdown-edit-tab {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1.1;
      background: #fff;
    }

    .markdown-edit-tab.is-active {
      background: #0f172a;
      border-color: #0f172a;
      color: #fff;
    }

    .markdown-warning {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      max-width: 100%;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid #fde68a;
      background: #fffbeb;
      color: #92400e;
      font-size: 11px;
      line-height: 1.25;
    }

    .status-bar {
      margin-top: 6px;
      min-height: 34px;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      align-items: center;
    }

    .status-bar.ok {
      background: #ecfdf5;
      color: #166534;
      border-color: #bbf7d0;
    }

    .status-bar.error {
      background: #fff1f2;
      color: #be123c;
      border-color: #fecdd3;
    }

    .status-bar.warn {
      background: #fffbeb;
      color: #92400e;
      border-color: #fde68a;
    }

    .status-bar-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      margin-top: 6px;
    }

    .status-bar-row .status-bar {
      margin-top: 0;
      flex: 1;
    }

    .status-log-button {
      width: auto;
      min-width: 92px;
      padding: 8px 12px;
      white-space: nowrap;
      align-self: stretch;
    }

    .empty-state {
      padding: 22px;
      color: var(--muted);
      font-size: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--overlay);
      z-index: 1000;
    }

    .modal.is-open {
      display: flex;
    }

    #aiSettingsModal,
    #aiConnectionTestModal {
      z-index: 1100;
    }

    .modal-card {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
      overflow: hidden;
    }

    .modal-header {
      padding: 16px 18px 10px;
      border-bottom: 1px solid var(--border);
    }

    .modal-header h3 {
      margin: 0 0 4px 0;
      font-size: 17px;
    }

    .modal-body {
      padding: 16px 18px;
      display: grid;
      gap: 12px;
    }

    .modal-footer {
      padding: 14px 18px 18px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    .error-log-modal-card {
      width: min(980px, calc(100vw - 36px));
      max-width: min(980px, calc(100vw - 36px));
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
    }

    .error-log-body {
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .error-log-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .error-log-filters {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .error-log-filter {
      width: auto;
      min-width: 0;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    .error-log-filter.is-active {
      background: #0f172a;
      border-color: #0f172a;
      color: #ffffff;
    }

    .error-log-list {
      min-height: 320px;
      max-height: min(62vh, 680px);
      overflow: auto;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      display: grid;
      gap: 0;
      align-content: start;
    }

    .error-log-entry {
      display: grid;
      grid-template-columns: auto auto minmax(0, 1fr);
      align-items: baseline;
      gap: 10px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: transparent;
    }

    .error-log-entry:last-child {
      border-bottom: none;
    }

    .error-log-entry-title {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .error-log-entry-time {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .error-log-entry-message {
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      overflow-wrap: anywhere;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .error-log-entry.mode-ok {
      color: #166534;
    }

    .error-log-entry.mode-warn {
      color: #92400e;
    }

    .error-log-entry.mode-error {
      color: #be123c;
    }

    .field-error {
      border-color: #e11d48 !important;
      box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.12) !important;
    }

    /* v42 — Stability fix: disable live Markdown source-colour overlay.
       The transparent textarea + highlighted pre overlay could visually desync from the real cursor/typing layer
       after wrapping/scrolling, making edits appear to land several lines away. This restores a normal visible
       textarea while keeping preview, formatting menu, spellcheck, AI test modal, and all editor tools intact. */
    .markdown-editor-highlight {
      display: none !important;
    }

    #markdownEditorTextarea {
      color: var(--text) !important;
      background: #ffffff !important;
      caret-color: var(--text) !important;
      -webkit-text-fill-color: var(--text) !important;

    #markdownEditorTextarea::selection {
      background: rgba(255, 107, 87, 0.24) !important;
      color: var(--text) !important;
      -webkit-text-fill-color: var(--text) !important;
    }

    body.dark-mode #markdownEditorTextarea {
      background: #0f1216 !important;
      color: #e5e7eb !important;
      caret-color: #e5e7eb !important;
      -webkit-text-fill-color: #e5e7eb !important;
    }

    body.dark-mode #markdownEditorTextarea::selection {
      background: rgba(255, 107, 87, 0.32) !important;
      color: #ffffff !important;
      -webkit-text-fill-color: #ffffff !important;
    }

.image-generator-history-item {

.image-generator-history-image {

  object-fit: cover;
  object-position: center;
  border-radius: 6px;
