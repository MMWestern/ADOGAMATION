            var driveFileId = String(row.legacy_drive_file_id || '').trim();

            var thumbnailUrl = thumbnailPath ? baseUrl + thumbnailPath
              : (storagePath ? baseUrl + storagePath

        });
    });

    function _dataUrlToBlob(dataUrl, fallbackMimeType) {
      var raw = String(dataUrl || '');
      var match = raw.match(/^data:([^;]+);base64,(.+)$/);
      if (!match || !match[2]) throw new Error('Image upload data was not in the expected base64 format.');
      var mimeType = String(match[1] || fallbackMimeType || 'image/webp').trim();
      if (mimeType.indexOf('image/') !== 0) throw new Error('Only image files can be uploaded here.');
      var binary = atob(match[2]);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mimeType });
    }

    function _getFileExtension(name, fallback) {
      var m = String(name || '').match(/\.([^.]+)$/);
      return m ? m[1].toLowerCase() : (fallback || 'webp');
    }

    function _sanitizeStorageName(name) {
      return String(name || 'image').replace(/[^a-zA-Z0-9_-]/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '').slice(0, 64) || 'image';
    }

    function _generateStoragePaths(fileName, previewFileName) {
      var now = new Date();
      var stamp = now.getUTCFullYear() + ('0' + (now.getUTCMonth() + 1)).slice(-2) + ('0' + now.getUTCDate()).slice(-2) + '-' +
        ('0' + now.getUTCHours()).slice(-2) + ('0' + now.getUTCMinutes()).slice(-2) + ('0' + now.getUTCSeconds()).slice(-2);
      var token = Math.random().toString(36).slice(2, 12);
      var origExt = _getFileExtension(fileName, 'webp');
      var prevExt = _getFileExtension(previewFileName, 'webp');
      var baseName = _sanitizeStorageName(String(fileName || 'image').replace(/\.[^.]+$/, '')) || 'image';
      var leaf = stamp + '-' + token + '-' + baseName;
      return { originalPath: 'originals/' + leaf + '.' + origExt, thumbnailPath: 'thumbnails/' + leaf + '-thumb.' + prevExt };
    }

    _sbDefine('uploadProjectImageJsonFromClient', function (folderId, fileName, mimeType, dataUrl, previewFileName, previewMimeType, previewDataUrl, generatorSettingsJson) {
      try {
        var originalBlob = _dataUrlToBlob(dataUrl, mimeType);
        var hasPreview = String(previewDataUrl || '').trim();
        var previewBlob = hasPreview ? _dataUrlToBlob(previewDataUrl, previewMimeType || mimeType) : null;
        var paths = _generateStoragePaths(fileName || 'image', previewFileName || fileName || 'image-thumb');
        var safeName = String(fileName || 'project-image').trim() || 'project-image';
        var safeMime = String(mimeType || 'image/webp').trim() || 'image/webp';
        var generatorSettings = {};
        if (generatorSettingsJson != null && String(generatorSettingsJson).trim()) {
          try { generatorSettings = JSON.parse(String(generatorSettingsJson)); } catch (e) { generatorSettings = {}; }
        }
        var bucket = 'project-images';

        var uploadOriginal = sbClient.storage.from(bucket).upload(paths.originalPath, originalBlob, {
          contentType: safeMime, upsert: false
        });

        var uploadThumb = previewBlob
          ? sbClient.storage.from(bucket).upload(paths.thumbnailPath, previewBlob, {
              contentType: String(previewMimeType || safeMime || 'image/webp').trim(), upsert: false
            })
          : Promise.resolve({ data: null, error: null });

        return Promise.all([uploadOriginal, uploadThumb]).then(function (results) {
          if (results[0].error) throw results[0].error;
          if (results[1] && results[1].error) throw results[1].error;
          var insertPayload = {
            storage_path: paths.originalPath,
            thumbnail_path: previewBlob ? paths.thumbnailPath : '',
            file_name: safeName,
            mime_type: safeMime,
            scope: 'library',
            generator_settings: generatorSettings,
            legacy_drive_file_id: '',
            legacy_drive_thumbnail_file_id: '',
            legacy_drive_url: ''
          };
          return sbClient.from('image_assets').insert([insertPayload]).select().single().then(function (res) {
            if (res.error) throw res.error;
            var row = res.data;
            var storagePath = (row.storage_path || '').trim();
            var thumbnailPath = (row.thumbnail_path || '').trim();
            var baseUrl = 'https://bmssizjfkowberhhpyff.supabase.co/storage/v1/object/public/' + bucket + '/';
            return JSON.stringify({
              ok: true, backend: 'supabase', bucket: bucket,
              fileId: String(row.id || ''),
              name: String(row.file_name || ''),
              mimeType: String(row.mime_type || ''),
              url: storagePath ? baseUrl + storagePath : '',
              thumbnailUrl: thumbnailPath ? baseUrl + thumbnailPath : (storagePath ? baseUrl + storagePath : ''),
              thumbnailFileId: thumbnailPath || '',
              generatorSettings: row.generator_settings && typeof row.generator_settings === 'object' ? row.generator_settings : {}
            });
          });
        });
      } catch (e) {
        return Promise.resolve(JSON.stringify({ ok: false, error: e.message || 'uploadProjectImage failed' }));
      }
    });

    _sbDefine('deleteProjectImageJsonFromClient', function (folderId, fileId, thumbnailFileId, imageUrl) {
      try {
        var safeFileId = String(fileId || '').trim();
        var safeImageUrl = String(imageUrl || '').trim();
        if (!safeFileId || !safeImageUrl) throw new Error('File id and image URL are required.');
        return sbClient.from('image_assets').select('*').eq('id', safeFileId).single().then(function (res) {
          if (res.error) throw res.error;
          var row = res.data;
          if (!row) throw new Error('Image asset not found.');
          var bucket = 'project-images';
          var prefixes = [String(row.storage_path || '').trim(), String(row.thumbnail_path || '').trim()].filter(Boolean);
          var delStorage = prefixes.length
            ? sbClient.storage.from(bucket).remove(prefixes).then(function (sr) { if (sr.error) throw sr.error; return null; })
            : Promise.resolve(null);
          var delRow = sbClient.from('image_assets').delete().eq('id', safeFileId).then(function () { return null; });
          var clearProjects = sbClient.from('projects').update({ project_image_url: '' }).eq('project_image_url', safeImageUrl).then(function () { return null; });
          var clearSeries = sbClient.from('series').update({ series_image_url: '' }).eq('series_image_url', safeImageUrl).then(function () { return null; });
          return Promise.all([delStorage, delRow, clearProjects, clearSeries]).then(function () {
            return JSON.stringify({ ok: true, backend: 'supabase', updatedRows: 0 });
          });
        });
      } catch (e) {
        return Promise.resolve(JSON.stringify({ ok: false, error: e.message || 'deleteProjectImage failed' }));
      }
    });

        category: safeCategory,

        return sbClient.from('general_resources').update(payload).eq('id', safeId).select('id,title,category,word_count,updated_at').single()

    _sbDefine('getSupabaseSeriesKnowledgeJsonFromClient', function (seriesId) {
      var safeId = Number(seriesId || 0);
      if (!safeId) throw new Error('Series id is required.');
      return Promise.all([
        sbClient.from('series').select('id,name').eq('id', safeId).single(),
        sbClient.from('documents').select('*').eq('series_id', safeId).eq('doc_type', 'series_knowledge_registry').limit(1)
      ]).then(function (results) {
        var seriesRes = results[0];
        var docRes = results[1];
        if (seriesRes.error) throw seriesRes.error;
        var series = seriesRes.data;
        if (!series) throw new Error('Supabase series not found.');
        var documentRow = (docRes.data && docRes.data.length) ? docRes.data[0] : null;
        var rawText = String(documentRow && documentRow.markdown_content || '');
        var knowledge = { lore: '', characters: '', locations: '', continuity: '' };
        if (rawText.trim()) {
          try { knowledge = JSON.parse(rawText); } catch (_) { knowledge.lore = rawText; }
        }
        return JSON.stringify({
          ok: true, seriesId: safeId, seriesName: String(series.name || '').trim(),
          exists: !!documentRow, knowledge: knowledge,
          updatedAt: documentRow && (documentRow.updated_at || documentRow.created_at) || ''
        });
      });
    });

    _sbDefine('saveSupabaseSeriesKnowledgeJsonFromClient', function (seriesId, payloadJson) {
      var safeId = Number(seriesId || 0);
      if (!safeId) throw new Error('Series id is required.');
      var parsed = typeof payloadJson === 'string' ? JSON.parse(payloadJson) : (payloadJson || {});
      var knowledge = { lore: String(parsed.lore || ''), characters: String(parsed.characters || ''), locations: String(parsed.locations || ''), continuity: String(parsed.continuity || '') };
      var safeText = JSON.stringify(knowledge, null, 2);
      return sbClient.from('series').select('name').eq('id', safeId).single()
        .then(function (sr) {
          if (sr.error) throw sr.error;
          var seriesName = String(sr.data && sr.data.name || 'Series').trim();
          var title = seriesName + ' - Series Knowledge Registry';
          return sbClient.from('documents').select('id').eq('series_id', safeId).eq('doc_type', 'series_knowledge_registry').limit(1)
            .then(function (check) {
              var payload = { series_id: safeId, doc_type: 'series_knowledge_registry', title: title, markdown_content: safeText,
                word_count: safeText.split(/\s+/).filter(function (w) { return w.length > 0; }).length };
              if (check.data && check.data.length) {
                return sbClient.from('documents').update(payload).eq('id', check.data[0].id).select('id,updated_at').single()
                  .then(function (u) { if (u.error) throw u.error; return JSON.stringify({ ok: true, seriesId: safeId, seriesName: seriesName, knowledge: knowledge, updatedAt: u.data.updated_at || '' }); });
              } else {
                return sbClient.from('documents').insert([payload]).select('id,created_at').single()
                  .then(function (i) { if (i.error) throw i.error; return JSON.stringify({ ok: true, seriesId: safeId, seriesName: seriesName, knowledge: knowledge, updatedAt: i.data.created_at || '' }); });
              }
            });
        });
    });

    _sbDefine('saveSupabaseSeriesCharacterJsonFromClient', function (seriesId, payloadJson) {
      var safeId = Number(seriesId || 0);
      if (!safeId) throw new Error('Series id is required.');
      var parsed = typeof payloadJson === 'string' ? JSON.parse(payloadJson) : (payloadJson || {});
      var charId = Number(parsed.id || 0);
      var payload = {
        series_id: safeId, name: String(parsed.name || '').trim(),
        role_archetype: String(parsed.role_archetype || parsed.roleArchetype || '').trim(),
        archetype: String(parsed.archetype || '').trim(),
        image_url: String(parsed.image_url || parsed.imageUrl || '').trim(),
        description: String(parsed.description || '').trim(),
        motivation_arc: String(parsed.motivation_arc || parsed.motivationArc || '').trim(),
        backstory: String(parsed.backstory || '').trim(),
        sort_order: Number(parsed.sort_order || parsed.sortOrder || 0) || 0,
        color: String(parsed.color || '').trim(),
        scope: String(parsed.scope || 'book').trim() || 'book'
      };
      var bookLinks = Array.isArray(parsed.bookLinks || parsed.book_links) ? (parsed.bookLinks || parsed.book_links) : [];
      var saveOp = charId
        ? sbClient.from('series_characters').update(payload).eq('id', charId).select().single()
        : sbClient.from('series_characters').insert([payload]).select().single();
      return saveOp.then(function (res) {
        if (res.error) throw res.error;
        var saved = res.data;
        var savedId = Number(saved.id);
        var delBooks = sbClient.from('series_character_books').delete().eq('character_id', savedId).then(function () { return null; });
        var insBooks = bookLinks.length
          ? Promise.all(bookLinks.map(function (link) {
              var pid = Number(link.project_id || link.projectId || 0);
              if (!pid) return Promise.resolve(null);
              return sbClient.from('series_character_books').insert([{ character_id: savedId, project_id: pid, notes: String(link.notes || '').trim() }]).then(function () { return null; });
            }))
          : Promise.resolve(null);
        return Promise.all([delBooks, insBooks]).then(function () {
          return JSON.stringify({ ok: true, character: saved });
        });
      });
    });

      }

        return data.models.map(function (m) { return { id: String(m.name || m.model || m.id || '').trim(), name: String(m.name || m.model || m.id || '').trim() }; }).filter(function (m) { return !!m.id; });

    function _normalizeUrlNoSlash(value) {

    _sbDefine('listAIModelsJsonFromClient', function (payloadJson) {
      try {
        var payload = typeof payloadJson === 'string' ? JSON.parse(payloadJson) : (payloadJson || {});
        var provider = payload.provider || payload.providerKey || 'openrouter';
        var url = '';
        var headers = {};

        if (provider === 'openrouter') {
          url = 'https://openrouter.ai/api/v1/models';
          var typedKey = payload.openrouter && String(payload.openrouter.apiKey || '').trim();
          var saved = _loadAISettings();
          var savedKey = String(saved.openrouter && saved.openrouter.apiKey || '').trim();
          var apiKey = typedKey || savedKey;
          if (apiKey) headers['Authorization'] = 'Bearer ' + apiKey;
        } else if (provider === 'lmstudio') {
          var endpoint = _normalizeUrlNoSlash(payload.lmstudio && payload.lmstudio.endpoint || 'http://localhost:1234/v1');
          url = endpoint + '/models';
        } else if (provider === 'ollama') {
          var endpoint2 = _normalizeUrlNoSlash(payload.ollama && payload.ollama.endpoint || 'http://localhost:11434');
          url = (/\/api$/i.test(endpoint2) ? endpoint2 : endpoint2 + '/api') + '/tags';
        } else {
          throw new Error('Unknown AI provider: ' + provider);
        }

        return fetch(url, { method: 'GET', headers: headers }).then(function (response) {
          return response.text().then(function (text) {
            if (!response.ok) throw new Error('Model fetch failed with HTTP ' + response.status + ': ' + text.slice(0, 300));
            var data = text ? JSON.parse(text) : {};
            var models = _extractModelRecords(data).sort(function (a, b) {
              return String(a.id).localeCompare(String(b.id));
            });
            return JSON.stringify({ ok: true, provider: provider, models: models });
          });
        });
      } catch (e) {
        return Promise.resolve(JSON.stringify({ ok: false, error: e.message || 'listAIModels failed' }));
      }
    });

    _sbDefine('callAICompletionJsonFromClient', function (payloadJson) {
      try {
        var payload = typeof payloadJson === 'string' ? JSON.parse(payloadJson) : (payloadJson || {});
        var provider = payload.provider || 'openrouter';
        var request = payload.request || {};
        var system = String(request.system || 'You are a helpful writing assistant.');
        var prompt = String(request.prompt || '');
        var temperature = Math.max(0, Math.min(2, Number(request.temperature || 0.7)));
        var maxTokens = Math.max(64, Math.min(16000, Number(request.maxTokens || 512)));
        if (!prompt.trim()) throw new Error('Prompt is empty.');
        var url = '';
        var body = null;
        var headers = { 'Content-Type': 'application/json' };

        if (provider === 'openrouter') {
          var typedKey = payload.openrouter && String(payload.openrouter.apiKey || '').trim();
          var saved = _loadAISettings();
          var savedKey = String(saved.openrouter && saved.openrouter.apiKey || '').trim();
          var apiKey = typedKey || savedKey;
          if (!apiKey) throw new Error('OpenRouter API key is not saved. Open AI Settings and add it first.');
          var model = String(request.model || payload.openrouter && payload.openrouter.model || '').trim();
          if (!model) throw new Error('OpenRouter model is not set.');
          url = 'https://openrouter.ai/api/v1/chat/completions';
          headers['Authorization'] = 'Bearer ' + apiKey;
          headers['HTTP-Referer'] = 'https://script.google.com';
          headers['X-Title'] = 'Writing Dashboard';
          body = { model: model, messages: [{ role: 'system', content: system }, { role: 'user', content: prompt }], temperature: temperature, max_tokens: maxTokens, stream: false };
        } else if (provider === 'lmstudio') {
          var endpoint = _normalizeUrlNoSlash(payload.lmstudio && payload.lmstudio.endpoint || 'http://localhost:1234/v1');
          var model2 = String(request.model || payload.lmstudio && payload.lmstudio.model || '').trim();
          if (!model2) throw new Error('LM Studio model is not set.');
          url = (/\/v1$/i.test(endpoint) ? endpoint : endpoint + '/v1') + '/chat/completions';
          body = { model: model2, messages: [{ role: 'system', content: system }, { role: 'user', content: prompt }], temperature: temperature, max_tokens: maxTokens, stream: false };
        } else if (provider === 'ollama') {
          var endpoint2 = _normalizeUrlNoSlash(payload.ollama && payload.ollama.endpoint || 'http://localhost:11434');
          var model3 = String(request.model || payload.ollama && payload.ollama.model || '').trim();
          if (!model3) throw new Error('Ollama model is not set.');
          url = (/\/api$/i.test(endpoint2) ? endpoint2 : endpoint2 + '/api') + '/chat';
          body = { model: model3, messages: [{ role: 'system', content: system }, { role: 'user', content: prompt }], options: { temperature: temperature, num_predict: maxTokens }, stream: false };
        } else {
          throw new Error('Unknown AI provider: ' + provider);
        }

        return fetch(url, { method: 'POST', headers: headers, body: JSON.stringify(body) }).then(function (response) {
          return response.text().then(function (text) {
            if (!response.ok) throw new Error('AI request failed with HTTP ' + response.status + ': ' + text.slice(0, 700));
            var data = text ? JSON.parse(text) : {};
            var output = '';
            if (data.choices && data.choices[0]) {
              output = data.choices[0].message && data.choices[0].message.content != null ? String(data.choices[0].message.content) : (data.choices[0].text || '');
            } else if (data.message && data.message.content != null) {
              output = String(data.message.content);
            } else if (data.response) {
              output = String(data.response);
            }
            return JSON.stringify({ ok: true, provider: provider, mode: 'browser/direct', text: output, raw: data });
          });
        });
      } catch (e) {
        return Promise.resolve(JSON.stringify({ ok: false, error: e.message || 'callAICompletion failed' }));
      }
    });

    // --- Override callAppsScriptJson to try Supabase first ---
    function callAppsScriptJson(methodName, args) {
      return new Promise(function (resolve, reject) {
        var impl = _sbImpl[methodName];
        if (impl && sbClient) {
          _sbExec(impl, args || [], function (json) {
            try {
              var result = typeof json === 'string' ? JSON.parse(json) : json;
              if (result && result.ok === false) throw new Error(result.error || (methodName + ' failed.'));
              resolve(result);
            } catch (error) {
              reject(error);
            }
          }, function (error) {
            reject(error && error.message ? new Error(error.message) : error);
          });
        } else if (typeof google !== 'undefined' && google.script && google.script.run) {
          var runner = google.script.run
            .withSuccessHandler(function (json) {
              try {
                var result = typeof json === 'string' ? JSON.parse(json) : json;
                if (result && result.ok === false) throw new Error(result.error || (methodName + ' failed.'));
                resolve(result);
              } catch (error) {
                reject(error);
              }
            })
            .withFailureHandler(function (error) {
              reject(error && error.message ? new Error(error.message) : error);
            });
          runner[methodName].apply(runner, args || []);
        } else {
          reject(new Error('No implementation for ' + methodName));
        }
      });
    }

    function calcMilestoneDates(milestones, fromDate, shiftToPublish) {
      var base = fromDate ? new Date(fromDate) : new Date();
      return milestones.map(function (m) {
        var d = new Date(base);
        var offset = m.dayOffset;
        if (shiftToPublish) {
          offset = offset - shiftToPublish;
        }
        d.setDate(d.getDate() + offset);
        return {
          name: m.name,
          dayOffset: offset,
          date: d.toISOString().split("T")[0],
          completed: false
        };
      });
    }

    function getPreferredResourceId() {
      var resources = Array.isArray(appState.resources) ? appState.resources : [];
      if (!resources.length) return 0;

      var currentId = Number(appState.selectedResourceId || 0) || 0;
      var storedId = loadLastSelectedResourceId();
      var preferredIds = [currentId, storedId];

      for (var i = 0; i < preferredIds.length; i++) {
        var preferredId = Number(preferredIds[i] || 0) || 0;
        if (!preferredId) continue;
        for (var j = 0; j < resources.length; j++) {

        }
      }

      return Number(resources[0] && resources[0].id || 0) || 0;
    }

    function getOutlineChapterCount() {
      var outline = getPlanOutline();
      return (outline.acts || []).reduce(function (sum, act) {
        return sum + (act.children || []).length;
      }, 0);
    }

    function initOutlineFromSegments() {
      var outline = getPlanOutline();
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var outlineChCount = getOutlineChapterCount();
      // Only auto-generate if:
      // 1. No acts exist yet, OR
      // 2. Exactly 1 act with 0 children (race condition from early render before load)
      var isEmptyRaceCondition = outline.acts.length === 1 && outlineChCount === 0;
      var needsInit = !outline.acts.length || isEmptyRaceCondition;
      if (needsInit && segments.length) {
        outline.acts = [{
          id: generateOutlineNodeId(),
          type: "act",
          title: "Act 1",
          sortOrder: 0,
          children: segments.map(function (seg, idx) {
            return {
              id: String(seg.key || generateOutlineNodeId()),
              type: "chapter",
              title: String(seg.title || "").trim() || ("Chapter " + (idx + 1)),
              sortOrder: idx,
              children: []
            };
          })
        }];
      }
    }

    var _outlineIdCounter = 0;
    function generateOutlineNodeId() {
      _outlineIdCounter += 1;
      return "ol-" + Date.now() + "-" + _outlineIdCounter;
    }

    function renumberOutlineChapters() {
      var outline = getPlanOutline();
      var chapterIndex = 0;
      (outline.acts || []).forEach(function (act) {
        (act.children || []).forEach(function (chapter) {
          chapterIndex += 1;
          var title = String(chapter.title || "").trim();
          var match = title.match(/^(Chapter\s+)(\d+)(\s*:\s*.*)?$/i);
          if (match) {
            chapter.title = "Chapter " + chapterIndex + (match[3] || "");
          }
        });
      });
    }

    function syncOutlineToSegments() {
      renumberOutlineChapters();
      var outline = getPlanOutline();
      var existingSegments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var nextSegments = [];
      var chapterIndex = 0;
      (outline.acts || []).forEach(function (act) {
        (act.children || []).forEach(function (chapter) {
          chapterIndex += 1;
          var existing = existingSegments.find(function (s) { return s.key === chapter.id; });
          var text = existing ? existing.text : "<div><br></div>";
          var wordCount = existing ? existing.wordCount : 0;
          nextSegments.push({
            key: chapter.id,
            title: String(chapter.title || "").trim() || ("Chapter " + chapterIndex),
            text: text,
            wordCount: wordCount,
            sortOrder: chapterIndex
          });
        });
      });
      appState.writingWorkspace.segments = nextSegments;
      renderWritingChapterList(getSelectedProject());
      renderWritingWorkspaceScopeOptions();
      if (nextSegments.length) {
        var currentScope = String(appState.writingWorkspace.scope || "");
        var hasCurrent = nextSegments.some(function (s) { return s.key === currentScope; });
        if (!hasCurrent) {
          appState.writingWorkspace.scope = nextSegments[0].key;
          renderWritingWorkspaceEditor(getSelectedProject());
        }
      }
    }

    function addPlanAct() {
      var outline = getPlanOutline();
      outline.acts = outline.acts || [];
      outline.acts.push({
        id: generateOutlineNodeId(),
        type: "act",
        title: "Act " + (outline.acts.length + 1),
        sortOrder: outline.acts.length,
        children: []
      });
      renderPlanOutline();
      syncOutlineToSegments();
      schedulePlanOutlineSave();
    }

    function addPlanChapter(actId) {
      var outline = getPlanOutline();
      var act = (outline.acts || []).find(function (a) { return a.id === actId; });
      if (!act) return;
      act.children = act.children || [];
      act.children.push({
        id: generateOutlineNodeId(),
        type: "chapter",
        title: "Chapter " + (act.children.length + 1),
        sortOrder: act.children.length,
        children: []
      });
      renderPlanOutline();
      syncOutlineToSegments();
      schedulePlanOutlineSave();
    }

    function addPlanScene(chapterId) {
      var outline = getPlanOutline();
      var act = (outline.acts || []).find(function (a) {
        return (a.children || []).some(function (c) { return c.id === chapterId; });
      });
      if (!act) return;
      var chapter = (act.children || []).find(function (c) { return c.id === chapterId; });
      if (!chapter) return;
      chapter.children = chapter.children || [];
      chapter.children.push({
        id: generateOutlineNodeId(),
        type: "scene",
        title: "Scene " + (chapter.children.length + 1),
        sortOrder: chapter.children.length,
        purpose: "",
        pov: "",
        targetWordCount: 3000,
        mainPlotFunction: "",
        notes: "",
        characterIds: []
      });
      renderPlanOutline();
      schedulePlanOutlineSave();
    }

    function deletePlanNode(nodeId) {
      var outline = getPlanOutline();
      outline.acts = outline.acts || [];
      outline.acts = outline.acts.filter(function (a) {
        if (a.id === nodeId) return false;
        a.children = (a.children || []).filter(function (c) {
          if (c.id === nodeId) return false;
          c.children = (c.children || []).filter(function (s) { return s.id !== nodeId; });
          return true;
        });
        return true;
      });
      renderPlanOutline();
      syncOutlineToSegments();
      schedulePlanOutlineSave();
    }

    function updatePlanNodeTitle(nodeId, title) {
      var outline = getPlanOutline();
      var node = findPlanNodeById(outline, nodeId);
      if (node) {
        node.title = String(title || "").trim();
        if (node.type === "chapter") syncOutlineToSegments();
        schedulePlanOutlineSave();
      }
    }

    function syncSegmentTitleToOutline(segmentKey, newTitle) {
      var outline = getPlanOutline();
      var acts = outline.acts || [];
      for (var i = 0; i < acts.length; i++) {
        var chapters = acts[i].children || [];
        for (var j = 0; j < chapters.length; j++) {
          if (chapters[j].id === segmentKey) {
            chapters[j].title = String(newTitle || "").trim();
            return true;
          }
        }
      }
      return false;
    }

    function updatePlanSceneField(sceneId, field, value) {
      var outline = getPlanOutline();
      var node = findPlanNodeById(outline, sceneId);
      if (node && node.type === "scene") {
        node[field] = value;
        schedulePlanOutlineSave();
      }
    }

    function findPlanNodeById(outline, nodeId) {
      var acts = outline.acts || [];
      for (var i = 0; i < acts.length; i++) {
        if (acts[i].id === nodeId) return acts[i];
        var chapters = acts[i].children || [];
        for (var j = 0; j < chapters.length; j++) {
          if (chapters[j].id === nodeId) return chapters[j];
          var scenes = chapters[j].children || [];
          for (var k = 0; k < scenes.length; k++) {
            if (scenes[k].id === nodeId) return scenes[k];
          }
        }
      }
      return null;
    }

    function getOutlineScenesForChapterHtml(chapterKey) {
      var outline = getPlanOutline();
      var acts = outline.acts || [];
      for (var i = 0; i < acts.length; i++) {
        var chapters = acts[i].children || [];
        for (var j = 0; j < chapters.length; j++) {
          if (chapters[j].id === chapterKey) {
            var scenes = chapters[j].children || [];
            if (!scenes.length) return "";
            var project = getSelectedProject();
            var seriesId = project && Number(project.series_id || 0) ? Number(project.series_id) : 0;
            var characters = seriesId ? (skCache.characters && skCache.characters[seriesId] || []) : [];
            var locations = seriesId ? (skCache.locations && skCache.locations[seriesId] || []) : [];
            var continuity = seriesId ? (skCache.continuity && skCache.continuity[seriesId] || []) : [];
            var html = "<div class='writing-inspector-outline-scenes'>" + scenes.map(function (scene, sIdx) {
              var parts = [];
              parts.push("<div style='font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:4px;'>SCENE " + (sIdx + 1) + (scene.title ? " - " + escapeHtml(scene.title) : "") + "</div>");
              var sceneText = stripHtmlTags(scene.text || "").trim();
              if (sceneText) {
                var lines = sceneText.split("\n").map(function (l) { return String(l || "").trim(); }).filter(Boolean);
                parts.push("<div style='font-size:10px;color:#94a3b8;line-height:1.35;margin-bottom:4px;'>" + escapeHtml(lines.slice(0, 5).join("\n")) + "</div>");
              }
              if (scene.purpose) parts.push("<div style='font-size:10px;color:#64748b;line-height:1.35;'><strong>Purpose:</strong> " + escapeHtml(scene.purpose) + "</div>");
              if (scene.pov) parts.push("<div style='font-size:10px;color:#64748b;line-height:1.35;'><strong>POV:</strong> " + escapeHtml(scene.pov) + "</div>");
              if (scene.targetWordCount) parts.push("<div style='font-size:10px;color:#64748b;line-height:1.35;'><strong>Target:</strong> " + Number(scene.targetWordCount).toLocaleString() + " words</div>");
              if (scene.mainPlotFunction) parts.push("<div style='font-size:10px;color:#64748b;line-height:1.35;'><strong>Plot:</strong> " + escapeHtml(scene.mainPlotFunction) + "</div>");
              var codexTags = getPlanSceneCodexTags(scene, characters, locations, continuity);
              if (codexTags) {
                parts.push("<div style='display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;'>" + codexTags + "</div>");
              }
              return "<div style='margin-bottom:8px;padding:6px 8px;background:#0f1419;border:1px solid #1e293b;border-radius:4px;'>" +
                parts.join("") +
                "</div>";
            }).join("") + "</div>";
            return html;
          }
        }
      }
      return "";
    }

    function movePlanNode(nodeId, direction) {
      var outline = getPlanOutline();
      outline.acts = outline.acts || [];
      outline.acts.forEach(function (act) {
        var chapters = act.children || [];
        var chIdx = chapters.findIndex(function (c) { return c.id === nodeId; });
        if (chIdx !== -1) {
          var newIdx = chIdx + direction;
          if (newIdx >= 0 && newIdx < chapters.length) {
            var temp = chapters[chIdx];
            chapters[chIdx] = chapters[newIdx];
            chapters[newIdx] = temp;
            renderPlanOutline();
            syncOutlineToSegments();
            schedulePlanOutlineSave();
          }
          return;
        }
        chapters.forEach(function (chapter) {
          var scenes = chapter.children || [];
          var scIdx = scenes.findIndex(function (s) { return s.id === nodeId; });
          if (scIdx !== -1) {
            var newScIdx = scIdx + direction;
            if (newScIdx >= 0 && newScIdx < scenes.length) {
              var temp = scenes[scIdx];
              scenes[scIdx] = scenes[newScIdx];
              scenes[newScIdx] = temp;
              renderPlanOutline();
              schedulePlanOutlineSave();
            }
          }
        });
      });
    }

    function togglePlanActCollapse(actId) {
      var outline = getPlanOutline();
      var act = (outline.acts || []).find(function (a) { return a.id === actId; });
      if (act) {
        act.collapsed = !act.collapsed;
        renderPlanOutline();
        schedulePlanOutlineSave();
      }
    }

    function renderPlanOutline() {
      initOutlineFromSegments();
      var outline = getPlanOutline();
      var grid = el.planOutlineGrid;
      var empty = el.planOutlineEmpty;
      var content = el.planOutlineContent;
      if (!grid || !empty || !content) return;
      var project = getSelectedProject();
      if (project) {
        if (el.planInfoImage) { el.planInfoImage.src = getProjectDisplayImageUrl(project); el.planInfoImage.alt = String(project.title || "").trim() + " cover"; }
        if (el.planInfoTitle) el.planInfoTitle.textContent = String(project.title || "").trim() || "Untitled";
        if (el.planInfoSeries) el.planInfoSeries.textContent = String(project.series || "").trim() || "No series";
        if (el.planInfoGenre) el.planInfoGenre.textContent = String(project.genre || "").trim() || "â€”";
        if (el.planInfoAuthor) el.planInfoAuthor.textContent = String(project.pen_name || "").trim() || "â€”";
        if (el.planInfoWords) {
          var totalWords = (appState.writingWorkspace.segments || []).reduce(function (sum, seg) { return sum + (Number(seg.wordCount) || 0); }, 0);
          el.planInfoWords.textContent = totalWords ? formatWordCount(totalWords) : "0w";
        }
      }
      var acts = outline.acts || [];
      if (!acts.length) {
        empty.hidden = false;
        content.hidden = true;
        grid.innerHTML = "";
        return;
      }
      empty.hidden = true;
      content.hidden = false;
      var seriesId = Number(project && project.series_id || 0);
      var characters = seriesId ? (skCache.characters && skCache.characters[seriesId] || []) : [];
      var locations = seriesId ? (skCache.locations && skCache.locations[seriesId] || []) : [];
      var continuity = seriesId ? (skCache.continuity && skCache.continuity[seriesId] || []) : [];
      // If codex data isn't loaded yet, trigger load and re-render when available
      var _planRenderedWithData = !seriesId || characters.length || locations.length || continuity.length;
      if (!_planRenderedWithData) {
        loadSeriesKnowledgeForSelectedProject(false).finally(function () {
          if (!el.planOutlineGrid) return;
          renderPlanOutline();
        });
      }
      var globalChapterNum = 0;
      grid.innerHTML = acts.map(function (act) {
        var chapterCount = (act.children || []).length;
        var sceneCount = (act.children || []).reduce(function (sum, ch) { return sum + (ch.children || []).length; }, 0);
        var countLabel = chapterCount + " chapter" + (chapterCount === 1 ? "" : "s") + ", " + sceneCount + " scene" + (sceneCount === 1 ? "" : "s");
        var sceneNum = 0;
        return '<div class="plan-act' + (act.collapsed ? " collapsed" : "") + '" data-act-id="' + escapeHtml(act.id) + '">' +
          '<div class="plan-act-header" data-act-id="' + escapeHtml(act.id) + '">' +
            '<span class="plan-act-chevron">&#9660;</span>' +
            '<span class="plan-act-title" contenteditable="true" spellcheck="false" data-node-id="' + escapeHtml(act.id) + '">' + escapeHtml(act.title || "") + '</span>' +
            '<span class="plan-act-count">' + escapeHtml(countLabel) + '</span>' +
            '<div class="plan-act-actions">' +
              '<button type="button" class="plan-act-action" data-action="add-chapter" data-act-id="' + escapeHtml(act.id) + '">+ Chapter</button>' +
              '<button type="button" class="plan-act-action" data-action="delete-act" data-act-id="' + escapeHtml(act.id) + '">Delete</button>' +
            '</div>' +
          '</div>' +
          '<div class="plan-chapter-grid">' +
            (act.children || []).map(function (chapter) {
              globalChapterNum += 1;
              var chNum = globalChapterNum;
              return '<div class="plan-chapter" draggable="true" data-chapter-id="' + escapeHtml(chapter.id) + '">' +
                '<div class="plan-chapter-header">' +
                  '<span class="plan-chapter-drag-handle" title="Drag to reorder">â ¿</span>' +
                  '<span class="plan-chapter-number">CHAPTER ' + chNum + '</span>' +
                  '<span class="plan-chapter-title" contenteditable="true" spellcheck="false" data-node-id="' + escapeHtml(chapter.id) + '">' + escapeHtml(chapter.title || "") + '</span>' +
                  '<div class="plan-chapter-actions">' +
                    '<button type="button" class="plan-chapter-action" data-action="delete" data-node-id="' + escapeHtml(chapter.id) + '">&#10005;</button>' +
                  '</div>' +
                '</div>' +
                '<div class="plan-scene-list">' +
                  (chapter.children || []).map(function (scene) {
                    sceneNum += 1;
                    var wc = Number(scene.targetWordCount || 0);
                    var wcLabel = wc ? wc.toLocaleString() : "â€”";
                    var codexTags = getPlanSceneCodexTags(scene, characters, locations, continuity, true);
                    return '<div class="plan-scene" data-scene-id="' + escapeHtml(scene.id) + '">' +
                      '<div class="plan-scene-header">' +
                        '<span class="plan-scene-number">SCENE ' + sceneNum + '</span>' +
                        '<div class="plan-scene-actions">' +
                          '<button type="button" class="plan-scene-action" data-action="move-up" data-node-id="' + escapeHtml(scene.id) + '">&#9650;</button>' +
                          '<button type="button" class="plan-scene-action" data-action="move-down" data-node-id="' + escapeHtml(scene.id) + '">&#9660;</button>' +
                          '<button type="button" class="plan-scene-action" data-action="delete" data-node-id="' + escapeHtml(scene.id) + '">&#10005;</button>' +
                        '</div>' +
                      '</div>' +
                      '<div class="plan-scene-fields">' +
                        '<div class="plan-scene-field">' +
                          '<span class="plan-scene-field-label">Purpose:</span>' +
                          '<span class="plan-scene-field-value" contenteditable="true" spellcheck="false" data-placeholder="What happens..." data-scene-id="' + escapeHtml(scene.id) + '" data-field="purpose">' + escapeHtml(scene.purpose || "") + '</span>' +
                        '</div>' +
                        '<div class="plan-scene-field">' +
                          '<span class="plan-scene-field-label">POV:</span>' +
                          '<span class="plan-scene-field-value" contenteditable="true" spellcheck="false" data-placeholder="Character..." data-scene-id="' + escapeHtml(scene.id) + '" data-field="pov">' + escapeHtml(scene.pov || "") + '</span>' +
                        '</div>' +
                        '<div class="plan-scene-field">' +
                          '<span class="plan-scene-field-label">Target:</span>' +
                          '<span class="plan-scene-field-value" contenteditable="true" spellcheck="false" data-placeholder="3000" data-scene-id="' + escapeHtml(scene.id) + '" data-field="targetWordCount">' + escapeHtml(wcLabel) + '</span>' +
                          '<span class="plan-scene-wc">words</span>' +
                        '</div>' +
                        '<div class="plan-scene-field">' +
                          '<span class="plan-scene-field-label">Plot:</span>' +
                          '<span class="plan-scene-field-value" contenteditable="true" spellcheck="false" data-placeholder="Main plot function..." data-scene-id="' + escapeHtml(scene.id) + '" data-field="mainPlotFunction">' + escapeHtml(scene.mainPlotFunction || "") + '</span>' +
                        '</div>' +
                      '</div>' +
                      '<div class="plan-scene-tags">' + codexTags +
                        '<span class="plan-scene-tag-add" data-scene-id="' + escapeHtml(scene.id) + '">+ Codex</span>' +
                      '</div>' +
                    '</div>';
                  }).join("") +
                '</div>' +
                '<button type="button" class="plan-new-scene-btn" data-chapter-id="' + escapeHtml(chapter.id) + '">+ New Scene</button>' +
              '</div>';
            }).join("") +
          '</div>' +
        '</div>';
      }).join("");

      grid.querySelectorAll(".plan-act-header").forEach(function (header) {
        header.addEventListener("click", function (e) {
          if (e.target.closest("button")) return;
          var actId = this.getAttribute("data-act-id");
          if (actId) togglePlanActCollapse(actId);
        });
      });

      grid.querySelectorAll("[contenteditable]").forEach(function (node) {
        node.addEventListener("blur", function () {
          var nodeId = this.getAttribute("data-node-id");
          var sceneId = this.getAttribute("data-scene-id");
          var field = this.getAttribute("data-field");
          var value = this.textContent.trim();
          if (nodeId) updatePlanNodeTitle(nodeId, value);
          if (sceneId && field) {
            if (field === "targetWordCount") {
              var num = parseInt(value.replace(/,/g, "").replace(/[^0-9]/g, ""), 10);
              updatePlanSceneField(sceneId, field, isNaN(num) ? 0 : num);
            } else {
              updatePlanSceneField(sceneId, field, value);
            }
          }
        });
        node.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            this.blur();
          }
        });
      });

      grid.querySelectorAll("[data-action]").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var action = this.getAttribute("data-action");
          var actId = this.getAttribute("data-act-id");
          var nodeId = this.getAttribute("data-node-id");
          if (action === "add-chapter" && actId) addPlanChapter(actId);
          if (action === "delete-act" && actId) {
            if (confirm("Delete this act and all its chapters/scenes?")) deletePlanNode(actId);
          }
          if (action === "delete" && nodeId) {
            if (confirm("Delete this item?")) deletePlanNode(nodeId);
          }
          if (action === "move-up" && nodeId) movePlanNode(nodeId, -1);
          if (action === "move-down" && nodeId) movePlanNode(nodeId, 1);
        });
      });

      grid.querySelectorAll(".plan-new-scene-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var chapterId = this.getAttribute("data-chapter-id");
          if (chapterId) addPlanScene(chapterId);
        });
      });

      grid.querySelectorAll(".plan-scene-tag-add").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var sceneId = this.getAttribute("data-scene-id");
          if (!sceneId) return;
          openPlanCodexTagModal(sceneId);
        });
      });

      grid.querySelectorAll(".plan-scene-tag-remove").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          var sceneId = this.getAttribute("data-scene-id");
          var codexId = Number(this.getAttribute("data-codex-id") || 0);
          var codexType = String(this.getAttribute("data-codex-type") || "").trim();
          if (!sceneId || !codexId || !codexType) return;
          var outline = getPlanOutline();
          var scene = findPlanNodeById(outline, sceneId);
          if (scene) {
            if (scene.codexEntries) {
              scene.codexEntries = scene.codexEntries.filter(function (e) {
                return !(Number(e.id || 0) === codexId && String(e.type || "").trim() === codexType);
              });
            }
            scene.characterIds = (scene.characterIds || []).filter(function (id) {
              return !(Number(id) === codexId && codexType === "characters");
            });
            renderPlanOutline();
            schedulePlanOutlineSave();
          }
        });
      });

      function _flipMulti(grids, fn) {
        var items = [];
        grids.forEach(function (g) { g.querySelectorAll(".plan-chapter:not(.dragging)").forEach(function (el) { items.push({ el: el, rect: el.getBoundingClientRect() }); }); });
        fn();
        items.forEach(function (rec) {
          var nr = rec.el.getBoundingClientRect();
          var dx = rec.rect.left - nr.left, dy = rec.rect.top - nr.top;
          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            rec.el.style.transition = "none";
            rec.el.style.transform = "translate(" + dx + "px," + dy + "px)";
          }
        });
        document.body.offsetHeight;
        items.forEach(function (rec) {
          rec.el.style.transition = "transform 250ms ease-out";
          rec.el.style.transform = "";
        });
      }

      grid.querySelectorAll(".plan-chapter").forEach(function (ch) {
        ch.addEventListener("dragstart", function (e) {
          if (!e.target.closest(".plan-chapter-drag-handle") && e.target !== this) { e.preventDefault(); return; }
          _draggedChapterId = this.getAttribute("data-chapter-id");
          _dragOverTarget = null;
          _dragConfirmChapter = null; _dragConfirmCount = 0;
          var clone = this.cloneNode(true);
          var r = this.getBoundingClientRect();
          clone.style.cssText = "position:fixed;left:-9999px;opacity:0.8;pointer-events:none;z-index:9999";
          document.body.appendChild(clone);
          e.dataTransfer.setDragImage(clone, e.clientX - r.left, e.clientY - r.top);
          setTimeout(function () { clone.remove(); }, 0);
          e.dataTransfer.effectAllowed = "move";
          e.dataTransfer.setData("text/plain", _draggedChapterId);
          this.classList.add("dragging");
        });
        ch.addEventListener("dragend", function () {
          _draggedChapterId = null; _dragOverTarget = null; _dragConfirmChapter = null; _dragConfirmCount = 0;
          document.querySelectorAll(".plan-chapter.dragging").forEach(function (c) { c.classList.remove("dragging"); c.style.transition = ""; c.style.transform = ""; });
        });
        ch.addEventListener("dragover", function (e) { e.preventDefault(); e.dataTransfer.dropEffect = "move"; });
      });

      grid.querySelectorAll(".plan-chapter-grid").forEach(function (g) {
        g.addEventListener("dragenter", function (e) {
          if (!this.contains(e.relatedTarget)) _dragOverTarget = null;
        });
        g.addEventListener("dragover", function (e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          if (!_draggedChapterId) return;
          var dragged = document.querySelector(".plan-chapter.dragging");
          if (!dragged) return;
          var chapter = e.target.closest(".plan-chapter");
          if (!chapter || chapter === dragged) { _dragOverTarget = null; _dragConfirmChapter = null; _dragConfirmCount = 0; return; }
          var chapterRect = chapter.getBoundingClientRect();
          var best = chapter, bestDist = Math.abs(e.clientX - (chapterRect.left + chapterRect.width / 2));
          g.querySelectorAll(".plan-chapter:not(.dragging)").forEach(function (c) {
            var r = c.getBoundingClientRect();
            if (Math.abs(r.top - chapterRect.top) < 50) {
              var d = Math.abs(e.clientX - (r.left + r.width / 2));
              if (d < bestDist) { bestDist = d; best = c; }
            }
          });
          chapter = best;
          if (chapter === _dragConfirmChapter) { _dragConfirmCount++; } else { _dragConfirmChapter = chapter; _dragConfirmCount = 1; }
          if (_dragConfirmCount < 2) { return; }
          if (chapter !== _dragOverTarget) {
            var rect = chapter.getBoundingClientRect();
            var dL = e.clientX - rect.left, dR = rect.right - e.clientX;
            var dT = e.clientY - rect.top, dB = rect.bottom - e.clientY;
            var min = Math.min(dL, dR, dT, dB);
            var before = (min === dR || min === dB);
            _dragOverTarget = chapter;
            var grids = [g];
            var srcGrid = dragged.parentNode;
            if (srcGrid && srcGrid !== g) grids.push(srcGrid);
            var ref = before ? chapter : chapter.nextElementSibling;
            _flipMulti(grids, function () { g.insertBefore(dragged, ref); });
          } else {
            // latched
          }
        });
        g.addEventListener("dragleave", function (e) {
          if (!this.contains(e.relatedTarget)) _dragOverTarget = null;
        });
        g.addEventListener("drop", function (e) {
          e.preventDefault();
          var dragged = document.querySelector(".plan-chapter.dragging");
          if (dragged) { dragged.classList.remove("dragging"); dragged.style.transition = ""; dragged.style.transform = ""; }
          if (!_draggedChapterId) return;
          var actEl = this.closest(".plan-act");
          var targetActId = actEl ? actEl.getAttribute("data-act-id") : null;
          if (!targetActId) return;
          var domIds = [];
          this.querySelectorAll(".plan-chapter").forEach(function (c) { var id = c.getAttribute("data-chapter-id"); if (id) domIds.push(id); });
          var outline = getPlanOutline();
          var sourceAct = null, srcIdx = -1;
          outline.acts.forEach(function (act) {
            var si = (act.children || []).findIndex(function (c) { return c.id === _draggedChapterId; });
            if (si !== -1) { sourceAct = act; srcIdx = si; }
          });
          if (!sourceAct || srcIdx === -1) return;
          var targetAct = outline.acts.find(function (a) { return a.id === targetActId; });
          if (!targetAct) return;
          var allCh = {};
          outline.acts.forEach(function (act) { (act.children || []).forEach(function (c) { allCh[c.id] = c; }); });
          sourceAct.children.splice(srcIdx, 1);
          var newChildren = [];
          domIds.forEach(function (id) { if (allCh[id]) newChildren.push(allCh[id]); });
          targetAct.children = newChildren;
          renderPlanOutline();
          syncOutlineToSegments();
          schedulePlanOutlineSave();
        });
      });
    }

    function getPlanSceneCodexTags(scene, characters, locations, continuity, showRemove) {
      var tags = [];
      (scene.codexEntries || []).forEach(function (entry) {
        var id = Number(entry.id || 0);
        var type = String(entry.type || "").trim();
        var arr = type === "characters" ? characters : type === "locations" ? locations : type === "continuity" ? continuity : null;
        var obj = arr ? arr.find(function (x) { return Number(x.id || 0) === id; }) : null;
        var name = obj ? String(obj.name || obj.title || "").trim() : "?";
        var color = obj ? String(obj.color || "").trim() : "";
        tags.push({ id: id, type: type, name: name, color: color });
      });
      (scene.characterIds || []).forEach(function (cid) {
        var id = Number(cid || 0);
        if (!id || tags.some(function (t) { return t.id === id && t.type === "characters"; })) return;
        var charObj = characters.find(function (c) { return Number(c.id) === id; });
        tags.push({ id: id, type: "characters", name: charObj ? String(charObj.name || "").trim() : "?", color: charObj ? String(charObj.color || "").trim() : "" });
      });
      return tags.map(function (t) {
        var colorStyle = t.color ? ' data-color="' + escapeHtml(t.color) + '" style="background:' + escapeHtml(t.color) + 'dd;color:#fff"' : "";
        var removeHtml = showRemove ? '<span class="plan-scene-tag-remove" data-scene-id="' + escapeHtml(scene.id) + '" data-codex-id="' + escapeHtml(t.id) + '" data-codex-type="' + escapeHtml(t.type) + '">&#10005;</span>' : "";
        return '<span class="plan-scene-tag" data-scene-id="' + escapeHtml(scene.id) + '" data-codex-id="' + escapeHtml(t.id) + '" data-codex-type="' + escapeHtml(t.type) + '"' + colorStyle + '>' +
          escapeHtml(t.name) + removeHtml + '</span>';
      }).join("");
    }

    function renderPlanCodexTagList(query) {
      if (!el.planCodexTagList) return;
      var project = getSelectedProject();
      var seriesId = Number(project && project.series_id || 0);
      if (!seriesId) {
        el.planCodexTagList.innerHTML = "<div style='padding:8px;font-size:11px;color:#777884;text-align:center;'>No series project selected.</div>";
        return;
      }
      var q = String(query || "").trim().toLowerCase();
      var entries = [];
      (skCache.characters && skCache.characters[seriesId] || []).forEach(function (c) {
        entries.push({ id: c.id, name: String(c.name || "").trim(), type: "characters", color: String(c.color || "").trim() });
      });
      (skCache.locations && skCache.locations[seriesId] || []).forEach(function (c) {
        entries.push({ id: c.id, name: String(c.name || "").trim(), type: "locations", color: String(c.color || "").trim() });
      });
      (skCache.continuity && skCache.continuity[seriesId] || []).forEach(function (c) {
        entries.push({ id: c.id, name: String(c.title || "").trim(), type: "continuity", color: String(c.color || "").trim() });
      });
      entries.sort(function (a, b) { return String(a.name).localeCompare(String(b.name)); });
      if (q) {
        entries = entries.filter(function (e) { return String(e.name).toLowerCase().indexOf(q) !== -1; });
      }
      if (!entries.length) {
        el.planCodexTagList.innerHTML = "<div style='padding:8px;font-size:11px;color:#777884;text-align:center;'>No matching entries.</div>";
        return;
      }
      el.planCodexTagList.innerHTML = entries.map(function (entry) {
        var initials = String(entry.name || "").split(/\s+/).filter(Boolean).slice(0, 2).map(function (w) { return w.charAt(0).toUpperCase(); }).join("") || "?";
        var color = String(entry.color || "").trim();
        var dotHtml = color ? '<span class="plan-codex-tag-dot" style="background:' + escapeHtml(color) + '"></span>' : "";
        return '<div class="plan-codex-tag-item' + (color ? ' has-color' : '') + '" data-codex-id="' + escapeHtml(String(entry.id)) + '" data-codex-type="' + escapeHtml(entry.type) + '">' +
          '<div class="plan-codex-tag-avatar">' + dotHtml + escapeHtml(initials) + '</div>' +
          '<div class="plan-codex-tag-name">' + escapeHtml(entry.name || "Untitled") + '</div>' +
          '<div class="plan-codex-tag-type">' + escapeHtml(entry.type) + '</div>' +
          '</div>';
      }).join("");
      el.planCodexTagList.querySelectorAll(".plan-codex-tag-item").forEach(function (item) {
        item.addEventListener("click", function () {
          var cid = Number(this.getAttribute("data-codex-id") || 0);

            });
            if (!exists) {

              schedulePlanOutlineSave();

          closePlanCodexTagModal();

      var record = hasSeries ? getSeriesKnowledgeForProject(selected) : null;
      var seriesName = String(selected && selected.series || "").trim();

      var seriesId = Number(selected && selected.series_id || 0);

      skCurrentSeriesId = seriesId;

      if (el.resourceSeriesKnowledgeSeriesName) {
        el.resourceSeriesKnowledgeSeriesName.textContent = hasSeries ? (seriesName || "Untitled Series") : "No series selected";
      }
      if (el.resourceSeriesKnowledgeProjectName) {
        el.resourceSeriesKnowledgeProjectName.textContent = hasSeries
          ? ("From " + (projectTitle || "Untitled Project"))
          : "Choose a project with a series to edit shared world data.";
      }
      if (el.resourceSeriesKnowledgeLore) el.resourceSeriesKnowledgeLore.value = record ? record.lore : "";
      setSeriesKnowledgeInputsDisabled(!hasSeries);

      if (!hasSeries) {
        setResourceSeriesKnowledgeStatus("Select a series-based project to edit shared lore, character, location, and continuity notes.", "warn");
        return;
      }
      if (record && (record.updatedAt || record.lore)) {

    function loadSeriesKnowledgeForSelectedProject(forceRefresh) {
      var project = getSelectedProject();
      if (!project || !Number(project.series_id || 0)) {
        renderSeriesKnowledgePanel(project);
        return Promise.resolve(null);
      }
      var seriesId = Number(project.series_id || 0);
      skCurrentSeriesId = seriesId;

      if (!forceRefresh && appState.seriesKnowledgeById && appState.seriesKnowledgeById[seriesId]) {
        renderSeriesKnowledgePanel(project);
        return loadSkEntities(seriesId).then(function () {
          return appState.seriesKnowledgeById[seriesId];
        });
      }
      setSeriesKnowledgeInputsDisabled(true);
      setResourceSeriesKnowledgeStatus("Loading series knowledge...", "warn");
      return callAppsScriptJson("getSupabaseSeriesKnowledgeJsonFromClient", [seriesId])
        .then(function (result) {
          var knowledge = normalizeSeriesKnowledgeRecord(result && result.knowledge);
          knowledge.updatedAt = String(result && result.updatedAt || knowledge.updatedAt || "");
          appState.seriesKnowledgeById[seriesId] = knowledge;
          renderSeriesKnowledgePanel(project);
          return loadSkEntities(seriesId).then(function () {
            return knowledge;
          });
        })
        .catch(function (error) {
          setSeriesKnowledgeInputsDisabled(false);
          setResourceSeriesKnowledgeStatus("Series knowledge load failed: " + (error && error.message ? error.message : error), "error");
          return null;
        });
    }

      setResourceSeriesKnowledgeStatus("Saving lore...", "warn");

          appState.seriesKnowledgeById[seriesId] = knowledge;
          renderSeriesKnowledgePanel(project);
          setResourceSeriesKnowledgeStatus("Lore saved.", "ok");

    function loadSkCharacters(seriesId) {
      if (!seriesId) return Promise.resolve([]);
      skCache.characterDetails = {};
      return Promise.all([
        callAppsScriptJson("listSupabaseSeriesCharactersJsonFromClient", [seriesId]),
        callAppsScriptJson("listSeriesCharacterBookLinksJsonFromClient", [seriesId]).catch(function () { return { links: [] }; })
      ]).then(function (results) {
        var list = results[0] && results[0].characters ? results[0].characters : [];
        var links = results[1] && results[1].links ? results[1].links : [];
        var linksByChar = {};
        links.forEach(function (lk) {
          var cid = Number(lk.character_id || 0);
          if (!cid) return;
          if (!linksByChar[cid]) linksByChar[cid] = [];
          linksByChar[cid].push({ project_id: Number(lk.project_id || 0) });
        });
        list.forEach(function (ch) {
          var cid = Number(ch.id || 0);
          if (linksByChar[cid]) {
            ch.bookLinks = linksByChar[cid];
            skCache.characterDetails[cid] = { bookLinks: linksByChar[cid] };
          }
        });
        skCache.characters[seriesId] = list;
        renderSkCharacterList();
        populateSkCharacterSelectors();
        return list;
      })
        .catch(function () {});

      skLastSelection.subTab = "characters";
      if (!el.skCharacterForm) return;
      el.skCharacterForm.hidden = false;

        el.skCharacterId.value = "0";
        el.skCharacterName.value = "";
        el.skCharacterRole.value = "";
        el.skCharacterArchetype.value = "";
        el.skCharacterImageUrl.value = "";
        el.skCharacterDescription.value = "";
        el.skCharacterMotivation.value = "";
        el.skCharacterBackstory.value = "";

        renderSkCharacterRelationships([]);

      }

      var list = skCurrentSeriesId ? (skCache.characters[skCurrentSeriesId] || []) : [];
      var ch = list.find(function (c) { return Number(c.id) === id; });
      if (!ch) return;

      el.skCharacterId.value = String(ch.id || 0);
      el.skCharacterName.value = String(ch.name || "");
      el.skCharacterRole.value = String(ch.role_archetype || "");

      el.skCharacterImageUrl.value = String(ch.image_url || "");

      el.skCharacterMotivation.value = String(ch.motivation_arc || "");
      el.skCharacterBackstory.value = String(ch.backstory || "");
      updateSkCharacterHeader(ch);
      if (el.skCharacterList) renderSkCharacterList();

      var cached = skCache.characterDetails[id];
      if (cached) {
        renderSkCharacterBookChecks(cached.bookLinks || []);
        renderSkCharacterRelationships(cached.relationships || []);
        renderSkCharacterDetail(ch, cached.bookLinks || [], cached.relationships || []);
        return;
      }

      renderSkCharacterDetail(ch, [], []);
      callAppsScriptJson("getSupabaseSeriesCharacterJsonFromClient", [id])
        .then(function (result) {
          if (!result || !result.ok) return;
          skCache.characterDetails[id] = {
            bookLinks: result.bookLinks || [],

          renderSkCharacterRelationships(result.relationships || []);

    function getCheckedBookIds(container) {
      if (!container) return [];
      var ids = [];

        ids.push(Number(cb.getAttribute("data-sk-project-id")));
      });
      return ids;

    function saveSkCharacter() {
      if (!skCurrentSeriesId || !el.skCharacterForm) return;
      var id = Number(el.skCharacterId.value || 0);
      var bookIds = getCheckedBookIds(el.skCharacterBookLinks);
      var payload = {
        id: id,
        name: el.skCharacterName ? el.skCharacterName.value : "",
        role_archetype: el.skCharacterRole ? el.skCharacterRole.value : "",
        archetype: el.skCharacterArchetype ? el.skCharacterArchetype.value : "",
        image_url: el.skCharacterImageUrl ? el.skCharacterImageUrl.value : "",
        color: getSkCharacterActiveColor(),
        description: el.skCharacterDescription ? el.skCharacterDescription.value : "",
        motivation_arc: el.skCharacterMotivation ? el.skCharacterMotivation.value : "",
        backstory: el.skCharacterBackstory ? el.skCharacterBackstory.value : ""
      };
      if (bookIds.length) {
        payload.bookLinks = bookIds.map(function (pid) { return { project_id: pid }; });
      } else {
        payload.bookLinks = [];
      }
      setResourceSeriesKnowledgeStatus("Saving character...", "warn");
      callAppsScriptJson("saveSupabaseSeriesCharacterJsonFromClient", [skCurrentSeriesId, JSON.stringify(payload)])
        .then(function (result) {
          setResourceSeriesKnowledgeStatus("Character saved.", "ok");
          var savedId = result && result.character ? Number(result.character.id) : id;
          return loadSkCharacters(skCurrentSeriesId).then(function () {
            if (savedId) editSkCharacter(savedId);
          });
        })
        .catch(function (error) {
          setResourceSeriesKnowledgeStatus("Failed to save character: " + (error && error.message ? error.message : error), "error");
        });
    }

    function deleteSkCharacter() {
      var id = Number(el.skCharacterId ? el.skCharacterId.value : 0);
      if (!id) return;
      if (!confirm("Delete this character? This cannot be undone.")) return;
      callAppsScriptJson("deleteSupabaseSeriesCharacterJsonFromClient", [id])
        .then(function () {
          setResourceSeriesKnowledgeStatus("Character deleted.", "ok");
          if (skCurrentSeriesId) loadSkCharacters(skCurrentSeriesId);
          if (el.skCharacterForm) el.skCharacterForm.hidden = true;
          skEditingCharacterId = 0;
        })
        .catch(function (error) {
          setResourceSeriesKnowledgeStatus("Failed to delete character: " + (error && error.message ? error.message : error), "error");
        });
    }

    function addSkRelationship() {
      if (!skEditingCharacterId) { setResourceSeriesKnowledgeStatus("Save the character first before adding relationships.", "warn"); return; }
      if (!el.skCharacterRelOther || !el.skCharacterRelType) return;
      var otherId = Number(el.skCharacterRelOther.value || 0);
      var relType = el.skCharacterRelType.value;
      if (!otherId) { setResourceSeriesKnowledgeStatus("Select a character for the relationship.", "warn"); return; }
      if (!relType) { setResourceSeriesKnowledgeStatus("Enter a relationship type (e.g. friend, rival).", "warn"); return; }
      callAppsScriptJson("saveSupabaseSeriesCharacterRelationshipJsonFromClient", [skCurrentSeriesId, JSON.stringify({
        character_id_a: skEditingCharacterId,
        character_id_b: otherId,
        relationship_type: relType
      })])
        .then(function () {
          delete skCache.characterDetails[skEditingCharacterId];
          editSkCharacter(skEditingCharacterId);
        })
        .catch(function (error) {
          setResourceSeriesKnowledgeStatus("Failed to add relationship: " + (error && error.message ? error.message : error), "error");
        });
    }

    function deleteSkRelationship(relId) {
      callAppsScriptJson("deleteSupabaseSeriesCharacterRelationshipJsonFromClient", [relId])
        .then(function () {
          if (skEditingCharacterId) {
            delete skCache.characterDetails[skEditingCharacterId];
            editSkCharacter(skEditingCharacterId);
          }
        })
        .catch(function () {});
    }

    /* ---- Locations ---- */

    function loadSkLocations(seriesId) {
      if (!seriesId) return Promise.resolve([]);
      skCache.locationDetails = {};
      return Promise.all([
        callAppsScriptJson("listSupabaseSeriesLocationsJsonFromClient", [seriesId]),
        callAppsScriptJson("listSeriesLocationBookLinksJsonFromClient", [seriesId]).catch(function () { return { links: [] }; })
      ]).then(function (results) {
        var list = results[0] && results[0].locations ? results[0].locations : [];
        var links = results[1] && results[1].links ? results[1].links : [];
        var linksByLoc = {};
        links.forEach(function (lk) {
          var lid = Number(lk.location_id || 0);
          if (!lid) return;
          if (!linksByLoc[lid]) linksByLoc[lid] = [];
          linksByLoc[lid].push({ project_id: Number(lk.project_id || 0) });
        });
        list.forEach(function (loc) {
          var lid = Number(loc.id || 0);
          if (linksByLoc[lid]) {
            loc.bookLinks = linksByLoc[lid];
            skCache.locationDetails[lid] = { bookLinks: linksByLoc[lid] };
          }
        });
        skCache.locations[seriesId] = list;
        renderSkLocationList();
        populateSkLocationSelectors();
        return list;
      })
        .catch(function () {});
    }

    function renderSkLocationList() {
      if (!el.skLocationList) return;
      var list = skCurrentSeriesId ? (skCache.locations[skCurrentSeriesId] || []) : [];
      if (!list.length) {
        el.skLocationList.innerHTML = "<div class='world-entity-empty'>No locations yet. Click + Add Location to start.</div>";
        return;
      }
      el.skLocationList.innerHTML = list.map(function (loc) {
        var active = skActiveLocationId === Number(loc.id) ? " is-active" : "";
        var snippet = (loc.description || loc.significance || "").substring(0, 80);
        return "<div class='world-entity-card" + active + "' data-sk-loc-id='" + loc.id + "'>" +
          "<div class='world-entity-card-header'>" +
            "<div class='world-entity-card-name'>" + escapeHtml(loc.name || "Unnamed") + "</div>" +
            "<div class='world-entity-card-meta'><span class='tiny'>" + escapeHtml(loc.type || "") + "</span></div>" +
          "</div>" +
          (snippet ? "<div class='world-entity-card-snippet'>" + escapeHtml(snippet) + "</div>" : "") +
        "</div>";
      }).join("");

      el.skLocationList.querySelectorAll("[data-sk-loc-id]").forEach(function (card) {
        card.addEventListener("click", function () {
          var id = Number(card.getAttribute("data-sk-loc-id") || 0);
          editSkLocation(id);
        });
      });
    }

    function populateSkLocationSelectors() {
      var list = skCurrentSeriesId ? (skCache.locations[skCurrentSeriesId] || []) : [];

      }).join("");

        el.skContinuityLocAdd.value = currentVal;
      }

    function updateSkLocationHeader(loc) {
      if (!loc) return;
      if (el.skLocationNameDisplay) el.skLocationNameDisplay.textContent = loc.name || "Unnamed";
      if (el.skLocationTypeBadge) {
        if (loc.type) {
          el.skLocationTypeBadge.textContent = loc.type;
          el.skLocationTypeBadge.style.display = "inline-flex";
        } else {
          el.skLocationTypeBadge.style.display = "none";
        }
      }
      if (el.skLocationImage && el.skLocationImagePlaceholder) {
        if (loc.image_url) {
          el.skLocationImage.src = loc.image_url;
          el.skLocationImage.style.display = "block";
          el.skLocationImagePlaceholder.style.display = "none";

          el.skLocationImage.style.display = "none";
          el.skLocationImagePlaceholder.style.display = "flex";

    function editSkLocation(id) {
      skEditingLocationId = id;
      skActiveLocationId = id;
      skLastSelection.locationId = id;
      skLastSelection.subTab = "locations";
      if (!el.skLocationForm) return;
      el.skLocationForm.hidden = false;

      if (!id) {
        el.skLocationId.value = "0";
        el.skLocationName.value = "";
        el.skLocationType.value = "";
        el.skLocationImageUrl.value = "";
        el.skLocationDescription.value = "";
        el.skLocationSignificance.value = "";
        el.skLocationEvents.value = "";
        if (el.skLocationNameDisplay) el.skLocationNameDisplay.textContent = "New Location";
        if (el.skLocationTypeBadge) { el.skLocationTypeBadge.style.display = "none"; el.skLocationTypeBadge.textContent = ""; }
        if (el.skLocationImage) el.skLocationImage.style.display = "none";
        if (el.skLocationImagePlaceholder) el.skLocationImagePlaceholder.style.display = "flex";
        if (el.skLocationList) renderSkLocationList();
        renderSkLocationBookChecks([]);
        return;
      }

      var list = skCurrentSeriesId ? (skCache.locations[skCurrentSeriesId] || []) : [];
      var loc = list.find(function (l) { return Number(l.id) === id; });
      if (!loc) return;

      el.skLocationId.value = String(loc.id || 0);
      el.skLocationName.value = String(loc.name || "");
      el.skLocationType.value = String(loc.type || "");
      el.skLocationImageUrl.value = String(loc.image_url || "");
      el.skLocationDescription.value = String(loc.description || "");
      el.skLocationSignificance.value = String(loc.significance || "");
      el.skLocationEvents.value = String(loc.notable_events || "");
      updateSkLocationHeader(loc);
      if (el.skLocationList) renderSkLocationList();

      var cached = skCache.locationDetails[id];
      if (cached) {
        renderSkLocationBookChecks(cached.bookLinks || []);
        renderSkLocationDetail(loc, cached.bookLinks || []);
        return;
      }

      renderSkLocationDetail(loc, []);
      callAppsScriptJson("getSupabaseSeriesLocationJsonFromClient", [id])
        .then(function (result) {
          if (!result || !result.ok) return;
          skCache.locationDetails[id] = { bookLinks: result.bookLinks || [] };
          renderSkLocationBookChecks(result.bookLinks || []);
          renderSkLocationDetail(loc, result.bookLinks || []);
        })
        .catch(function () {});
    }

        .then(function (result) {
          var list = result && result.entries ? result.entries : [];

          renderSkContinuityList();
          return list;

        .catch(function () {});

            "<div class='world-entity-card-meta'><span class='severity-badge " + severity + "'>" + severity.replace("_", " ") + "</span>" + resolved + "</div>" +

          el.skContinuityImagePlaceholder.style.display = "none";
        } else {
          el.skContinuityImage.style.display = "none";
          el.skContinuityImagePlaceholder.style.display = "flex";

      }

    function editSkContinuityEntry(id) {
      skEditingContinuityId = id;
      skActiveContinuityId = id;
      skLastSelection.continuityId = id;
      skLastSelection.subTab = "continuity";
      if (!el.skContinuityForm) return;
      el.skContinuityForm.hidden = false;

      if (!id) {
        el.skContinuityId.value = "0";
        el.skContinuityTitle.value = "";
        el.skContinuityImageUrl.value = "";
        el.skContinuityDescription.value = "";
        el.skContinuitySeverity.value = "minor";
        el.skContinuityResolved.checked = false;
        if (el.skContinuityTitleDisplay) el.skContinuityTitleDisplay.textContent = "New Entry";
        if (el.skContinuitySeverityBadge) { el.skContinuitySeverityBadge.style.display = "none"; el.skContinuitySeverityBadge.textContent = ""; }
        if (el.skContinuityImage) el.skContinuityImage.style.display = "none";
        if (el.skContinuityImagePlaceholder) el.skContinuityImagePlaceholder.style.display = "flex";
        if (el.skContinuityList) renderSkContinuityList();
        renderSkContinuityCharPicks([]);
        renderSkContinuityLocPicks([]);
        renderSkContinuityProjectPicks([]);
        return;
      }

      var list = skCurrentSeriesId ? (skCache.continuity[skCurrentSeriesId] || []) : [];
      var entry = list.find(function (e) { return Number(e.id) === id; });
      if (!entry) return;

      el.skContinuityId.value = String(entry.id || 0);
      el.skContinuityTitle.value = String(entry.title || "");
      el.skContinuityImageUrl.value = String(entry.image_url || "");
      el.skContinuityDescription.value = String(entry.description || "");
      el.skContinuitySeverity.value = entry.severity || "minor";
      el.skContinuityResolved.checked = !!entry.resolved;
      updateSkContinuityHeader(entry);
      if (el.skContinuityList) renderSkContinuityList();

      var cached = skCache.continuityDetails[id];
      if (cached) {
        renderSkContinuityCharPicks(cached.linkedCharacterIds || []);
        renderSkContinuityLocPicks(cached.linkedLocationIds || []);
        renderSkContinuityProjectPicks(cached.linkedProjectIds || []);
        renderSkContinuityDetail(entry, cached);
        return;
      }

      renderSkContinuityDetail(entry, {});
      callAppsScriptJson("getSupabaseSeriesContinuityEntryJsonFromClient", [id])
        .then(function (result) {
          if (!result || !result.ok) return;
          skCache.continuityDetails[id] = {
            linkedCharacterIds: result.linkedCharacterIds || [],
            linkedLocationIds: result.linkedLocationIds || [],
            linkedProjectIds: result.linkedProjectIds || []
          };
          renderSkContinuityCharPicks(result.linkedCharacterIds || []);
          renderSkContinuityLocPicks(result.linkedLocationIds || []);
          renderSkContinuityProjectPicks(result.linkedProjectIds || []);
          renderSkContinuityDetail(entry, skCache.continuityDetails[id]);
        })
        .catch(function () {});

    function readInspectorOptionsFromTable() {
      const out = INSPECTOR_OPTION_FIELDS.reduce(function (memo, field) {
        memo[field.key] = [];
        return memo;
      }, {});
      if (!el.resourceInspectorTableBody) return out;
      Array.from(el.resourceInspectorTableBody.querySelectorAll("tr")).forEach(function (row) {
        const keyField = row.querySelector("[data-inspector-option-key]");
        const valueField = row.querySelector("[data-inspector-option-value]");
        const descField = row.querySelector("[data-inspector-option-desc]");
        const key = keyField ? String(keyField.value || "").trim() : "";
        const value = valueField ? String(valueField.value || "").trim() : "";
        const description = descField ? String(descField.value || "").trim() : "";
        if (!key || !out[key]) return;
        out[key].push(description ? { value: value, description: description } : value);
      });
      return normalizeInspectorOptionsConfig(out);
    }

    function loadInspectorOptions() {
      const fallback = deriveInspectorOptionsFromProjects();
      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) {
        appState.inspectorOptions = normalizeInspectorOptionsConfig(fallback);
        appState.inspectorOptionsLoaded = true;
        renderResourceInspectorPanel();
        populateFilters();
        return;
      }

      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const payload = parseServerResult(json);
            if (payload.ok === false) throw new Error(payload.error || "Inspector options load failed.");
            appState.inspectorOptions = normalizeInspectorOptionsConfig(payload.options || fallback);
            appState.inspectorOptionsLoaded = true;
            renderResourceInspectorPanel();
            populateFilters();
          } catch (err) {
            appState.inspectorOptions = normalizeInspectorOptionsConfig(fallback);
            appState.inspectorOptionsLoaded = true;
            renderResourceInspectorPanel();
            populateFilters();
            setResourceInspectorStatus("Using project-derived options. " + err.message, "warn");
          }
        })
        .withFailureHandler(function (error) {
          appState.inspectorOptions = normalizeInspectorOptionsConfig(fallback);
          appState.inspectorOptionsLoaded = true;
          renderResourceInspectorPanel();
          populateFilters();
          setResourceInspectorStatus("Using project-derived options. " + (error && error.message ? error.message : error), "warn");
        })
        .getProjectInspectorOptionsJsonFromClient();
    }

    function buildNextStepOptions() {
      const merged = {};
