      if (!/^image\//.test(file.type || "")) {
        setStatus("Please choose an image file.", "error");
        return;
      }

      appState.imagePicker.isUploading = true;
      setImagePickerStatus("Uploading image to the library...", "warn");
      setStatus("Uploading image...", "warn");

      buildOptimizedImageUploadBundle(file, file.name)
        .then(function (bundle) {
        supabaseRunner
          .withSuccessHandler(function (json) {
            appState.imagePicker.isUploading = false;
            try {
              const result = parseServerResult(json);
              if (result.ok === false) throw new Error(result.error || "Upload failed.");
              const fileRecord = {
                id: result.fileId,
                name: result.name,
                url: result.url,
                thumbnailUrl: result.thumbnailUrl,
                thumbnailFileId: result.thumbnailFileId || ""
              };

              appState.imagePicker.selectedUrl = result.url;
              renderImagePickerGrid();
              applySelectedImageUrl(result.url);

              console.error("IMAGE UPLOAD PARSE ERROR", err, json);
              setImagePickerStatus("Upload failed: " + err.message, "error");
              setStatus("Upload failed: " + err.message, "error");

          })
          .withFailureHandler(function (error) {
            appState.imagePicker.isUploading = false;
            console.error("IMAGE UPLOAD ERROR", error);
            const message = error && error.message ? error.message : error;
            setImagePickerStatus("Upload failed: " + message, "error");
            setStatus("Upload failed: " + message, "error");
          })
          .uploadProjectImageJsonFromClient(
            PROJECT_IMAGE_FOLDER_ID,
            bundle.originalName,
            bundle.originalMimeType,
            bundle.originalDataUrl,
            bundle.previewName,
            bundle.previewMimeType,
            bundle.previewDataUrl,
            JSON.stringify(captureImageGeneratorSettings())
          );
        })
        .catch(function (error) {
          appState.imagePicker.isUploading = false;
          console.error("IMAGE OPTIMIZE ERROR", error);

    function buildSeriesMigrationWarning(report) {
      if (!report || !report.issueCounts) return "";
      var parts = [];
      if (Number(report.issueCounts.missingSeriesId || 0) > 0) parts.push(String(report.issueCounts.missingSeriesId) + " missing series_id");
      if (Number(report.issueCounts.missingSeriesRelation || 0) > 0) parts.push(String(report.issueCounts.missingSeriesRelation) + " broken series link");
      if (Number(report.issueCounts.blankSeriesName || 0) > 0) parts.push(String(report.issueCounts.blankSeriesName) + " blank series name");
      if (Number(report.issueCounts.orphanSeries || 0) > 0) parts.push(String(report.issueCounts.orphanSeries) + " orphan series");
      if (Number(report.issueCounts.duplicateSeriesNames || 0) > 0) parts.push(String(report.issueCounts.duplicateSeriesNames) + " duplicate series name");
      return parts.join(" | ");
    }

    function renderSeriesAuditReport(report) {
      if (!el.seriesAuditSummary || !el.seriesAuditOrphanList || !el.seriesAuditOtherIssues) return;
      if (!report) {
        el.seriesAuditSummary.textContent = "No audit report loaded yet.";
        el.seriesAuditOrphanList.innerHTML = "<div class='empty-state'>No orphan series data available yet.</div>";
        el.seriesAuditOtherIssues.innerHTML = "<div class='empty-state'>No audit details available yet.</div>";
        return;
      }

      var orphanCount = Number(report.issueCounts && report.issueCounts.orphanSeries || 0);
      var issuesCount = Number(report.issuesCount || 0);
      if (!issuesCount) {
        el.seriesAuditSummary.textContent = "No series migration issues found. Active projects and series links look healthy.";
      } else {
        el.seriesAuditSummary.textContent =
          issuesCount + " issue(s) found. " +
          (orphanCount ? orphanCount + " orphan series currently look unused by any project. " : "") +
          String(report.autoBackfillReason || "");
      }

      var orphanRows = Array.isArray(report.orphanSeries) ? report.orphanSeries : [];
      el.seriesAuditOrphanList.innerHTML = orphanRows.length
        ? orphanRows.map(function (entry) {
            return "<div class='series-audit-row'>" +
              "<div class='series-audit-row-title'>" + escapeHtml(String(entry && entry.name || "Untitled Series").trim() || "Untitled Series") + "</div>" +
              "<div class='series-audit-row-meta'>Series ID: " + escapeHtml(String(entry && entry.id || "")) + "</div>" +
              "<div class='series-audit-row-meta'>Last updated: " + escapeHtml(formatAuditDate(entry && entry.updatedAt || "")) + "</div>" +
            "</div>";
          }).join("")
        : "<div class='empty-state'>No orphan series found.</div>";

      var otherIssues = [];
      [
        ["Missing series_id", report.missingSeriesId],
        ["Broken series link", report.missingSeriesRelation],
        ["Blank series name", report.blankSeriesName],
        ["Duplicate series names", report.duplicateSeriesNames]
      ].forEach(function (pair) {
        var label = pair[0];
        var items = Array.isArray(pair[1]) ? pair[1] : [];
        items.forEach(function (item) {
          if (label === "Duplicate series names") {
            otherIssues.push(
              "<div class='series-audit-row'>" +
                "<div class='series-audit-row-title'>" + escapeHtml(label + ": " + String(item && item.normalizedName || "").trim()) + "</div>" +
                "<div class='series-audit-row-meta'>" + escapeHtml((item && item.entries || []).map(function (entry) {
                  return "#" + String(entry && entry.id || "") + " " + String(entry && entry.name || "").trim();
                }).join(" | ")) + "</div>" +
              "</div>"
            );
            return;
          }
          otherIssues.push(
            "<div class='series-audit-row'>" +
              "<div class='series-audit-row-title'>" + escapeHtml(label) + "</div>" +
              "<div class='series-audit-row-meta'>" +
                escapeHtml("Project: " + String(item && item.title || "").trim()) +
                (item && item.projectId ? " â€¢ " + escapeHtml("Project ID: " + String(item.projectId || "")) : "") +
                (item && item.seriesId ? " â€¢ " + escapeHtml("Series ID: " + String(item.seriesId || "")) : "") +
              "</div>" +
            "</div>"
          );
        });
      });

      el.seriesAuditOtherIssues.innerHTML = otherIssues.length
        ? otherIssues.join("")
        : "<div class='empty-state'>No other migration issues found.</div>";
    }

    function exportSeriesAuditReport() {
      var report = appState.seriesMigrationReport;
      if (!report) {
        setStatus("No series audit report available yet.", "warn");
        return;
      }
      var lines = [];
      lines.push("Series Migration Audit");
      lines.push("Checked: " + String(report.checkedAt || ""));
      lines.push("Projects: " + String(report.projectCount || 0));
      lines.push("Series: " + String(report.seriesCount || 0));
      lines.push("Issues: " + String(report.issuesCount || 0));
      lines.push("");
      lines.push("Orphan Series:");
      (Array.isArray(report.orphanSeries) ? report.orphanSeries : []).forEach(function (entry) {
        lines.push("- #" + String(entry && entry.id || "") + " " + String(entry && entry.name || "").trim() + " | updated " + formatAuditDate(entry && entry.updatedAt || ""));
      });
      if (!Array.isArray(report.orphanSeries) || !report.orphanSeries.length) {
        lines.push("- None");
      }
      var blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a");
      link.href = url;
      link.download = "series-migration-audit-" + new Date().toISOString().replace(/[:.]/g, "-") + ".txt";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatus("Series audit exported.", "ok");
    }

    async function optimizeLegacyImages() {
      if (appState.imagePicker.isUploading || appState.imagePicker.isLoading) return;
      try {
        appState.imagePicker.isUploading = true;
        const useSupabaseMigration = isSupabaseManagedDocUrlKey("outline_doc_url");
        setImagePickerStatus(useSupabaseMigration ? "Migrating Drive images into Supabase..." : "Scanning for legacy images...", "warn");
        setStatus(useSupabaseMigration ? "Migrating Drive images into Supabase..." : "Scanning for legacy images...", "warn");

        if (useSupabaseMigration) {
          const migration = await callAppsScriptJson("migrateDriveImagesToSupabaseJsonFromClient", [PROJECT_IMAGE_FOLDER_ID]);
          appState.imagePicker.isUploading = false;
          await loadProjects();
          loadDriveImages(true);
          const migratedCount = Number(migration.migratedCount || 0) || 0;
          const updatedRows = Number(migration.updatedRows || 0) || 0;
          setImagePickerStatus("Migrated " + migratedCount + " Drive image" + (migratedCount === 1 ? "" : "s") + " to Supabase.", "ok");
          setStatus("Image migration complete" + (updatedRows ? ". Updated " + updatedRows + " linked image field" + (updatedRows === 1 ? "" : "s") + "." : "."), "ok");
          return;
        }

        const legacy = await callAppsScriptJson("listLegacyProjectImagesJsonFromClient", [PROJECT_IMAGE_FOLDER_ID]);
        const legacyFiles = Array.isArray(legacy.files) ? legacy.files : [];
        if (!legacyFiles.length) {
          appState.imagePicker.isUploading = false;
          setImagePickerStatus("No legacy root-folder images were found.", "ok");
          setStatus("No legacy root-folder images were found.", "ok");
          return;
        }

        let migrated = 0;
        for (let i = 0; i < legacyFiles.length; i += 1) {
          const legacyFile = legacyFiles[i];
          setImagePickerStatus("Optimizing legacy image " + (i + 1) + " of " + legacyFiles.length + "...", "warn");
          const imageData = await callAppsScriptJson("getProjectImageDataJsonFromClient", [legacyFile.id]);
          const blob = await fetch(String(imageData.dataUrl || "")).then(function (response) { return response.blob(); });
          const bundle = await buildOptimizedImageUploadBundle(blob, legacyFile.name);
          const uploadResult = await callAppsScriptJson("uploadProjectImageJsonFromClient", [
            PROJECT_IMAGE_FOLDER_ID,
            bundle.originalName,
            bundle.originalMimeType,
            bundle.originalDataUrl,
            bundle.previewName,
            bundle.previewMimeType,
            bundle.previewDataUrl
          ]);
          await callAppsScriptJson("finalizeLegacyProjectImageMigrationJsonFromClient", [
            PROJECT_IMAGE_FOLDER_ID,
            legacyFile.id,
            legacyFile.url,
            uploadResult.url
          ]);
          migrated += 1;
        }

        appState.imagePicker.isUploading = false;
        setImagePickerStatus("Optimized " + migrated + " legacy image" + (migrated === 1 ? "" : "s") + ".", "ok");
        setStatus("Optimized " + migrated + " legacy image" + (migrated === 1 ? "" : "s") + ".", "ok");
        loadDriveImages(true);
        loadProjects();
      } catch (error) {
        appState.imagePicker.isUploading = false;
        console.error("LEGACY IMAGE OPTIMIZE ERROR", error);
        const message = error && error.message ? error.message : "Legacy image optimization failed.";
        setImagePickerStatus(message, "error");
        setStatus(message, "error");
      }
    }

    async function deleteSelectedImageFromLibrary() {
      const selectedUrl = normalizeImageUrl(appState.imagePicker.selectedUrl || "");
      if (!selectedUrl) {
        setImagePickerStatus("Select an image first.", "error");
        return;
      }

      const selectedFile = (appState.imagePicker.files || []).find(function (file) {
        return normalizeImageUrl(file && file.url || "") === selectedUrl;
      });

      if (!selectedFile || !selectedFile.id) {
        setImagePickerStatus("The selected image could not be resolved.", "error");
        return;
      }

      const label = String(selectedFile.name || "selected image").trim();
      const confirmed = window.confirm("Delete '" + label + "' from the image library?\n\nThis will also clear any project or series image links currently pointing at it.");
      if (!confirmed) return;

      try {
        appState.imagePicker.isUploading = true;
        setImagePickerStatus("Deleting selected image...", "warn");
        setStatus("Deleting selected image...", "warn");

        const result = await callAppsScriptJson("deleteProjectImageJsonFromClient", [
          PROJECT_IMAGE_FOLDER_ID,
          selectedFile.id,
          selectedFile.thumbnailFileId || "",
          selectedFile.url
        ]);

        appState.imagePicker.files = (appState.imagePicker.files || []).filter(function (file) {
          return normalizeImageUrl(file && file.url || "") !== selectedUrl;
        });
        appState.imagePicker.selectedUrl = "";
        appState.imagePicker.isUploading = false;
        renderImagePickerGrid();
        loadProjects();

        setImagePickerStatus("Deleted image. Cleared " + Number(result.updatedRows || 0) + " linked project field" + (Number(result.updatedRows || 0) === 1 ? "" : "s") + ".", "ok");
        setStatus("Image deleted and linked fields cleared.", "ok");
      } catch (error) {
        appState.imagePicker.isUploading = false;
        console.error("IMAGE DELETE ERROR", error);
        const message = error && error.message ? error.message : "Delete failed.";
        setImagePickerStatus(message, "error");
        setStatus(message, "error");
      }
    }

    function getWritingCodexEntries(project) {

          type: "lore",

          body: String(knowledge.lore || "").trim(),
          badge: "Series Guide",

        });
      }

      (skCache.characters && skCache.characters[seriesId] || []).forEach(function (item) {
        var detail = skCache.characterDetails && skCache.characterDetails[item.id] || {};
        entries.push({
          key: "character::" + String(item.id || ""),
          type: "characters",
          title: String(item.name || "Unnamed").trim() || "Unnamed",
          body: String(item.description || item.motivation_arc || item.role_archetype || "").trim(),
          badge: String(item.role_archetype || item.archetype || "").trim(),
          color: String(item.color || "").trim(),
          role: String(item.role_archetype || "").trim(),
          archetype: String(item.archetype || "").trim(),
          scope: String(item.scope || "book").trim() || "book",
          bookLinks: detail.bookLinks || item.bookLinks || []
        });
      });

      (skCache.locations && skCache.locations[seriesId] || []).forEach(function (item) {
        var detail = skCache.locationDetails && skCache.locationDetails[item.id] || {};
        entries.push({
          key: "location::" + String(item.id || ""),
          type: "locations",
          title: String(item.name || "Unnamed").trim() || "Unnamed",
          body: String(item.description || item.significance || item.type || "").trim(),
          badge: String(item.type || "").trim(),
          color: String(item.color || "").trim(),
          scope: String(item.scope || "book").trim() || "book",
          bookLinks: detail.bookLinks || item.bookLinks || []
        });
      });

      (skCache.continuity && skCache.continuity[seriesId] || []).forEach(function (item) {
        var detail = skCache.continuityDetails && skCache.continuityDetails[item.id] || {};
        entries.push({
          key: "continuity::" + String(item.id || ""),
          type: "continuity",
          title: String(item.title || "Untitled").trim() || "Untitled",

    function getWritingCodexEntryByKey(project, key) {

    function stripWritingWorkspaceMarkdown(text) {
      return String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/^#{1,6}\s+/gm, "")
        .replace(/^\s*>\s?/gm, "")
        .replace(/\*\*(.*?)\*\*/g, "$1")
        .replace(/\*(.*?)\*/g, "$1")
        .replace(/__(.*?)__/g, "$1")
        .replace(/_(.*?)_/g, "$1")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/\[(.*?)\]\((.*?)\)/g, "$1")
        .trim();
    }

    function countWritingWorkspaceWords(text) {

      if (Number(level || 0) === 1) return "act";
      if (Number(level || 0) === 2) return "chapter";
      return "section";

      var structureTemplate = getDraftStructureTemplate(selected);
      var templateSection = structureTemplate[0] || {};
      var title = String(templateSection.title || fallbackTitle).trim() || fallbackTitle;
      var kind = inferWritingWorkspaceSegmentKind(title, 1);
      return [{
        key: String(templateSection.sectionKey || templateSection.id || "segment-1").trim() || "segment-1",
        title: title,
        level: 1,
        kind: kind,
        startLine: 0,
        endLine: source.split("\n").length,
        text: source,
        cleanText: stripWritingWorkspaceMarkdown(stripHtmlTags(source)),
        wordCount: countWritingWorkspaceWords(source),
        label: title,
        parentKey: "",
        parentTitle: "",
        childTitles: []
      }];
    }

    function buildWritingWorkspaceTextFromSections(sections) {
      return (Array.isArray(sections) ? sections : [])
        .map(function (section) { return String(section && section.text || "").trim(); })
        .filter(Boolean)
        .join("\n\n")
        .trim();
    }

    function buildWritingWorkspaceSegmentsFromSections(sections, project) {
      var selected = project || getSelectedProject() || {};
      var fallbackTitle = String(selected.title || "Manuscript").trim() || "Manuscript";
      var seen = {};
      return (Array.isArray(sections) ? sections : []).map(function (section, index) {
        var title = String(section && section.title || "").trim() || ("Section " + (index + 1));
        var keyBase = String(section && (section.key || section.sectionKey || section.section_key || section.id) || "").trim();
        var normalizedKey = keyBase || ("segment-" + (index + 1));
        var dedupeKey = normalizedKey.toLowerCase();
        if (seen[dedupeKey]) return null;
        seen[dedupeKey] = true;
        var textBlock = String(section && (section.text || section.markdown_content) || "").trim();
        return {
          key: normalizedKey,
          title: title,
          level: 1,
          kind: inferWritingWorkspaceSegmentKind(title, 1),
          startLine: 0,
          endLine: 0,
          text: textBlock,
          cleanText: stripWritingWorkspaceMarkdown(stripHtmlTags(textBlock)),
          wordCount: Number(section && section.wordCount != null ? section.wordCount : countWritingWorkspaceWords(textBlock)) || 0,
          label: title,
          parentKey: "",
          parentTitle: fallbackTitle,
          childTitles: []
        };
      }).filter(Boolean);
    }

    function buildWritingWorkspaceSectionPayloadsFromText(text, project) {
      var selected = project || getSelectedProject() || {};
      var fallbackTitle = String(selected.title || "Manuscript").trim() || "Manuscript";
      var existing = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var rawText = String(text || "").trim();
      if (!rawText) {
        return [{
          id: "",
          sectionKey: "chapter-1",
          title: fallbackTitle,
          text: "",
          sortOrder: 1
        }];
      }
      return existing.length ? existing.map(function (seg, i) {
        return {
          id: String(seg.key || seg.id || "").trim(),
          sectionKey: String(seg.key || seg.sectionKey || seg.id || "").trim() || ("chapter-" + (i + 1)),
          title: String(seg.title || ("Section " + (i + 1))).trim() || ("Section " + (i + 1)),
          text: String(seg.text || "").trim(),
          sortOrder: i + 1
        };
      }) : [{
        id: "",
        sectionKey: "chapter-1",
        title: fallbackTitle,
        text: rawText,
        sortOrder: 1
      }];
    }

    function getWritingWorkspaceSectionPayloadsCurrent(project) {
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      return segments.map(function (segment, index) {
        var title = String(segment && segment.title || "").trim() || ("Section " + (index + 1));
        var key = String(segment && (segment.key || segment.sectionKey || segment.id) || "").trim() || ("chapter-" + (index + 1));
        var text = String(segment && segment.text || "").trim();
        return {
          id: key,
          sectionKey: key,
          title: title,
          text: text,
          sortOrder: index + 1
        };
      });
    }

    function renumberWritingWorkspaceSections(sectionPayloads) {
      return (Array.isArray(sectionPayloads) ? sectionPayloads : []).map(function (section, index) {
        var chapterNumber = index + 1;
        var parts = parseDraftChapterTitleParts(String(section && section.title || ""), chapterNumber);
        var chapterTitle = buildDraftChapterLabel(chapterNumber, parts.customTitle);
        var nextText = String(section && section.text || "").trim();
        return Object.assign({}, section, {
          id: "chapter-" + chapterNumber,
          sectionKey: "chapter-" + chapterNumber,
          title: chapterTitle,
          text: nextText,
          sortOrder: chapterNumber
        });
      });
    }

    function renderWritingWorkspaceScopeOptions() {

        return "<option value='" + escapeHtml(segment.key) + "'>CHAPTER " + chNum + " - " + escapeHtml(title) + escapeHtml(wordNote) + "</option>";
      });
      el.writingWorkspaceScopeSelect.innerHTML = options.join("");

      if (exists) {

    function renderWritingWorkspaceEditor(project) {

    function loadWritingWorkspaceDraft(forceRefresh, loadVersion) {
      var project = getSelectedProject();
      if (!project) {
        appState.writingWorkspace.draftText = "";
        appState.writingWorkspace.segments = [];
        appState.writingWorkspace.projectRow = 0;
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(null);
        renderWritingCodexList(null);
        renderPlanOutline();
        renderPlanBrainstorm();
        renderPlanCharacterArcs();
        renderPlanWorldBuild();
        refreshWritingWorkspaceSaveState();
        return Promise.resolve("");
      }
      if (!forceRefresh && appState.writingWorkspace.projectRow === Number(project.rowNumber || 0) && appState.writingWorkspace.draftText) {
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(project);
        renderWritingCodexList(project);
        renderPlanOutline();
        renderPlanBrainstorm();
        renderPlanCharacterArcs();
        renderPlanWorldBuild();
        refreshWritingWorkspaceSaveState();
        return Promise.resolve(appState.writingWorkspace.draftText);
      }
      var fallback = String(project.short_summary || "").trim();
      appState.writingWorkspace.projectRow = Number(project.rowNumber || 0);
      if (el.writingWorkspaceTitle) el.writingWorkspaceTitle.textContent = project.title || "Untitled";
      setWritingWorkspaceMeta(project, "");
      renderWritingCodexList(project);
      if (loadVersion == null) loadVersion = appState.writingWorkspace.version;
      if (!Number(project.project_id || 0)) {
        appState.writingWorkspace.draftText = fallback;
        appState.writingWorkspace.lastSavedAt = "";
        appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(
          buildWritingWorkspaceSectionPayloadsFromText(fallback, project),
          project
        );
        appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(project);
        renderWritingCodexList(project);
        renderPlanOutline();
        renderPlanBrainstorm();
        renderPlanCharacterArcs();
        renderPlanWorldBuild();
        refreshWritingWorkspaceSaveState();
        return Promise.resolve(fallback);
      }
      if (el.writingWorkspaceEmpty) {
        el.writingWorkspaceEditor.innerHTML = "";
        el.writingWorkspaceEmpty.hidden = false;
        el.writingWorkspaceEmpty.textContent = "Loading manuscript...";
      }
      return Promise.all([
        callAppsScriptJson("getSupabaseProjectSectionDocumentJsonFromClient", [project.project_id, "draft"]),
        callAppsScriptJson("getSupabaseProjectOutlineJsonFromClient", [project.project_id])
      ]).then(function (results) {
          var result = results[0];
          var outlineResult = results[1];
          if (appState.writingWorkspace.version !== loadVersion) return fallback;
          var sections = Array.isArray(result && result.sections) ? result.sections : [];
          var text = buildWritingWorkspaceTextFromSections(sections) || String(result && result.text || "").trim() || fallback;
          appState.writingWorkspace.draftText = text;
          appState.writingWorkspace.lastSavedAt = "";
          appState.writingWorkspace.segments = sections.length
            ? buildWritingWorkspaceSegmentsFromSections(sections, project)
            : parseWritingWorkspaceSegments(text, project);
          appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
          appState.writingWorkspace.savedSegmentTexts = {};
          appState.writingWorkspace.segments.forEach(function (seg) {
            appState.writingWorkspace.savedSegmentTexts[String(seg.key || "")] = {
              text: String(seg.text || "").trim(),
              title: String(seg.title || "").trim()
            };
          });
          if (outlineResult && outlineResult.ok && outlineResult.outline) {
            appState.writingWorkspace.outline = outlineResult.outline;
          }
          getPlanOutline();
          appState.writingWorkspace.outlineSnapshot = JSON.stringify(appState.writingWorkspace.outline || {});
          populatePlanTextareas();
          cacheWritingWorkspaceDraft(project);
          renderWritingWorkspaceScopeOptions();
          renderWritingWorkspaceEditor(project);
          renderWritingCodexList(project);
          renderPlanOutline();
          renderPlanCharacterArcs();
          renderPlanWorldBuild();
          refreshWritingWorkspaceSaveState();
          return text;
        })
        .catch(function () {
          if (appState.writingWorkspace.version !== loadVersion) return fallback;
          appState.writingWorkspace.draftText = fallback;
          appState.writingWorkspace.lastSavedAt = "";
          appState.writingWorkspace.segments = parseWritingWorkspaceSegments(fallback, project);
          appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
          appState.writingWorkspace.savedSegmentTexts = {};
          appState.writingWorkspace.segments.forEach(function (seg) {
            appState.writingWorkspace.savedSegmentTexts[String(seg.key || "")] = {
              text: String(seg.text || "").trim(),
              title: String(seg.title || "").trim()
            };
          });
          cacheWritingWorkspaceDraft(project);
          renderWritingWorkspaceScopeOptions();
          renderWritingWorkspaceEditor(project);
          renderWritingCodexList(project);
          renderPlanOutline();
          renderPlanCharacterArcs();
          renderPlanWorldBuild();
          refreshWritingWorkspaceSaveState();
          return fallback;
        });
    }

    function openWritingWorkspace() {
      var project = getSelectedProject();
      if (!project) {
        appState.writingWorkspace.draftText = "";

      var isSameProject = appState.writingWorkspace.projectRow === projectRow && appState.writingWorkspace.segments.length > 0;
      if (isSameProject) {

        appState.writingWorkspace.savedSegmentTexts = Object.assign({}, cached.savedSegmentTexts || {});
        appState.writingWorkspace.outline = cached.outline && cached.outline.acts ? cached.outline : null;
        appState.writingWorkspace.outlineSnapshot = String(cached.outlineSnapshot || "");
        appState.writingWorkspace.projectRow = projectRow;
        setWritingWorkspaceFilter(appState.writingWorkspace.filter);
        setWritingWorkspaceSidebarTab(appState.writingWorkspace.sidebarTab);
        updateWritingWorkspaceTypography();
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(project);
        renderWritingCodexList(project);
        renderWritingWorkspaceInspector(project);
        initOutlineFromSegments();
        renderPlanOutline();
        renderPlanBrainstorm();
        renderPlanCharacterArcs();
        renderPlanWorldBuild();
        refreshWritingWorkspaceSaveState();
        if (Number(project.series_id || 0)) {
          Promise.all([
            loadSeriesKnowledgeForSelectedProject(false),
            loadSkEntities(Number(project.series_id || 0))
          ]).finally(function () {
            if (appState.writingWorkspace.version !== version) return;
            renderWritingCodexList(project);
            updateWritingInspectorCodex(project);
          });
        }
        return;
      }
      appState.writingWorkspace.draftText = "";
      appState.writingWorkspace.segments = [];
      appState.writingWorkspace.scope = "";
      appState.writingWorkspace.savedSnapshot = "";
      appState.writingWorkspace.lastSavedAt = "";
      setWritingWorkspaceFilter(appState.writingWorkspace.filter);
      setWritingWorkspaceSidebarTab(appState.writingWorkspace.sidebarTab);
      updateWritingWorkspaceTypography();
      renderWritingCodexList(project);
      renderWritingWorkspaceInspector(project);
      refreshWritingWorkspaceSaveState();
      if (Number(project.series_id || 0)) {
        Promise.all([
          loadSeriesKnowledgeForSelectedProject(false),
          loadSkEntities(Number(project.series_id || 0))
        ]).finally(function () {
          if (appState.writingWorkspace.version !== version) return;
          renderWritingCodexList(project);
          updateWritingInspectorCodex(project);
        });
      }
      loadWritingWorkspaceDraft(true, version);
    }

    function getWritingWorkspaceEditorHtml() {
      return el.writingWorkspaceEditor ? String(el.writingWorkspaceEditor.innerHTML || "").replace(/\r\n/g, "\n") : "";
    }

    function getWritingWorkspaceEditorText() {
      return el.writingWorkspaceEditor ? String(el.writingWorkspaceEditor.innerText || "").replace(/\r\n/g, "\n") : "";
    }

    function getWritingWorkspaceMergedDraftText() {
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      return segments.map(function (s) { return String(s.text || "").trim(); }).join("\n\n");

    function cacheWritingWorkspaceDraft(project) {
      var selected = project || getSelectedProject();
      var projectId = Number(selected && selected.project_id || 0);
      if (!projectId) return;
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      appState.writingWorkspace.draftCache["p-" + projectId] = {
        draftText: String(appState.writingWorkspace.draftText || ""),
        segments: segments.map(function (s) {
          return {
            key: String(s.key || ""),
            title: String(s.title || ""),
            text: String(s.text || ""),
            wordCount: Number(s.wordCount || 0),
            sortOrder: Number(s.sortOrder || 0),
            level: Number(s.level || 1),
            kind: String(s.kind || ""),
            cleanText: String(s.cleanText || ""),
            label: String(s.label || ""),
            parentKey: String(s.parentKey || ""),
            parentTitle: String(s.parentTitle || ""),
            childTitles: Array.isArray(s.childTitles) ? s.childTitles.slice() : []
          };
        }),
        scope: String(appState.writingWorkspace.scope || ""),
        savedSnapshot: String(appState.writingWorkspace.savedSnapshot || ""),
        lastSavedAt: String(appState.writingWorkspace.lastSavedAt || ""),
        projectRow: Number(selected && selected.rowNumber || 0),
        savedSegmentTexts: Object.assign({}, appState.writingWorkspace.savedSegmentTexts || {}),
        outline: JSON.parse(JSON.stringify(appState.writingWorkspace.outline || {})),
        outlineSnapshot: String(appState.writingWorkspace.outlineSnapshot || "")
      };

    function refreshWritingWorkspaceSaveState() {
      var project = getSelectedProject();
      if (!project) {
        updateWritingWorkspaceSaveState("idle", "No draft loaded");
        return;
      }
      if (appState.writingWorkspace.isSaving) {
        updateWritingWorkspaceSaveState("saving", "Saving...");
        return;
      }
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var currentSnapshot = JSON.stringify(segments);
      var isDirty = currentSnapshot !== String(appState.writingWorkspace.savedSnapshot || "");
      if (isDirty) {
        updateWritingWorkspaceSaveState("dirty", "Unsaved changes");
        return;
      }
      if (appState.writingWorkspace.lastSavedAt) {
        updateWritingWorkspaceSaveState("saved", "Saved " + appState.writingWorkspace.lastSavedAt);
        return;
      }
      updateWritingWorkspaceSaveState("idle", "Ready");
    }

    function createWritingWorkspaceNewChapter() {

      if (!project) {
        setStatus("Select a project before adding a chapter.", "warn");
        return;

      var sectionPayloads = getWritingWorkspaceSectionPayloadsCurrent(project);
      var nextIndex = sectionPayloads.length + 1;
      var nextTitle = "Chapter " + nextIndex;
      sectionPayloads.push({
        id: "",
        sectionKey: "chapter-" + nextIndex,
        title: nextTitle,
        text: "<div><br></div>",
        sortOrder: nextIndex
      });
      sectionPayloads = renumberWritingWorkspaceSections(sectionPayloads);
      appState.writingWorkspace.draftText = buildWritingWorkspaceTextFromSections(sectionPayloads);
      appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(sectionPayloads, project);
      appState.writingWorkspace.scope = "chapter-" + nextIndex;
      renderWritingWorkspaceScopeOptions();
      renderWritingWorkspaceEditor(project);
      renderWritingChapterList(project);
      renderPlanOutline();
      scheduleWritingWorkspaceAutoSave();
      refreshWritingWorkspaceSaveState();
      setStatus("New chapter added to the manuscript.", "ok");
    }

    function deleteWritingWorkspaceChapter(sectionKey) {
      var project = getSelectedProject();
      var safeKey = String(sectionKey || "").trim();
      if (!project || !safeKey) {
        setStatus("No chapter selected to delete.", "warn");
        return;
      }
      var sectionPayloads = getWritingWorkspaceSectionPayloadsCurrent(project);
      if (sectionPayloads.length <= 1) {
        setStatus("Keep at least one chapter in the manuscript.", "warn");
        return;
      }
      var target = sectionPayloads.find(function (item) { return String(item.sectionKey || "") === safeKey; }) || null;
      if (!target) {
        setStatus("That chapter could not be found.", "warn");
        return;
      }
      var confirmed = window.confirm("Delete " + String(target.title || "this chapter") + "?");
      if (!confirmed) return;
      sectionPayloads = sectionPayloads.filter(function (item) {
        return String(item.sectionKey || "") !== safeKey;
      });
      sectionPayloads = renumberWritingWorkspaceSections(sectionPayloads);
      appState.writingWorkspace.draftText = buildWritingWorkspaceTextFromSections(sectionPayloads);
      appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(sectionPayloads, project);
      if (String(appState.writingWorkspace.scope || "") === safeKey) {
        appState.writingWorkspace.scope = String(sectionPayloads[0] && sectionPayloads[0].sectionKey || "");
      }
      renderWritingWorkspaceScopeOptions();
      renderWritingWorkspaceEditor(project);
      renderWritingChapterList(project);
      renderPlanOutline();
      scheduleWritingWorkspaceAutoSave();
      refreshWritingWorkspaceSaveState();
      setStatus("Chapter deleted from the manuscript.", "ok");
    }

    function moveWritingWorkspaceChapter(sectionKey, direction) {
      var project = getSelectedProject();
      var safeKey = String(sectionKey || "").trim();
      if (!project || !safeKey) return;
      var sectionPayloads = getWritingWorkspaceSectionPayloadsCurrent(project);
      var index = sectionPayloads.findIndex(function (item) { return String(item.sectionKey || "") === safeKey; });
      if (index < 0) return;
      var swapIndex = direction === "up" ? index - 1 : index + 1;
      if (swapIndex < 0 || swapIndex >= sectionPayloads.length) return;
      var temp = sectionPayloads[index];
      sectionPayloads[index] = sectionPayloads[swapIndex];
      sectionPayloads[swapIndex] = temp;
      sectionPayloads = renumberWritingWorkspaceSections(sectionPayloads);
      appState.writingWorkspace.draftText = buildWritingWorkspaceTextFromSections(sectionPayloads);
      appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(sectionPayloads, project);
      appState.writingWorkspace.scope = "chapter-" + (swapIndex + 1);
      renderWritingWorkspaceScopeOptions();
      renderWritingWorkspaceEditor(project);
      renderWritingChapterList(project);
      renderPlanOutline();
      scheduleWritingWorkspaceAutoSave();
      refreshWritingWorkspaceSaveState();
      setStatus("Chapter moved " + direction + ".", "ok");
    }

      var sceneCount = segments.filter(function (s) { return String(s.title || "").toLowerCase().indexOf("scene") !== -1; }).length;
      var nextSceneNumber = sceneCount + 1;
      var nextIndex = segments.length + 1;
      var newSection = {
        key: "chapter-" + nextIndex,
        title: "Scene " + nextSceneNumber,
        text: "",
        sortOrder: nextIndex
      };
      segments.push(newSection);
      appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(segments, project);
      appState.writingWorkspace.scope = newSection.key;
      renderWritingWorkspaceScopeOptions();
      renderWritingWorkspaceEditor(project);

      scheduleWritingWorkspaceAutoSave();

    function saveWritingWorkspaceDraft(options) {
      var settings = options && typeof options === "object" ? options : {};
      var project = getSelectedProject();
      if (!project || !Number(project.project_id || 0)) return Promise.resolve(null);
      var scope = String(appState.writingWorkspace.scope || "");
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var target = segments.find(function (item) { return item.key === scope; }) || null;
      if (target) {
        target.text = String(getWritingWorkspaceEditorHtml() || "").trim();
      }
      var snapshot = JSON.stringify(segments);
      if (snapshot === String(appState.writingWorkspace.savedSnapshot || "")) {
        if (!settings.autosave) setWritingWorkspaceMeta(project, appState.writingWorkspace.lastSavedAt ? ("Saved " + appState.writingWorkspace.lastSavedAt) : "Saved");
        refreshWritingWorkspaceSaveState();
        return Promise.resolve(null);
      }
      appState.writingWorkspace.isSaving = true;
      setWritingWorkspaceMeta(project, settings.autosave ? "Autosaving..." : "Saving...");
      refreshWritingWorkspaceSaveState();
      var draftPromise = callAppsScriptJson("saveSupabaseProjectSectionDocumentJsonFromClient", [
        project.project_id,
        "draft",
        String(project.title || "Project").trim() + " - Draft",
        JSON.stringify(segments)
      ]);
      var outlinePromise = settings.autosave ? Promise.resolve(null) : savePlanOutline();
      return Promise.all([draftPromise, outlinePromise]).then(function () {
        appState.writingWorkspace.isSaving = false;
        appState.writingWorkspace.draftText = segments.map(function (s) { return String(s.text || "").trim(); }).join("\n\n");
        appState.writingWorkspace.lastSavedAt = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(segments, project);
        appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
        appState.writingWorkspace.savedSegmentTexts = {};
        appState.writingWorkspace.segments.forEach(function (seg) {
          appState.writingWorkspace.savedSegmentTexts[String(seg.key || "")] = {
            text: String(seg.text || "").trim(),
            title: String(seg.title || "").trim()
          };
        });
        cacheWritingWorkspaceDraft(project);
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceInspector(project);
        renderWritingChapterList(project);
        renderPlanOutline();
        setWritingWorkspaceMeta(project, "Saved " + appState.writingWorkspace.lastSavedAt);
        refreshWritingWorkspaceSaveState();
        setStatus(settings.autosave ? "Writing workspace autosaved." : "Writing workspace saved.", "ok");
        return true;
      }).catch(function (error) {
        appState.writingWorkspace.isSaving = false;
        setWritingWorkspaceMeta(project, "Save failed");
        refreshWritingWorkspaceSaveState();
        setStatus("Writing workspace save failed: " + (error && error.message ? error.message : error), "error");
        return null;
      });
    }

    function getDashboardSeriesCards() {
      const grouped = {};
      appState.projects.forEach(function (project) {
        const key = String(project.series || "Standalone").trim() || "Standalone";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(project);
      });

      return Object.keys(grouped).map(function (seriesName) {
        const projects = grouped[seriesName].slice().sort(function (a, b) {
          return Number(a.b_number || 0) - Number(b.b_number || 0);
        });
        const seriesImageProject = projects.find(function (project) { return !!String(project.series_image || "").trim(); }) || null;
        const coverProject = projects.find(function (project) { return !!String(project.image || "").trim(); }) || projects[0];
        const statuses = {};
        projects.forEach(function (project) {
          const key = String(project.status || "Idea").trim() || "Idea";
          statuses[key] = (statuses[key] || 0) + 1;
        });
        return {
          series: seriesName,
          filterValue: projects[0] && projects[0].series ? projects[0].series : "",
          projects: projects,
          seriesImage: seriesImageProject ? String(seriesImageProject.series_image || "").trim() : "",
          cover: coverProject,
          count: projects.length,
          statuses: statuses
        };
      }).sort(function (a, b) {
        if (a.series === "Standalone" && b.series !== "Standalone") return 1;
        if (a.series !== "Standalone" && b.series === "Standalone") return -1;
        return a.series.localeCompare(b.series);
      });
    }

    function getDashboardTopTasks(projects) {
      return (projects || []).slice().sort(function (a, b) {
        const priorityRank = { High: 0, Medium: 1, Low: 2 };
        const statusRank = { Writing: 0, Draft: 1, Editing: 2, Planning: 3, Concept: 4, Idea: 5, Complete: 6 };
        const aPriority = priorityRank[a.priority] != null ? priorityRank[a.priority] : 9;
        const bPriority = priorityRank[b.priority] != null ? priorityRank[b.priority] : 9;
        if (aPriority !== bPriority) return aPriority - bPriority;
        const aStatus = statusRank[a.status] != null ? statusRank[a.status] : 9;
        const bStatus = statusRank[b.status] != null ? statusRank[b.status] : 9;
        if (aStatus !== bStatus) return aStatus - bStatus;
        return String(a.title || "").localeCompare(String(b.title || ""));
      });
    }

    function getProjectsForSeries(seriesName) {
      const safeSeries = String(seriesName || "").trim();
      return appState.projects
        .filter(function (project) {
          return String(project.series || "").trim() === safeSeries;
        })
        .sort(function (a, b) {
          const aHasBook = String(a.b_number || "").trim() !== "";
          const bHasBook = String(b.b_number || "").trim() !== "";
          const aBook = Number(a.b_number);
          const bBook = Number(b.b_number);
          const aValid = aHasBook && Number.isFinite(aBook);
          const bValid = bHasBook && Number.isFinite(bBook);
          if (aValid && bValid && aBook !== bBook) return aBook - bBook;
          if (aValid && !bValid) return -1;
          if (!aValid && bValid) return 1;
          return String(a.title || "").localeCompare(String(b.title || ""));
        });
    }

    function saveSeriesDocUrl(field, url) {
      const project = getSelectedProject();
      if (!project) return;
      if (project.series_id && isSupabaseManagedDocUrlKey(field)) {
        var docType = SERIES_DOC_FIELD_TO_TYPE[field] || "";
        if (!docType) {
          setStatus("Series document type is not configured for " + field + ".", "error");
          return;
        }
        setStatus("Saving legacy series doc link...", "warn");
        callAppsScriptJson("saveSupabaseSeriesLegacyDocUrlJsonFromClient", [project.series_id, docType, url])
          .then(function (result) {
            var seriesId = Number(project.series_id || 0);
            if (seriesId) {
              var current = appState.seriesMetaById[seriesId] || {
                id: seriesId,
                name: String(project.series || "").trim(),
                summary: String(project.series_summary || "").trim(),
                seriesImageUrl: String(project.series_image || "").trim(),
                docs: {}
              };
              current.docs = current.docs || {};
              current.docs[field] = {
                docType: docType,
                title: String(result && result.title || "").trim(),
                legacyUrl: String(result && result.legacyUrl || url || "").trim(),
                updatedAt: String(result && result.savedAt || "").trim(),
                exists: true
              };
              appState.seriesMetaById[seriesId] = current;
            }
            applySeriesMetaToProjects();
            setStatus("Series legacy link saved.", "ok");
            renderLandingDashboard();
            if (Number(appState.selectedRowNumber || 0) === Number(project.rowNumber || 0)) {
              renderProjectDetails(project.rowNumber);
            }
          })
          .catch(function (error) {
            setStatus("Error: " + (error && error.message ? error.message : String(error || "Unknown error")), "error");
          });
        return;
      }
      var payload = {
        rowNumber: project.rowNumber,
        project_id: project.project_id,
        title: project.title,
        series: project.series
      };
      payload[field] = url;
      setStatus("Saving series doc link...", "warn");
      supabaseRunner
        .withSuccessHandler(function (json) {
          var result = JSON.parse(json);
          if (result && result.ok) {
            appState.projects.forEach(function (p) {
              if (String(p.series || "").trim() === String(project.series || "").trim()) {
                p[field] = url;
              }
            });
            setStatus("Series doc link saved and propagated.", "ok");
            renderLandingDashboard();
          } else {
            setStatus("Failed to save series doc link.", "error");
          }

    function renderTimeline() {
      var events = [];
      var now = new Date();
      var sixMonthsAgo = new Date(now);
      sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 3);
      var twelveMonthsOut = new Date(now);
      twelveMonthsOut.setMonth(twelveMonthsOut.getMonth() + 12);

      var filterSeries = String(appState.timelineFilterSeries || "All").trim();
      var filterProject = String(appState.timelineFilterProject || "All").trim();
      var ghostMode = appState.timelineGhostMode && (filterSeries !== "All" || filterProject !== "All");

      appState.projects.forEach(function (p) {
        var matchesFilter = true;
        if (filterSeries !== "All" && (p.series || "") !== filterSeries) matchesFilter = false;
        if (filterProject !== "All" && String(p.rowNumber) !== filterProject) matchesFilter = false;
        if (!ghostMode && !matchesFilter) return;
        var milestones = Array.isArray(p.schedule_milestones) ? p.schedule_milestones : [];
        milestones.forEach(function (m) {
          if (!m.date) return;
          var d = new Date(m.date);
          if (d < sixMonthsAgo || d > twelveMonthsOut) return;
          events.push({
            date: m.date,
            title: (p.title || "Untitled") + " â€” " + m.name,
            projectTitle: p.title || "",
            milestoneName: m.name || "",
            type: m.name === "PUBLISH" ? "release" : "milestone",
            projectRow: p.rowNumber,
            completed: !!m.completed,
            ghost: ghostMode && !matchesFilter
          });
        });
        var campaigns = Array.isArray(p.campaigns) ? p.campaigns : [];
        campaigns.forEach(function (c) {
          if (!c.startDate) return;
          var sd = new Date(c.startDate);
          if (sd < sixMonthsAgo || sd > twelveMonthsOut) return;
          events.push({
            date: c.startDate,
            title: (p.title || "Untitled") + " â€” " + (c.name || "Campaign") + (c.channel ? " (" + c.channel + ")" : ""),
            projectTitle: p.title || "",
            milestoneName: (c.name || "Campaign") + (c.channel ? " (" + c.channel + ")" : ""),
            type: "campaign",
            projectRow: p.rowNumber,
            completed: false,
            ghost: ghostMode && !matchesFilter
          });
          (c.tasks || []).forEach(function (t) {
            if (!t.dueDate) return;
            var td = new Date(t.dueDate);
            if (td < sixMonthsAgo || td > twelveMonthsOut) return;
            events.push({
              date: t.dueDate,
              title: (p.title || "Untitled") + " â€” Task: " + (t.name || "Untitled task"),
              projectTitle: p.title || "",
              milestoneName: "Task: " + (t.name || "Untitled task"),
              type: "task",
              projectRow: p.rowNumber,
              completed: t.status === "done",
              ghost: ghostMode && !matchesFilter
            });
          });
        });
      });

      events.sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

      var grouped = {};
      events.forEach(function (e) {
        var monthKey = e.date.slice(0, 7);
        if (!grouped[monthKey]) grouped[monthKey] = [];
        grouped[monthKey].push(e);
      });

      var monthKeys = Object.keys(grouped).sort();
      var html = monthKeys.map(function (mk) {
        var parts = mk.split("-");
        var year = parts[0], month = parts[1];
        var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        var label = monthNames[Number(month) - 1] + " " + year;
        var eventsHtml = grouped[mk].map(function (e) {
          var cls = "timeline-event is-" + e.type + (e.completed ? " is-completed" : "") + (e.ghost ? " is-ghost" : "");
          var day = e.date.slice(8);
          if (e.ghost) {
            return "<div class='" + cls + "' data-row='" + e.projectRow + "'>" +
              "<div class='timeline-event-ghost-line'>" + escapeHtml(e.milestoneName) + " - " + escapeHtml(e.projectTitle) + " - " + day + " " + label + "</div>" +
            "</div>";
          }
          return "<div class='" + cls + "' data-row='" + e.projectRow + "'>" +
            "<div class='timeline-event-title'>" + escapeHtml(e.milestoneName) + "</div>" +
            "<div class='timeline-event-date'>" + escapeHtml(e.projectTitle) + " â€” " + day + " " + label + "</div>" +
          "</div>";
        }).join("");
        return "<div class='timeline-month-card' data-month='" + mk + "'>" +
          "<div class='timeline-month-label'>" + escapeHtml(label) + "</div>" +
          eventsHtml +
        "</div>";
      }).join("");

      [document.querySelector("#publishingTimeline .timeline-card-list"), document.querySelector("#marketingTimeline .timeline-card-list")].forEach(function (list) {
        if (list) list.innerHTML = html || "<div class='landing-empty'>No scheduled events yet. Change a project status to Publish Ready to generate a timeline.</div>";
      });
    }

    function scrollTimelineTo(monthKey) {
      if (!monthKey) return;
      var selector = "[data-month='" + monthKey + "']";
      [document.querySelector("#publishingTimeline .timeline-card-list"), document.querySelector("#marketingTimeline .timeline-card-list")].forEach(function (list) {
        if (!list) return;
        var card = list.querySelector(selector);
        if (!card) return;
        var scrollLeft = card.offsetLeft - (list.clientWidth / 2) + (card.offsetWidth / 2);
        list.scrollTo({ left: Math.max(0, scrollLeft), behavior: "smooth" });

    function applyFilters(preserveDetailSelection) {
      const searchTerm = el.searchInput.value.trim().toLowerCase();
      const series = el.seriesFilter.value || "All";
      const penName = el.penNameFilter.value || "All";
      const genre = el.genreFilter.value || "All";
      const format = el.formatFilter.value || "All";
      const status = el.statusFilter.value || "All";
      const priority = el.priorityFilter.value || "All";

      appState.filteredProjects = appState.projects.filter(function (project) {
        const haystack = [
          project.title,
          project.series,
          project.pen_name,
          project.genre,
          project.format,
          project.b_number,
          project.short_summary,
          project.next_step,
          project.project_id
        ].join(" ").toLowerCase();

        const matchesSearch = !searchTerm || haystack.indexOf(searchTerm) !== -1;
        const matchesSeries = series === "All" || project.series === series;
        const matchesPenName = penName === "All" || project.pen_name === penName;
        const matchesGenre = genre === "All" || project.genre === genre;
        const matchesFormat = format === "All" || project.format === format;
        const matchesStatus = status === "All" || project.status === status;
        const matchesPriority = priority === "All" || project.priority === priority;

        return matchesSearch && matchesSeries && matchesPenName && matchesGenre && matchesFormat && matchesStatus && matchesPriority;
      });

      appState.filteredProjects.sort(function (a, b) {
        const seriesA = String(a.series || "").trim().toLowerCase();
        const seriesB = String(b.series || "").trim().toLowerCase();

        if (seriesA < seriesB) return -1;
        if (seriesA > seriesB) return 1;

        const hasBookA = String(a.b_number || "").trim() !== "";
        const hasBookB = String(b.b_number || "").trim() !== "";
        const bookA = Number(a.b_number);
        const bookB = Number(b.b_number);
        const validBookA = hasBookA && Number.isFinite(bookA);
        const validBookB = hasBookB && Number.isFinite(bookB);

        if (validBookA && validBookB && bookA !== bookB) {
          return bookA - bookB;
        }

        if (validBookA && !validBookB) return -1;
        if (!validBookA && validBookB) return 1;

        const titleA = String(a.title || "").trim().toLowerCase();
        const titleB = String(b.title || "").trim().toLowerCase();

        if (titleA < titleB) return -1;
        if (titleA > titleB) return 1;

        return 0;
      });

      renderProjectsTable();

      const stillVisible = appState.filteredProjects.some(function (p) {
        return Number(p.rowNumber) === Number(appState.selectedRowNumber);

      if (preserveDetailSelection === true) {

    function propagateSeriesImageInState(project) {
      const safeProject = project || {};
      const safeSeries = String(safeProject.series || "").trim();
      if (!safeSeries || !Object.prototype.hasOwnProperty.call(safeProject, "series_image")) return;
      const safeSeriesImage = String(safeProject.series_image || "").trim();

      [appState.projects, appState.filteredProjects].forEach(function (collection) {
        if (!Array.isArray(collection)) return;
        collection.forEach(function (entry) {
          if (String(entry && entry.series || "").trim() !== safeSeries) return;
          entry.series_image = safeSeriesImage;
        });
      });
    }

    function propagateSeriesDocFieldsInState(project) {
      const safeProject = project || {};
      const safeSeries = String(safeProject.series || "").trim();
      if (!safeSeries) return;

      [appState.projects, appState.filteredProjects].forEach(function (collection) {
        if (!Array.isArray(collection)) return;
        collection.forEach(function (entry) {
          if (String(entry && entry.series || "").trim() !== safeSeries) return;
          SERIES_DOC_URL_FIELDS.forEach(function (field) {
            if (!Object.prototype.hasOwnProperty.call(safeProject, field)) return;
            entry[field] = String(safeProject[field] || "").trim();
          });
        });
      });
    }

    function mergeProjectUpdate(updated, serverMeta) {
      const merged = mergeProjectWithExisting(updated, serverMeta);
      if (!usesSupabaseSeriesOwnedFields()) {
        propagateSeriesImageInState(merged);
        propagateSeriesDocFieldsInState(merged);
      }

      const index = appState.projects.findIndex(function (p) {
        return Number(p.rowNumber) === Number(merged.rowNumber);
      });

      if (index === -1) {
        appState.projects.unshift(merged);
      } else {
        appState.projects[index] = merged;
      }

      persistProjectsToCache();
      populateFilters();
      applyFilters();
      selectProject(merged.rowNumber);
    }

      Object.keys(SERIES_DOC_FIELD_TO_TYPE).forEach(function (fieldKey) {
        payload[fieldKey] = getMergedSeriesDocValue(payload, fieldKey);
      });
      var savePayload = stripSeriesOwnedFieldsFromProjectPayload(payload);
      var existing = getProjectByRow(payload.rowNumber);
      var wasPublishReady = existing && (existing.status === "Publish Ready" || existing.status === "Published");
      var isPublishReady = savePayload.status === "Publish Ready" || savePayload.status === "Published";
      var dateChanged = savePayload.publish_date !== (existing && existing.publish_date || "");
      var tmplChanged = savePayload.schedule_template !== (existing && existing.schedule_template || "");
      if (wasPublishReady && !isPublishReady) {
        savePayload.publish_ready_date = "";
        savePayload.schedule_milestones = [];
        if (Array.isArray(savePayload.campaigns)) {
          savePayload.campaigns = savePayload.campaigns.filter(function (c) { return c._auto !== "marketing"; });
        }
      } else if (!wasPublishReady && isPublishReady) {
        savePayload.publish_ready_date = new Date().toISOString().split("T")[0];
          var tmplName = savePayload.schedule_template || getDefaultScheduleTemplateName();
        savePayload.schedule_template = tmplName;
        var tmpl = SCHEDULE_TEMPLATES[tmplName];
        if (tmpl) {
          var baseDate = savePayload.publish_date || savePayload.publish_ready_date;
          var shift = 0;
          if (savePayload.publish_date) {
            tmpl.milestones.some(function (m) { if (m.name === "PUBLISH") { shift = m.dayOffset; return true; } return false; });
          }
          savePayload.schedule_milestones = calcMilestoneDates(tmpl.milestones, baseDate, shift);
        }
      } else if (isPublishReady && (dateChanged || tmplChanged)) {
          var tmplName2 = savePayload.schedule_template || getDefaultScheduleTemplateName();
        savePayload.schedule_template = tmplName2;
        var tmpl2 = SCHEDULE_TEMPLATES[tmplName2];
        if (tmpl2) {
          savePayload.publish_ready_date = existing && existing.publish_ready_date || new Date().toISOString().split("T")[0];
          var baseDate2 = savePayload.publish_date || savePayload.publish_ready_date;
          var shift2 = 0;
          if (savePayload.publish_date) {
            tmpl2.milestones.some(function (m) { if (m.name === "PUBLISH") { shift2 = m.dayOffset; return true; } return false; });
          }
          savePayload.schedule_milestones = calcMilestoneDates(tmpl2.milestones, baseDate2, shift2);
        }
      }
      if (isPublishReady && savePayload.marketing_template) {
        var mktTmpl = MARKETING_TEMPLATES[savePayload.marketing_template];
        if (mktTmpl && mktTmpl.entries && mktTmpl.entries.length) {
          if (!Array.isArray(savePayload.campaigns)) savePayload.campaigns = [];
          var existingCampaign = savePayload.campaigns.find(function (c) { return c._auto === "marketing"; });
          var pubDate = savePayload.publish_date || savePayload.publish_ready_date || new Date().toISOString().split("T")[0];
          var tasks = mktTmpl.entries.map(function (e) {
            var d = new Date(pubDate);
            d.setDate(d.getDate() + e.dayOffset);
            return { name: e.taskName, dueDate: d.toISOString().split("T")[0], status: "pending" };
          });
          if (existingCampaign) {
            existingCampaign.tasks = tasks;
            existingCampaign.name = "Marketing Plan: " + savePayload.marketing_template;
            existingCampaign.startDate = pubDate;
          } else {
            savePayload.campaigns.push({
              _auto: "marketing",
              name: "Marketing Plan: " + savePayload.marketing_template,
              channel: "Automated",
              startDate: pubDate,
              endDate: "",
              notes: "Auto-generated from " + savePayload.marketing_template + " template",
              tasks: tasks
            });
          }
        }
      } else if (isPublishReady && !savePayload.marketing_template && Array.isArray(savePayload.campaigns)) {
        savePayload.campaigns = savePayload.campaigns.filter(function (c) { return c._auto !== "marketing"; });
      }
      updateProjectInStateQuiet(savePayload, { rowNumber: savePayload.rowNumber, project_id: savePayload.project_id });
      return savePayload;
    }

    function persistProjectsToCache() {
      try {
        localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify({
          projects: appState.projects,
          nextStepOptions: appState.nextStepOptions
        }));
      } catch (err) {
        console.warn("Cache write failed", err);
      }
    }

    function loadProjectsFromCache() {
      try {
        const raw = localStorage.getItem(LOCAL_CACHE_KEY);
        if (!raw) return false;

        const cached = JSON.parse(raw);
        const cachedProjects = Array.isArray(cached) ? cached : cached.projects;
        const cachedNextSteps = Array.isArray(cached && cached.nextStepOptions) ? cached.nextStepOptions : [];

        if (!Array.isArray(cachedProjects) || !cachedProjects.length) return false;

        appState.projects = cachedProjects
          .map(normalizeProject)
          .filter(function (p) { return !!p; });

        appState.nextStepOptions = cachedNextSteps
          .map(function (v) { return String(v || "").trim(); })
          .filter(function (v) { return !!v; });

        populateFilters();
        loadInspectorOptions();
        applyFilters();

        if (appState.projects.length) {
          selectProject(appState.projects[0].rowNumber, { syncSeriesFilter: false });
        } else {
          clearDetails();
        }

        setStatus("Loaded cached projects. Syncing live data...", "warn");
        return true;
      } catch (err) {
        console.warn("Cache read failed", err);
        return false;
      }
    }

    function parseServerResult(json) {
      const result = typeof json === "string" ? JSON.parse(json) : json;
      if (!result || typeof result !== "object") {
        throw new Error("Invalid server response.");
      }
      return result;
    }

    function loadProjects() {
      if (!loadProjectsFromCache()) {
        setStatus("Loading projects...", "warn");
      }

      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) {
        setStatus("supabaseRunner not available.", "error");
        return;
      }

      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const payload = parseServerResult(json);

            if (payload.ok === false) {
              throw new Error(payload.error || "Load failed.");
            }

            const safeRows = Array.isArray(payload.rows) ? payload.rows : [];

            appState.projects = safeRows
              .map(normalizeProject)
              .filter(function (p) { return !!p; });

            appState.nextStepOptions = Array.isArray(payload.nextStepOptions)
              ? payload.nextStepOptions.map(function (v) { return String(v || "").trim(); }).filter(function (v) { return !!v; })
              : [];

            loadSeriesMeta().then(function () {
              persistProjectsToCache();
              populateFilters();
              loadInspectorOptions();
              applyFilters();

              if (appState.projects.length) {
                const stillExists = appState.projects.some(function (p) {
                  return Number(p.rowNumber) === Number(appState.selectedRowNumber);
                });

                if (stillExists) {
                  selectProject(appState.selectedRowNumber);
                } else {
                  selectProject(appState.projects[0].rowNumber);
                }
              } else {
                clearDetails();
              }

              setStatus(
                (payload.build || "JSON_TRANSPORT") +
                " | server_count=" + (payload.count || 0) +
                " | client_count=" + appState.projects.length,
                "ok"
              );
              validateSeriesMigration();
            });
          } catch (err) {
            console.error("PARSE ERROR", err, json);
            setStatus("Load failed: " + err.message, "error");
          }
        })
        .withFailureHandler(function (error) {
          console.error("LOAD ERROR", error);
          setStatus("Load failed: " + (error && error.message ? error.message : error), "error");
        })
        .getProjectsJsonForClient();
    }

    function saveSelectedProject(isAutosave) {
      const detailPayload = collectDetailFormData();

      if (!detailPayload) {
        setStatus("Select a project first.", "error");
        return;
      }

      if (!detailPayload.series) {
        setStatus("Series is required.", "error");
        el.detailSeries.focus();
        return;
      }

      const payload = stripSeriesOwnedFieldsFromProjectPayload(detailPayload);

      appState.pendingSavePayload = payload;

      if (appState.isSaving) {
        appState.hasPendingSave = true;
        appState.isDirty = true;
        setStatus("Queued latest changes...", "warn");
        return;
      }

      appState.isSaving = true;
      appState.hasPendingSave = false;
      appState.pendingSavePayload = null;

      setStatus(isAutosave ? "Autosaving in background..." : "Saving changes...", "warn");

      supabaseRunner
        .withSuccessHandler(function (json) {
          appState.isSaving = false;

          try {
            const result = parseServerResult(json);

            if (result.ok === false) {
              throw new Error(result.error || "Save failed.");
            }

            const newerChangesWaiting = appState.hasPendingSave || appState.isDirty;

            if (!newerChangesWaiting) {
              updateProjectInStateQuiet(payload, result);
              appState.isDirty = false;
              appState.pendingSavePayload = null;
              const propagatedCount = Number(result && result.propagatedSeriesImageCount || 0);
              const savedMessage = isAutosave ? "Changes autosaved." : "Changes saved.";
              setStatus(
                propagatedCount > 1
                  ? savedMessage + " Series image applied to " + propagatedCount + " books."
                  : savedMessage,
                "ok"
              );
            } else {
              setStatus("Saving latest queued changes...", "warn");
            }
          } catch (err) {
            console.error("SAVE PARSE ERROR", err, json);
            setStatus("Save failed: " + err.message, "error");
          }

          if (appState.hasPendingSave || appState.isDirty) {
            appState.hasPendingSave = false;
            appState.isDirty = false;
            saveSelectedProject(true);
          }
        })
        .withFailureHandler(function (error) {
          appState.isSaving = false;
          console.error("SAVE ERROR", error);
          setStatus("Save failed: " + (error && error.message ? error.message : error), "error");

          if (appState.hasPendingSave || appState.isDirty) {
            appState.hasPendingSave = false;
          }
        })
        .saveProjectJsonFromClient(JSON.stringify(payload));
    }

    function populateStorySeedSelect(select, options, selected, blankLabel) {
      if (!select) return;
      const current = selected != null ? selected : String(select.value || "").trim();
      select.innerHTML = "";
      select.appendChild(createOption("", blankLabel || "Select option"));
      (options || []).forEach(function (item) {
        const option = document.createElement("option");
        option.value = getStorySeedOptionValue(item);
        option.textContent = getStorySeedOptionLabel(item);
        select.appendChild(option);
      });
      if (current && Array.prototype.some.call(select.options, function (option) { return option.value === current; })) {
        select.value = current;
      } else {
        select.value = "";
      }
    }

    function buildStorySeedOrderedArcOptions(fieldKey, preferredLabels) {
      const preferred = Array.isArray(preferredLabels) ? preferredLabels.filter(Boolean) : [];
      const preferredTokens = preferred.map(normalizeStorySeedToken).filter(Boolean);
      const base = getStorySeedOptionValues(fieldKey);
      const seen = {};
      const ordered = [];

      base.forEach(function (item) {
        const token = normalizeStorySeedToken(getStorySeedOptionLabel(item));
        if (preferredTokens.some(function (preferredToken) {
          return token === preferredToken || token.indexOf(preferredToken) !== -1 || preferredToken.indexOf(token) !== -1;
        })) {
          if (!seen[token]) {
            seen[token] = true;
            ordered.push(item);
          }
        }
      });

      base.forEach(function (item) {
        const token = normalizeStorySeedToken(getStorySeedOptionLabel(item));
        if (!seen[token]) {
          seen[token] = true;
          ordered.push(item);
        }
      });

      return ordered;
    }

    function getStorySeedMatchingHybrid(primaryGenre, secondaryModifier) {
      const engine = appState.storySeed.engine || {};
      const hybrids = Array.isArray(engine.hybrids) ? engine.hybrids : [];
      const primaryToken = normalizeStorySeedToken(primaryGenre);
      const modifierToken = normalizeStorySeedToken(secondaryModifier);
      return hybrids.find(function (hybrid) {
        return normalizeStorySeedToken(hybrid.primaryGenre) === primaryToken &&
          normalizeStorySeedToken(hybrid.secondaryModifier) === modifierToken;
      }) || null;
    }

    function renderStorySeedGuidance() {
      const engine = appState.storySeed.engine || {};
      const primaryGenre = String(el.storySeedPrimaryGenre && el.storySeedPrimaryGenre.value || "").trim();
      const secondaryModifier = String(el.storySeedSecondaryGenre && el.storySeedSecondaryGenre.value || "").trim();
      const guide = engine.genreMap && primaryGenre ? engine.genreMap[primaryGenre] : null;
      const hybrid = getStorySeedMatchingHybrid(primaryGenre, secondaryModifier);
      const lines = [];

      if (!primaryGenre) {
        setStorySeedGuidance("Choose a primary genre to load the engine guidance.");
        return;
      }

      lines.push(primaryGenre + " engine");
      if (guide && guide.generatorInstruction) lines.push("Generator instruction: " + guide.generatorInstruction);
      if (guide && guide.breakRisks) lines.push("Break risks: " + guide.breakRisks);
      if (guide && guide.cozyAdaptation) lines.push("Cozy adaptation: " + guide.cozyAdaptation);
      if (guide && guide.romanceAdaptation) lines.push("Romance adaptation: " + guide.romanceAdaptation);

      if (hybrid) {
        lines.push("");
        lines.push("Safe hybrid: " + hybrid.hybridName);
        if (hybrid.whyItEnhances) lines.push("Why it enhances: " + hybrid.whyItEnhances);
        if (hybrid.mustKeepGenrePromise) lines.push("Must keep: " + hybrid.mustKeepGenrePromise);
        if (hybrid.avoidBecauseItBreaks) lines.push("Avoid: " + hybrid.avoidBecauseItBreaks);
      }

      setStorySeedGuidance(lines.join("\n"));
    }

    function updateStorySeedDependentSelects(keepExisting) {
      const engine = appState.storySeed.engine || {};
      const primaryGenre = String(el.storySeedPrimaryGenre && el.storySeedPrimaryGenre.value || "").trim();
      const secondaryModifier = String(el.storySeedSecondaryGenre && el.storySeedSecondaryGenre.value || "").trim();
      const guide = engine.genreMap && primaryGenre ? engine.genreMap[primaryGenre] : null;
      const hybrid = getStorySeedMatchingHybrid(primaryGenre, secondaryModifier);
      const storyPreferred = [].concat(hybrid && hybrid.storyArc ? [hybrid.storyArc] : [], guide && guide.primaryStoryArcs ? guide.primaryStoryArcs : []);
      const characterPreferred = [].concat(hybrid && hybrid.characterArc ? [hybrid.characterArc] : [], guide && guide.bestCharacterArcs ? guide.bestCharacterArcs : []);
      const relationshipPreferred = [].concat(hybrid && hybrid.relationshipArc ? [hybrid.relationshipArc] : [], guide && guide.bestRelationshipArcs ? guide.bestRelationshipArcs : []);

      [
        { key: "storyArc", preferred: storyPreferred },
        { key: "characterArc", preferred: characterPreferred },
        { key: "relationshipArc", preferred: relationshipPreferred }
      ].forEach(function (item) {
        const select = getStorySeedSelectElement(item.key);
        if (!select) return;
        const currentValue = keepExisting ? String(select.value || "").trim() : "";
        const options = buildStorySeedOrderedArcOptions(item.key, item.preferred);
        const preferredValue = options.length ? getStorySeedOptionValue(options[0]) : "";
        populateStorySeedSelect(select, options, currentValue || preferredValue, "Select " + STORY_SEED_FIELD_LABELS[item.key]);
        if (!currentValue && preferredValue) select.value = preferredValue;
      });

      renderStorySeedGuidance();
    }

    function populateStorySeedSelects(options, keepExisting) {
      const safeOptions = options || createEmptyStorySeedOptions();
      const project = getProjectByRow(appState.selectedRowNumber);
      ["primaryGenre", "secondaryModifier", "tone", "intensityBand", "audience", "settingEngine", "endingType"].forEach(function (fieldKey) {
        const select = getStorySeedSelectElement(fieldKey);

        const currentValue = keepExisting ? String(select.value || "").trim() : "";
        const preferredValue = fieldKey === "primaryGenre" ? getStorySeedProjectGenre(project) : "";
        populateStorySeedSelect(select, safeOptions[fieldKey] || [], currentValue || preferredValue, "Select " + STORY_SEED_FIELD_LABELS[fieldKey]);
        const targetValue = currentValue || preferredValue;
        if (targetValue && Array.isArray(safeOptions[fieldKey]) && (safeOptions[fieldKey] || []).some(function (option) { return getStorySeedOptionValue(option) === targetValue; })) {
