      var outlinePromise = typeof savePlanOutline === "function" ? savePlanOutline() : Promise.resolve(null);
      return Promise.all([draftPromise, outlinePromise]).then(function () {
        appState.writingWorkspace.isSaving = false;
        appState.writingWorkspace.draftText = savedSegmentsCapture.map(function (s) { return String(s.text || "").trim(); }).join("\n\n");
        appState.writingWorkspace.lastSavedAt = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(savedSegmentsCapture, project);
        appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
        appState.writingWorkspace.savedSegmentTexts = {};
        appState.writingWorkspace.segments.forEach(function (seg) {
          appState.writingWorkspace.savedSegmentTexts[String(seg.key || "")] = {
            text: String(seg.text || "").trim(),

        setStatus((settings.autosave ? "Workspace autosaved" : "Workspace saved") + (wsTitle ? ": " + wsTitle : "") + ".", "ok");
        return true;

    function getDashboardSeriesCards() {
      const grouped = {};
      appState.projects.forEach(function (project) {
        const key = String(project.series || "Standalone").trim() || "Standalone";
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(project);
      });

      return Object.keys(grouped).map(function (seriesName) {
        const projects = grouped[seriesName].slice().sort(function (a, b) {
          return Number(a.b_number || 0) - Number(b.b_number || 0);
        });
        const seriesImageProject = projects.find(function (project) { return !!String(project.series_image || "").trim(); }) || null;
        const coverProject = projects.find(function (project) { return !!String(project.image || "").trim(); }) || projects[0];
        const statuses = {};
        projects.forEach(function (project) {
          const key = String(project.status || "Idea").trim() || "Idea";
          statuses[key] = (statuses[key] || 0) + 1;
        });
        return {
          series: seriesName,
          filterValue: projects[0] && projects[0].series ? projects[0].series : "",
          projects: projects,
          seriesImage: seriesImageProject ? String(seriesImageProject.series_image || "").trim() : "",
          cover: coverProject,
          count: projects.length,
          statuses: statuses
        };
      }).sort(function (a, b) {
        if (a.series === "Standalone" && b.series !== "Standalone") return 1;
        if (a.series !== "Standalone" && b.series === "Standalone") return -1;
        return a.series.localeCompare(b.series);

    function getDashboardTopTasks(projects) {
      return (projects || []).slice().sort(function (a, b) {
        const priorityRank = { High: 0, Medium: 1, Low: 2 };
        const statusRank = { Writing: 0, Draft: 1, Editing: 2, Planning: 3, Concept: 4, Idea: 5, Complete: 6 };
        const aPriority = priorityRank[a.priority] != null ? priorityRank[a.priority] : 9;
        const bPriority = priorityRank[b.priority] != null ? priorityRank[b.priority] : 9;
        if (aPriority !== bPriority) return aPriority - bPriority;
        const aStatus = statusRank[a.status] != null ? statusRank[a.status] : 9;
        const bStatus = statusRank[b.status] != null ? statusRank[b.status] : 9;
        if (aStatus !== bStatus) return aStatus - bStatus;
        return String(a.title || "").localeCompare(String(b.title || ""));
      });

    function getProjectsForSeries(seriesName) {

        .sort(function (a, b) {
          const aHasBook = String(a.b_number || "").trim() !== "";
          const bHasBook = String(b.b_number || "").trim() !== "";
          const aBook = Number(a.b_number);
          const bBook = Number(b.b_number);
          const aValid = aHasBook && Number.isFinite(aBook);
          const bValid = bHasBook && Number.isFinite(bBook);
          if (aValid && bValid && aBook !== bBook) return aBook - bBook;
          if (aValid && !bValid) return -1;
          if (!aValid && bValid) return 1;
          return String(a.title || "").localeCompare(String(b.title || ""));
        });
    }

          var isRightSide = rect.left + rect.width / 2 > window.innerWidth / 2;
          var left = isRightSide ? rect.right - cardW : rect.left;
          if (left + cardW > window.innerWidth - 12) left = window.innerWidth - cardW - 12;
          if (left < 12) left = 12;
          card.style.top = top + "px";
          card.style.left = left + "px";
          card.style.maxHeight = (window.innerHeight - top - 16) + "px";
        }
        el.seriesBooksModal.classList.add("is-open");
        el.seriesBooksModal.setAttribute("aria-hidden", "false");
      }
    }

    function saveSeriesDocUrl(field, url) {
      const project = getSelectedProject();
      if (!project) return;
      if (project.series_id && isSupabaseManagedDocUrlKey(field)) {
        var docType = SERIES_DOC_FIELD_TO_TYPE[field] || "";
        if (!docType) {
          setStatus("Series document type is not configured for " + field + ".", "error");
          return;
        }
        setStatus("Saving legacy series doc link...", "warn");
        callAppsScriptJson("saveSupabaseSeriesLegacyDocUrlJsonFromClient", [project.series_id, docType, url])
          .then(function (result) {
            var seriesId = Number(project.series_id || 0);
            if (seriesId) {
              var current = appState.seriesMetaById[seriesId] || {
                id: seriesId,
                name: String(project.series || "").trim(),
                summary: String(project.series_summary || "").trim(),
                seriesImageUrl: String(project.series_image || "").trim(),
                docs: {}
              };
              current.docs = current.docs || {};
              current.docs[field] = {
                docType: docType,
                title: String(result && result.title || "").trim(),
                legacyUrl: String(result && result.legacyUrl || url || "").trim(),
                updatedAt: String(result && result.savedAt || "").trim(),
                exists: true
              };
              appState.seriesMetaById[seriesId] = current;
            }
            applySeriesMetaToProjects();
            setStatus("Series legacy link saved.", "ok");
            renderLandingDashboard();
            if (Number(appState.selectedRowNumber || 0) === Number(project.rowNumber || 0)) {
              renderProjectDetails(project.rowNumber);
            }
          })
          .catch(function (error) {
            setStatus("Error: " + (error && error.message ? error.message : String(error || "Unknown error")), "error");
          });
        return;
      }
      var payload = {
        rowNumber: project.rowNumber,
        project_id: project.project_id,
        title: project.title,
        series: project.series
      };
      payload[field] = url;
      setStatus("Saving series doc link...", "warn");
      supabaseRunner
        .withSuccessHandler(function (json) {
          var result = JSON.parse(json);
          if (result && result.ok) {
            appState.projects.forEach(function (p) {
              if (String(p.series || "").trim() === String(project.series || "").trim()) {
                p[field] = url;
              }
            });
            setStatus("Series doc link saved and propagated.", "ok");
            renderLandingDashboard();
          } else {
            setStatus("Failed to save series doc link.", "error");
          }
        })
        .withFailureHandler(function (error) {
          setStatus("Error: " + (error && error.message ? error.message : String(error || "Unknown error")), "error");
        })
        .saveProjectJsonFromClient(JSON.stringify(payload));
    }

      var safeProject = project && typeof project === "object" ? project : null;

      var seriesId = Number(safeProject.series_id || 0);

        seriesImageUrl: String(safeProject.series_image || "").trim(),
        docs: {}
      };
      current.docs = current.docs || {};
      Object.keys(SERIES_DOC_FIELD_TO_TYPE).forEach(function (fieldKey) {

        current.docs[fieldKey] = Object.assign({}, current.docs[fieldKey] || {}, {

          legacyUrl: String(docs[fieldKey] || "").trim(),
          exists: true,

    function initChat() {
      appState.chats = appState.chats || [];
      appState.activeChatId = appState.activeChatId || null;
      appState.chats = _loadChatsFromStorage();
      if (appState.chats.length && !appState.activeChatId) {

    var _chatStorageKey = function () { var p = getSelectedProject(); return p ? "chat_sessions_" + p.project_id : null; };

    function _loadChatsFromStorage() {
      var key = _chatStorageKey();
      if (!key) return [];
      try {
        var saved = localStorage.getItem(key);
        if (saved) { var parsed = JSON.parse(saved); if (Array.isArray(parsed)) return parsed; }
      } catch (e) {}
      return [];
    }

    function _loadChatsFromSupabase() {
      var project = getSelectedProject();
      if (!project || typeof callAppsScriptJson !== "function") return;
      callAppsScriptJson("getSupabaseProjectSectionDocumentJsonFromClient", [project.project_id, "chat_session"]).then(function (result) {
        var serverRows = (result && result.rows) || [];
        if (!serverRows.length) return;
        var localKeys = {};
        appState.chats.forEach(function (c) { localKeys[c.id] = true; });
        var changed = false;
        serverRows.forEach(function (s) {
          var key = s.section_key || s.key || '';
          if (key && !localKeys[key]) {
            var messages = [];
            try { messages = JSON.parse(s.markdown_content || "[]"); } catch (e) { messages = []; }
            appState.chats.push({ id: key, name: s.title || "Chat", messages: messages, createdAt: s.sort_order || 0 });
            changed = true;
          }
        });
        if (changed) { _saveChatsToStorage(); renderChatList(); }
      }).catch(function () {});
    }

    function _saveChatsToStorage() {
      var key = _chatStorageKey();
      if (key) { try { localStorage.setItem(key, JSON.stringify(appState.chats)); } catch (e) {} }
    }

    function _syncChatToSupabase(chat) {
      var project = getSelectedProject();

      callAppsScriptJson("saveSupabaseProjectSectionDocumentJsonFromClient", [
        project.project_id, "chat_session", chat.name || "Chat", sectionsJson
      ]).then(function () {
        setStatus("Chat saved to database.", "ok");
      }).catch(function (err) {
        setStatus("Chat DB save failed: " + (err && err.message ? err.message : String(err || "Unknown error")), "error");
      });
    }

    function _deleteChatFromSupabase(chatId) {
      var project = getSelectedProject();
      if (!project || typeof callAppsScriptJson !== "function") return;
      callAppsScriptJson("deleteSupabaseProjectSectionsByKeysFromClient", [project.project_id, "chat_session", JSON.stringify([chatId])]).catch(function (err) {
        setStatus("Chat DB delete failed: " + (err && err.message ? err.message : String(err || "Unknown error")), "error");
      });
    }

    }

    function updateChatModelDisplay() {
      if (!el.chatModelTitle || !el.chatModelSubtitle) return;

      var model = "";
      if (provider === "openrouter" && el.aiOpenRouterModel) model = el.aiOpenRouterModel.value.trim();

    function populateChatInfoPanel(project) {
      if (!project) return;
      if (el.chatInfoImage) { el.chatInfoImage.src = getProjectDisplayImageUrl(project); el.chatInfoImage.alt = String(project.title || "").trim() + " cover"; }
      if (el.chatInfoTitle) el.chatInfoTitle.textContent = String(project.title || "").trim() || "Untitled";

        el.chatInfoWords.textContent = totalWords ? formatWordCount(totalWords) : "0w";
      }

    function updateChatContextSize() {
      if (!el.chatContextSize) return;
      var chat = getActiveChat();
      var chatChars = 0;
      if (chat && chat.messages) {
        chat.messages.forEach(function (msg) { chatChars += (msg.content || "").length; });
      }
      var contextChars = 0;
      var ctx = appState.chatContext;
      if (ctx) {
        contextChars += (buildChatContextContent(ctx) || "").length;
      }
      var chatTokens = Math.round(chatChars / 4);
      var contextTokens = Math.round(contextChars / 4);
      var totalTokens = chatTokens + contextTokens;
      var chatStr = chatTokens > 1000 ? (chatTokens / 1000).toFixed(1) + "k" : chatTokens;
      var contextStr = contextTokens > 1000 ? (contextTokens / 1000).toFixed(1) + "k" : contextTokens;
      var totalStr = totalTokens > 1000 ? (totalTokens / 1000).toFixed(1) + "k" : totalTokens;
      el.chatContextSize.textContent = chatStr + " chat + " + contextStr + " ctx = " + totalStr + " tokens";
    }

    function renderChatContextPills() {
      if (!el.chatContextPills) return;
      var ctx = appState.chatContext;
      if (!ctx) {
        el.chatContextPills.hidden = true;
        return;
      }
      var outline = (typeof getPlanOutline === "function") ? getPlanOutline() : { acts: [] };
      var acts = outline.acts || [];
      var pills = [];
      if (ctx.type === "full-novel") {
        pills.push({ id: "full-novel", label: "Full Novel Text" });
      } else if (ctx.type === "full-outline") {
        pills.push({ id: "full-outline", label: "Full Outline" });
      } else if (ctx.type === "acts") {
        (ctx.selected || []).forEach(function (id) {
          var a = acts.find(function (x) { return x.id === id; });
          pills.push({ id: id, label: a ? (a.title || "Untitled Act") : id });
        });
      } else if (ctx.type === "chapters") {
        (ctx.selected || []).forEach(function (id) {
          var found = null;
          acts.forEach(function (a) { (a.children || []).forEach(function (ch) { if (ch.id === id) found = (a.title || "Act") + " \u203A " + (ch.title || "Untitled Chapter"); }); });
          pills.push({ id: id, label: found || id });
        });
      } else if (ctx.type === "scenes") {
        (ctx.selected || []).forEach(function (id) {
          var found = null;
          acts.forEach(function (a) { (a.children || []).forEach(function (ch) { (ch.children || []).forEach(function (s) { if (s.id === id) found = (ch.title || "Chapter") + " \u203A " + (s.title || "Untitled Scene"); }); }); });
          pills.push({ id: id, label: found || id });
        });
      } else if (ctx.type === "codex") {
        var catLabels = { characters:"Characters", locations:"Locations", objects:"Objects/Items", lore:"Lore", subplots:"Subplots", other:"Other", continuity:"Continuity" };
        (ctx.selected || []).forEach(function (id) {
          pills.push({ id: id, label: catLabels[id] || id });
        });
      }
      if (!pills.length) {
        el.chatContextPills.hidden = true;
        return;
      }
      var html = "";
      pills.forEach(function (p) {
        html += "<div class='context-pill' data-pill-id='" + p.id + "' data-pill-type='" + ctx.type + "'>" +
          "<span>" + escapeHtml(p.label) + "</span>" +
          "<span class='context-pill-remove' data-pill-remove=''>&times;</span></div>";
      });
      el.chatContextPills.innerHTML = html;
      el.chatContextPills.hidden = false;
      // remove handler via delegation
      if (!el.chatContextPills._listenerAttached) {
        el.chatContextPills.addEventListener("click", function (e) {
          var removeBtn = e.target.closest("[data-pill-remove]");
          if (!removeBtn) return;
          var pill = removeBtn.closest(".context-pill");
          if (!pill) return;
          var id = pill.getAttribute("data-pill-id");
          var type = pill.getAttribute("data-pill-type");
          if (type === "full-novel" || type === "full-outline") {
            appState.chatContext = null;
            if (el.chatContextButton) el.chatContextButton.textContent = "+ Context";
          } else if (type === "acts" || type === "chapters" || type === "scenes" || type === "codex") {
            if (!appState.chatContext || appState.chatContext.type !== type) return;
            var idx = appState.chatContext.selected.indexOf(id);
            if (idx !== -1) {
              appState.chatContext.selected.splice(idx, 1);
            }
            if (appState.chatContext.selected.length === 0) {
              appState.chatContext = null;
              if (el.chatContextButton) el.chatContextButton.textContent = "+ Context";
            } else {
              var label = type.charAt(0).toUpperCase() + type.slice(1) + " (" + appState.chatContext.selected.length + " selected)";
              if (el.chatContextButton) el.chatContextButton.textContent = label + " \u02C5";
            }
          }
          renderChatContextPills();
          if (el.chatContextMenu) el.chatContextMenu.hidden = true;
        });
        el.chatContextPills._listenerAttached = true;
      }
      updateChatContextSize();
    }

    function renderChatList() {

        return;

      var html = "";
      appState.chats.forEach(function (c) {
        var active = c.id === appState.activeChatId ? " is-active" : "";
        var name = c.name || "Chat " + (c.id ? c.id.slice(-4) : "");
        var msgCount = (c.messages || []).length;
        var lastMsg = "";
        if (c.messages && c.messages.length) {
          var last = c.messages[c.messages.length - 1];
          if (last && last.content) lastMsg = last.content.replace(/\s+/g, " ").trim().substring(0, 80);
        }
        var dateStr = "";
        if (c.createdAt) {
          var d = new Date(c.createdAt);
          dateStr = d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
        }
        html += "<div class='chat-sidebar-item chat-card" + active + "' data-chat-id='" + c.id + "'>";
        html += "<div class='chat-sidebar-item-header'>";
        html += "<span class='chat-sidebar-item-name'>" + escapeHtml(name) + "</span>";
        html += "<button class='chat-sidebar-item-delete' data-chat-id='" + c.id + "' title='Delete chat'>&times;</button>";
        html += "</div>";
        if (lastMsg) html += "<div class='chat-sidebar-item-excerpt'>" + escapeHtml(lastMsg) + "</div>";
        html += "<div class='chat-sidebar-item-meta'>";
        if (dateStr) html += "<span>" + dateStr + "</span>";
        html += "<span>" + msgCount + " message" + (msgCount !== 1 ? "s" : "") + "</span>";
        html += "</div>";
        html += "</div>";
      });
      el.chatList.innerHTML = html;
    }

    function renderChatMessage(msg) {
      if (!el.chatMessagesInner) return;
      var div = document.createElement("div");
      div.className = "chat-msg " + (msg.role === "user" ? "user" : "assistant");
      if (msg.role === "loading") div.className = "chat-msg loading";
      if (msg.role !== "loading") {
        var label = document.createElement("div");
        label.className = "label";
        label.textContent = msg.role === "user" ? "You" : "Assistant";
        div.appendChild(label);
      }
      var bubble = document.createElement("div");
      bubble.className = "bubble";
      if (msg.role === "assistant" && typeof renderMarkdown === "function") {
        bubble.innerHTML = renderMarkdown(msg.content);
      } else {
        bubble.textContent = msg.content;
      }
      div.appendChild(bubble);
      if (msg.role !== "loading" && msg.content) {
        var footer = document.createElement("div");
        footer.className = "chat-msg-footer";
        var wordCount = msg.content.split(/\s+/).filter(function (w) { return w.length > 0; }).length;
        var countSpan = document.createElement("span");
        countSpan.className = "chat-msg-word-count";
        countSpan.textContent = wordCount + " word" + (wordCount !== 1 ? "s" : "");
        footer.appendChild(countSpan);
        var copyBtn = document.createElement("button");
        copyBtn.className = "chat-msg-action";
        copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", function () {
          navigator.clipboard.writeText(msg.content).then(function () {
            copyBtn.textContent = "Copied!";
            setTimeout(function () { copyBtn.textContent = "Copy"; }, 1500);
          });
        });
        footer.appendChild(copyBtn);
        if (msg.role === "assistant") {
          var snippetBtn = document.createElement("button");
          snippetBtn.className = "chat-msg-action";
          snippetBtn.textContent = "Save as Snippet";
          snippetBtn.addEventListener("click", function () {
            var project = getSelectedProject();
            if (!project) return;
            var key = "snippet_" + Date.now();
            var snippet = { project_id: project.project_id, doc_type: "snippet", section_key: key, title: msg.content.substring(0, 60).replace(/\s+/g, " ").trim(), markdown_content: msg.content, sort_order: Math.floor(Date.now() / 1000) };
            _snippets.push(snippet);
            _saveSnippetsToStorage();
            _syncSnippetToSupabase(snippet);
            renderSnippetList();
            snippetBtn.textContent = "Saved!";
            setTimeout(function () { snippetBtn.textContent = "Save as Snippet"; }, 1500);
          });

        }
        div.appendChild(footer);
      }
      el.chatMessagesInner.appendChild(div);
      el.chatMessages.scrollTop = el.chatMessages.scrollHeight;
    }

    function buildChatContextContent(context) {
      if (!context || !context.type) return "";
      var outline = (typeof getPlanOutline === "function") ? getPlanOutline() : { acts: [] };
      var acts = outline.acts || [];
      var segments = appState.writingWorkspace.segments || [];

      if (context.type === "full-novel") {
        var draftText = appState.writingWorkspace.draftText || "";
        return draftText.trim() ? draftText : "Full novel text not available yet.";
      }

      if (context.type === "full-outline") {
        return formatOutlineForContext(acts);
      }

      if (context.type === "acts") {
        var sel = context.selected || [];
        var matched = acts.filter(function (a) { return sel.indexOf(a.id) !== -1; });
        if (!matched.length) return "";
        return "Selected Acts:\n" + matched.map(function (a) {
          var chs = (a.children || []).map(function (ch) { return "  - " + (ch.title || "Untitled Chapter"); }).join("\n");
          return (a.title || "Untitled Act") + (chs ? "\n" + chs : "");
        }).join("\n\n");
      }

      if (context.type === "chapters") {
        var selCh = context.selected || [];
        var chLines = [];
        acts.forEach(function (a) {
          (a.children || []).forEach(function (ch) {
            if (selCh.indexOf(ch.id) !== -1) {
              var seg = segments.find(function (s) { return s.key === ch.id; });
              chLines.push((a.title || "Act") + " \u203A " + (ch.title || "Untitled Chapter"));
            }
          });
        });
        return chLines.length ? "Selected Chapters:\n" + chLines.join("\n") : "";
      }

      if (context.type === "scenes") {
        var selSc = context.selected || [];
        var scLines = [];
        acts.forEach(function (a) {
          (a.children || []).forEach(function (ch) {
            (ch.children || []).forEach(function (s) {
              if (selSc.indexOf(s.id) !== -1) {
                scLines.push((ch.title || "Chapter") + " \u203A " + (s.title || "Untitled Scene"));
              }
            });
          });
        });
        return scLines.length ? "Selected Scenes:\n" + scLines.join("\n") : "";
      }

      if (context.type === "codex") {
        var selCat = context.selected || [];
        if (!selCat.length) return "";
        var project = getSelectedProject();
        var seriesId = Number(project && project.series_id || 0);
        if (!seriesId) return "No series selected for codex context.";
        var parts = [];
        selCat.forEach(function (catKey) {
          var entities = (typeof getCodexEntitiesForType_ === "function") ? getCodexEntitiesForType_(seriesId, catKey) : [];
          if (entities.length) {
            parts.push(catKey.charAt(0).toUpperCase() + catKey.slice(1) + ":");
            entities.forEach(function (e) {
              var name = e.name || "Untitled";
              var desc = e.description || e.summary || "";
              parts.push("  - " + name + (desc ? ": " + desc : ""));
            });
          }
        });
        return parts.length ? "Codex Entries:\n" + parts.join("\n") : "No codex entries found for selected categories.";
      }

      return "";
    }

    function formatOutlineForContext(acts) {
      return acts.map(function (a) {
        var chs = (a.children || []).map(function (ch) {
          return "    - " + (ch.title || "Untitled Chapter") + " (" + (ch.children || []).length + " scenes)";
        }).join("\n");
        return "  " + (a.title || "Untitled Act") + "\n" + chs;
      }).join("\n\n");
    }

    function sendChatMessage() {
      if (!el.chatInput) return;
      var text = el.chatInput.value.trim();
      if (!text) return;

      var chat = getActiveChat();
      if (!chat) {
        chat = createNewChat();
        if (!chat) return;
      }

      el.chatInput.value = "";
      if (el.chatSendButton) el.chatSendButton.disabled = true;

      chat.messages = chat.messages || [];
      chat.messages.push({ role: "user", content: text, timestamp: Date.now() });
      if (chat.name === "New Chat" || !chat.name) {
        chat.name = text.slice(0, 60) + (text.length > 60 ? "..." : "");
      }
      saveChats();
      renderChatList();
      renderChatMessage({ role: "user", content: text });

      var loadingEl = document.createElement("div");
      loadingEl.className = "chat-msg loading";
      loadingEl.innerHTML = "<div class='bubble'>Thinking...</div>";
      el.chatMessagesInner.appendChild(loadingEl);
      el.chatMessages.scrollTop = el.chatMessages.scrollHeight;

      var provider = "openrouter";
      var model = "";
      if (el.aiDefaultProvider) provider = el.aiDefaultProvider.value || "openrouter";
      if (provider === "openrouter") {
        var orModel = document.getElementById("aiOpenRouterModel");
        if (orModel) model = orModel.value.trim();
      } else if (provider === "lmstudio") {
        var lsModel = document.getElementById("aiLmStudioModel");
        if (lsModel) model = lsModel.value.trim();
      } else if (provider === "ollama") {
        var olModel = document.getElementById("aiOllamaModel");
        if (olModel) model = olModel.value.trim();
      } else if (provider === "opencode") {
        var ocModel = document.getElementById("aiOpencodeModel");
        if (ocModel) model = ocModel.value.trim();
      }

      var systemMsg = "You are a helpful writing assistant for a fiction author. Answer questions about writing, editing, plotting, character development, and publishing.";
      var chatProject = getSelectedProject();
      if (chatProject) {
        systemMsg += " The user's current project is \"" + (chatProject.title || "Untitled") + "\"";
        if (chatProject.series) systemMsg += " in the \"" + chatProject.series + "\" series";
        if (chatProject.genre) systemMsg += " (genre: " + chatProject.genre + ")";
        systemMsg += ".";
      }
      var context = appState.chatContext;
      if (context) {
        var contextContent = buildChatContextContent(context);
        if (contextContent) {
          systemMsg += "\n\n--- Context from your project ---\n" + contextContent + "\n--- End of context ---\n\nUse the above context to inform your response.";
        }
      }
      var messages = [
        { role: "system", content: systemMsg }
      ];
      (chat.messages || []).forEach(function (m) {
        messages.push({ role: m.role, content: m.content });
      });

      callEditorAI({
        provider: provider,
        model: model,
        messages: messages,
        temperature: 0.7,
        max_tokens: 2048
      }).then(function (result) {
        if (loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
        var reply = result && result.text ? result.text.trim() : "(No response)";
        chat.messages.push({ role: "assistant", content: reply, timestamp: Date.now() });
        saveChats();
        renderChatList();
        renderChatMessage({ role: "assistant", content: reply });
        updateChatContextSize();
      }).catch(function (err) {
        if (loadingEl.parentNode) loadingEl.parentNode.removeChild(loadingEl);
        renderChatMessage({ role: "assistant", content: "Error: " + (err.message || err) });
      });
    }

    function renderTimeline() {
      var events = [];
      var now = new Date();
      var sixMonthsAgo = new Date(now);
      sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 3);
      var twelveMonthsOut = new Date(now);
      twelveMonthsOut.setMonth(twelveMonthsOut.getMonth() + 12);

      var filterSeries = String(appState.timelineFilterSeries || "All").trim();
      var filterProject = String(appState.timelineFilterProject || "All").trim();
      var ghostMode = appState.timelineGhostMode && (filterSeries !== "All" || filterProject !== "All");

      appState.projects.forEach(function (p) {
        var matchesFilter = true;
        if (filterSeries !== "All" && (p.series || "") !== filterSeries) matchesFilter = false;
        if (filterProject !== "All" && String(p.rowNumber) !== filterProject) matchesFilter = false;
        if (!ghostMode && !matchesFilter) return;
        var milestones = Array.isArray(p.schedule_milestones) ? p.schedule_milestones : [];
        milestones.forEach(function (m) {
          if (!m.date) return;
          var d = new Date(m.date);
          if (d < sixMonthsAgo || d > twelveMonthsOut) return;
          events.push({
            date: m.date,
            title: (p.title || "Untitled") + " — " + m.name,
            projectTitle: p.title || "",
            milestoneName: m.name || "",
            type: m.name === "PUBLISH" ? "release" : "milestone",
            projectRow: p.rowNumber,
            completed: !!m.completed,
            ghost: ghostMode && !matchesFilter
          });
        });
        var campaigns = Array.isArray(p.campaigns) ? p.campaigns : [];
        campaigns.forEach(function (c) {
          if (!c.startDate) return;
          var sd = new Date(c.startDate);
          if (sd < sixMonthsAgo || sd > twelveMonthsOut) return;
          events.push({
            date: c.startDate,
            title: (p.title || "Untitled") + " — " + (c.name || "Campaign") + (c.channel ? " (" + c.channel + ")" : ""),
            projectTitle: p.title || "",
            milestoneName: (c.name || "Campaign") + (c.channel ? " (" + c.channel + ")" : ""),
            type: "campaign",
            projectRow: p.rowNumber,
            completed: false,
            ghost: ghostMode && !matchesFilter
          });
          (c.tasks || []).forEach(function (t) {
            if (!t.dueDate) return;
            var td = new Date(t.dueDate);
            if (td < sixMonthsAgo || td > twelveMonthsOut) return;
            events.push({
              date: t.dueDate,
              title: (p.title || "Untitled") + " — Task: " + (t.name || "Untitled task"),
              projectTitle: p.title || "",
              milestoneName: "Task: " + (t.name || "Untitled task"),
              type: "task",
              projectRow: p.rowNumber,
              completed: t.status === "done",
              ghost: ghostMode && !matchesFilter
            });
          });
        });
      });

      events.sort(function (a, b) { return a.date < b.date ? -1 : a.date > b.date ? 1 : 0; });

      var grouped = {};
      events.forEach(function (e) {
        var monthKey = e.date.slice(0, 7);
        if (!grouped[monthKey]) grouped[monthKey] = [];
        grouped[monthKey].push(e);
      });

      var monthKeys = Object.keys(grouped).sort();
      var html = monthKeys.map(function (mk) {
        var parts = mk.split("-");
        var year = parts[0], month = parts[1];
        var monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        var label = monthNames[Number(month) - 1] + " " + year;
        var eventsHtml = grouped[mk].map(function (e) {
          var cls = "timeline-event is-" + e.type + (e.completed ? " is-completed" : "") + (e.ghost ? " is-ghost" : "");
          var day = e.date.slice(8);
          if (e.ghost) {
            return "<div class='" + cls + "' data-row='" + e.projectRow + "'>" +
              "<div class='timeline-event-ghost-line'>" + escapeHtml(e.milestoneName) + " - " + escapeHtml(e.projectTitle) + " - " + day + " " + label + "</div>" +
            "</div>";
          }
          return "<div class='" + cls + "' data-row='" + e.projectRow + "'>" +
            "<div class='timeline-event-title'>" + escapeHtml(e.milestoneName) + "</div>" +
            "<div class='timeline-event-date'>" + escapeHtml(e.projectTitle) + " — " + day + " " + label + "</div>" +
          "</div>";
        }).join("");
        return "<div class='timeline-month-card' data-month='" + mk + "'>" +
          "<div class='timeline-month-label'>" + escapeHtml(label) + "</div>" +
          eventsHtml +
        "</div>";
      }).join("");

      [document.querySelector("#publishingTimeline .timeline-card-list"), document.querySelector("#marketingTimeline .timeline-card-list")].forEach(function (list) {
        if (list) list.innerHTML = html || "<div class='landing-empty'>No scheduled events yet. Change a project status to Publish Ready to generate a timeline.</div>";
      });
    }

    function scrollTimelineTo(monthKey) {
      if (!monthKey) return;
      var selector = "[data-month='" + monthKey + "']";
      [document.querySelector("#publishingTimeline .timeline-card-list"), document.querySelector("#marketingTimeline .timeline-card-list")].forEach(function (list) {
        if (!list) return;
        var card = list.querySelector(selector);

        list.scrollTo({ left: Math.max(0, scrollLeft), behavior: "smooth" });
      });
    }

    function scrollTimelineToToday() {
      var now = new Date();
      var monthKey = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
      scrollTimelineTo(monthKey);
    }

    function getProjectFirstMonthKey(rowNumber) {

    function applyFilters(preserveDetailSelection) {
      const searchTerm = el.searchInput.value.trim().toLowerCase();
      const series = el.seriesFilter.value || "All";
      const penName = el.penNameFilter.value || "All";
      const genre = el.genreFilter.value || "All";
      const format = el.formatFilter.value || "All";
      const status = el.statusFilter.value || "All";
      const priority = el.priorityFilter.value || "All";

      appState.filteredProjects = appState.projects.filter(function (project) {
        const haystack = [
          project.title,
          project.series,
          project.pen_name,
          project.genre,
          project.format,
          project.b_number,
          project.short_summary,
          project.next_step,
          project.project_id
        ].join(" ").toLowerCase();

        const matchesSearch = !searchTerm || haystack.indexOf(searchTerm) !== -1;
        const matchesSeries = series === "All" || project.series === series;
        const matchesPenName = penName === "All" || project.pen_name === penName;
        const matchesGenre = genre === "All" || project.genre === genre;
        const matchesFormat = format === "All" || project.format === format;
        const matchesStatus = status === "All" || project.status === status;
        const matchesPriority = priority === "All" || project.priority === priority;

        return matchesSearch && matchesSeries && matchesPenName && matchesGenre && matchesFormat && matchesStatus && matchesPriority;
      });

      appState.filteredProjects.sort(function (a, b) {
        const seriesA = String(a.series || "").trim().toLowerCase();
        const seriesB = String(b.series || "").trim().toLowerCase();

        if (seriesA < seriesB) return -1;
        if (seriesA > seriesB) return 1;

        const hasBookA = String(a.b_number || "").trim() !== "";
        const hasBookB = String(b.b_number || "").trim() !== "";
        const bookA = Number(a.b_number);
        const bookB = Number(b.b_number);
        const validBookA = hasBookA && Number.isFinite(bookA);
        const validBookB = hasBookB && Number.isFinite(bookB);

        if (validBookA && validBookB && bookA !== bookB) {
          return bookA - bookB;
        }

        if (validBookA && !validBookB) return -1;
        if (!validBookA && validBookB) return 1;

        const titleA = String(a.title || "").trim().toLowerCase();
        const titleB = String(b.title || "").trim().toLowerCase();

        if (titleA < titleB) return -1;
        if (titleA > titleB) return 1;

        return 0;
      });

      renderProjectsTable();

      const stillVisible = appState.filteredProjects.some(function (p) {
        return Number(p.rowNumber) === Number(appState.selectedRowNumber);
      });

      if (preserveDetailSelection === true) {
        return;
      }

      if (!stillVisible && appState.filteredProjects.length) {
        selectProject(appState.filteredProjects[0].rowNumber, { syncSeriesFilter: false });
      }

    function propagateSeriesImageInState(project) {
      const safeProject = project || {};
      const safeSeries = String(safeProject.series || "").trim();
      if (!safeSeries || !Object.prototype.hasOwnProperty.call(safeProject, "series_image")) return;
      const safeSeriesImage = String(safeProject.series_image || "").trim();

      [appState.projects, appState.filteredProjects].forEach(function (collection) {
        if (!Array.isArray(collection)) return;
        collection.forEach(function (entry) {
          if (String(entry && entry.series || "").trim() !== safeSeries) return;
          entry.series_image = safeSeriesImage;
        });
      });
    }

    function propagateSeriesDocFieldsInState(project) {
      const safeProject = project || {};
      const safeSeries = String(safeProject.series || "").trim();
      if (!safeSeries) return;

      [appState.projects, appState.filteredProjects].forEach(function (collection) {
        if (!Array.isArray(collection)) return;
        collection.forEach(function (entry) {
          if (String(entry && entry.series || "").trim() !== safeSeries) return;
          SERIES_DOC_URL_FIELDS.forEach(function (field) {
            if (!Object.prototype.hasOwnProperty.call(safeProject, field)) return;
            entry[field] = String(safeProject[field] || "").trim();
          });
        });
      });
    }

    function mergeProjectUpdate(updated, serverMeta) {
      const merged = mergeProjectWithExisting(updated, serverMeta);
      if (!usesSupabaseSeriesOwnedFields()) {
        propagateSeriesImageInState(merged);
        propagateSeriesDocFieldsInState(merged);
      }

      const index = appState.projects.findIndex(function (p) {
        return Number(p.rowNumber) === Number(merged.rowNumber);
      });

      if (index === -1) {
        appState.projects.unshift(merged);
      } else {
        appState.projects[index] = merged;
      }

      persistProjectsToCache();
      populateFilters();
      applyFilters();
      selectProject(merged.rowNumber);
    }

    function updateProjectInStateOnly(updated, serverMeta) {
      const merged = mergeProjectWithExisting(updated, serverMeta);
      if (!usesSupabaseSeriesOwnedFields()) {
        propagateSeriesImageInState(merged);
        propagateSeriesDocFieldsInState(merged);
      }

      const index = appState.projects.findIndex(function (p) {
        return Number(p.rowNumber) === Number(merged.rowNumber);
      });

      if (index !== -1) {
        appState.projects[index] = merged;
      } else {
        appState.projects.unshift(merged);
      }

      const filteredIndex = appState.filteredProjects.findIndex(function (p) {
        return Number(p.rowNumber) === Number(merged.rowNumber);
      });

      if (filteredIndex !== -1) {
        appState.filteredProjects[filteredIndex] = merged;
      }

      persistProjectsToCache();
      populateFilters();
      applyFilters();
      selectProject(merged.rowNumber);
    }

    function updateProjectInStateQuiet(updated, serverMeta) {
      const merged = mergeProjectWithExisting(updated, serverMeta);
      if (!usesSupabaseSeriesOwnedFields()) {
        propagateSeriesImageInState(merged);
        propagateSeriesDocFieldsInState(merged);
      }

      const index = appState.projects.findIndex(function (p) {
        return Number(p.rowNumber) === Number(merged.rowNumber);
      });

      if (index !== -1) {
        appState.projects[index] = merged;
      } else {
        appState.projects.unshift(merged);
      }

      const filteredIndex = appState.filteredProjects.findIndex(function (p) {
        return Number(p.rowNumber) === Number(merged.rowNumber);
      });

      if (filteredIndex !== -1) {
        appState.filteredProjects[filteredIndex] = merged;
      }

      appState.lastOptimisticUpdateAt = Date.now();
      persistProjectsToCache();
      populateFilters();
      applyFilters(true);
      if (activeMainTab === "publishing") renderPublishingDashboard();
      else if (activeMainTab === "marketing") renderMarketingDashboard();
      else if (activeMainTab === "resources") renderResourcesDashboard();
    }

    function optimisticUpdateSelectedProject() {
      const payload = collectDetailFormData();
      if (!payload) return null;
      payload.series_summary = String(getSeriesMetaForProject(payload) && getSeriesMetaForProject(payload).summary || payload.series_summary || "").trim();
      payload.series_image = String(getSeriesMetaForProject(payload) && getSeriesMetaForProject(payload).seriesImageUrl || payload.series_image || "").trim();
      Object.keys(SERIES_DOC_FIELD_TO_TYPE).forEach(function (fieldKey) {
        payload[fieldKey] = getMergedSeriesDocValue(payload, fieldKey);
      });
      var savePayload = stripSeriesOwnedFieldsFromProjectPayload(payload);
      var existing = getProjectByRow(payload.rowNumber);
      var wasPublishReady = existing && (existing.status === "Publish Ready" || existing.status === "Published");
      var isPublishReady = savePayload.status === "Publish Ready" || savePayload.status === "Published";
      var dateChanged = savePayload.publish_date !== (existing && existing.publish_date || "");
      var tmplChanged = savePayload.schedule_template !== (existing && existing.schedule_template || "");
      if (wasPublishReady && !isPublishReady) {
        savePayload.publish_ready_date = "";
        savePayload.schedule_milestones = [];
        if (Array.isArray(savePayload.campaigns)) {
          savePayload.campaigns = savePayload.campaigns.filter(function (c) { return c._auto !== "marketing"; });
        }
      } else if (!wasPublishReady && isPublishReady) {
        savePayload.publish_ready_date = new Date().toISOString().split("T")[0];
          var tmplName = savePayload.schedule_template || getDefaultScheduleTemplateName();
        savePayload.schedule_template = tmplName;
        var tmpl = SCHEDULE_TEMPLATES[tmplName];
        if (tmpl) {
          var baseDate = savePayload.publish_date || savePayload.publish_ready_date;
          var shift = 0;
          if (savePayload.publish_date) {
            tmpl.milestones.some(function (m) { if (m.name === "PUBLISH") { shift = m.dayOffset; return true; } return false; });
          }
          savePayload.schedule_milestones = calcMilestoneDates(tmpl.milestones, baseDate, shift);
        }
      } else if (isPublishReady && (dateChanged || tmplChanged)) {
          var tmplName2 = savePayload.schedule_template || getDefaultScheduleTemplateName();
        savePayload.schedule_template = tmplName2;
        var tmpl2 = SCHEDULE_TEMPLATES[tmplName2];
        if (tmpl2) {
          savePayload.publish_ready_date = existing && existing.publish_ready_date || new Date().toISOString().split("T")[0];
          var baseDate2 = savePayload.publish_date || savePayload.publish_ready_date;
          var shift2 = 0;
          if (savePayload.publish_date) {
            tmpl2.milestones.some(function (m) { if (m.name === "PUBLISH") { shift2 = m.dayOffset; return true; } return false; });
          }
          savePayload.schedule_milestones = calcMilestoneDates(tmpl2.milestones, baseDate2, shift2);
        }
      }
      if (isPublishReady && savePayload.marketing_template) {
        var mktTmpl = MARKETING_TEMPLATES[savePayload.marketing_template];
        if (mktTmpl && mktTmpl.entries && mktTmpl.entries.length) {
          if (!Array.isArray(savePayload.campaigns)) savePayload.campaigns = [];
          var existingCampaign = savePayload.campaigns.find(function (c) { return c._auto === "marketing"; });
          var pubDate = savePayload.publish_date || savePayload.publish_ready_date || new Date().toISOString().split("T")[0];
          var tasks = mktTmpl.entries.map(function (e) {
            var d = new Date(pubDate);
            d.setDate(d.getDate() + e.dayOffset);
            return { name: e.taskName, dueDate: d.toISOString().split("T")[0], status: "pending" };
          });
          if (existingCampaign) {
            existingCampaign.tasks = tasks;
            existingCampaign.name = "Marketing Plan: " + savePayload.marketing_template;
            existingCampaign.startDate = pubDate;
          } else {
            savePayload.campaigns.push({
              _auto: "marketing",
              name: "Marketing Plan: " + savePayload.marketing_template,
              channel: "Automated",
              startDate: pubDate,
              endDate: "",
              notes: "Auto-generated from " + savePayload.marketing_template + " template",
              tasks: tasks
            });
          }
        }
      } else if (isPublishReady && !savePayload.marketing_template && Array.isArray(savePayload.campaigns)) {
        savePayload.campaigns = savePayload.campaigns.filter(function (c) { return c._auto !== "marketing"; });
      }
      updateProjectInStateQuiet(savePayload, { rowNumber: savePayload.rowNumber, project_id: savePayload.project_id });
      return savePayload;
    }

    function persistProjectsToCache() {
      try {
        localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify({
          projects: appState.projects,
          nextStepOptions: appState.nextStepOptions
        }));
      } catch (err) {
        console.warn("Cache write failed", err);
      }
    }

    function loadProjectsFromCache() {
      try {
        const raw = localStorage.getItem(LOCAL_CACHE_KEY);
        if (!raw) return false;

        const cached = JSON.parse(raw);
        const cachedProjects = Array.isArray(cached) ? cached : cached.projects;
        const cachedNextSteps = Array.isArray(cached && cached.nextStepOptions) ? cached.nextStepOptions : [];

        if (!Array.isArray(cachedProjects) || !cachedProjects.length) return false;

        appState.projects = cachedProjects
          .map(normalizeProject)
          .filter(function (p) { return !!p; });

        appState.nextStepOptions = cachedNextSteps
          .map(function (v) { return String(v || "").trim(); })
          .filter(function (v) { return !!v; });

        populateFilters();
        populateImagePickerMetaDatalists();
        loadInspectorOptions();
        applyFilters();

        if (appState.projects.length) {
          selectProject(appState.projects[0].rowNumber, { syncSeriesFilter: false });
        } else {
          clearDetails();
        }

        setStatus("Loaded cached projects. Syncing live data...", "warn");
        return true;
      } catch (err) {
        console.warn("Cache read failed", err);
        return false;
      }
    }

    function parseServerResult(json) {
      const result = typeof json === "string" ? JSON.parse(json) : json;
      if (!result || typeof result !== "object") {
        throw new Error("Invalid server response.");
      }
      return result;
    }

    function loadProjects() {
      if (!loadProjectsFromCache()) {
        setStatus("Loading projects...", "warn");
      }

      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) {
        setStatus("supabaseRunner not available.", "error");
        return;
      }

      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const payload = parseServerResult(json);

            if (payload.ok === false) {
              throw new Error(payload.error || "Load failed.");
            }

            const safeRows = Array.isArray(payload.rows) ? payload.rows : [];

            appState.projects = safeRows
              .map(normalizeProject)
              .filter(function (p) { return !!p; });

            appState.nextStepOptions = Array.isArray(payload.nextStepOptions)
              ? payload.nextStepOptions.map(function (v) { return String(v || "").trim(); }).filter(function (v) { return !!v; })
              : [];

            loadSeriesMeta().then(function () {
              persistProjectsToCache();
              populateFilters();
              populateImagePickerMetaDatalists();
              loadInspectorOptions();
              applyFilters();

              if (appState.projects.length) {
                const stillExists = appState.projects.some(function (p) {
                  return Number(p.rowNumber) === Number(appState.selectedRowNumber);
                });

                if (stillExists) {
                  selectProject(appState.selectedRowNumber);
                } else {
                  selectProject(appState.projects[0].rowNumber);
                }
              } else {
                clearDetails();
              }

              setStatus(
                (payload.build || "JSON_TRANSPORT") +
                " | server_count=" + (payload.count || 0) +
                " | client_count=" + appState.projects.length,
                "ok"
              );
              // validateSeriesMigration();
            });
          } catch (err) {
            console.error("PARSE ERROR", err, json);
            setStatus("Load failed: " + err.message, "error");
          }
        })
        .withFailureHandler(function (error) {
          console.error("LOAD ERROR", error);
          setStatus("Load failed: " + (error && error.message ? error.message : error), "error");
        })
        .getProjectsJsonForClient();
    }

    function saveSelectedProject(isAutosave) {
      const detailPayload = collectDetailFormData();

      if (!detailPayload) {
        setStatus("Select a project first.", "error");
        return;
      }

      if (!detailPayload.series) {
        setStatus("Series is required.", "error");
        el.detailSeries.focus();
        return;
      }

      const payload = stripSeriesOwnedFieldsFromProjectPayload(detailPayload);

      appState.pendingSavePayload = payload;

      if (appState.isSaving) {
        appState.hasPendingSave = true;
        appState.isDirty = true;
        setStatus("Queued latest changes...", "warn");
        return;
      }

      appState.isSaving = true;
      appState.hasPendingSave = false;
      appState.pendingSavePayload = null;

      var pdTitle = String(detailPayload && detailPayload.title || el.detailTitleInput && el.detailTitleInput.value || "").trim();
      setStatus((isAutosave ? "Autosaving" : "Saving") + (pdTitle ? " '" + pdTitle + "'" : " changes") + "...", "warn");

      supabaseRunner
        .withSuccessHandler(function (json) {
          appState.isSaving = false;

          try {
            const result = parseServerResult(json);

            if (result.ok === false) {
              throw new Error(result.error || "Save failed.");
            }

            const newerChangesWaiting = appState.hasPendingSave || appState.isDirty;

            if (!newerChangesWaiting) {
              updateProjectInStateQuiet(payload, result);
              appState.isDirty = false;
              appState.pendingSavePayload = null;
              const propagatedCount = Number(result && result.propagatedSeriesImageCount || 0);
              var projTitle = String(detailPayload && detailPayload.title || el.detailTitleInput && el.detailTitleInput.value || "Project").trim();
              var savedMessage = (isAutosave ? "Project autosaved" : "Project saved") + ": " + projTitle;
              setStatus(
                propagatedCount > 1
                  ? savedMessage + ". Series image applied to " + propagatedCount + " books."
                  : savedMessage + ".",
                "ok"
              );
            } else {
              setStatus("Saving latest queued changes...", "warn");
            }
          } catch (err) {
            console.error("SAVE PARSE ERROR", err, json);
            var pdErrTitle = String(detailPayload && detailPayload.title || el.detailTitleInput && el.detailTitleInput.value || "").trim();
            setStatus("Save failed" + (pdErrTitle ? " '" + pdErrTitle + "'" : "") + ": " + err.message, "error");
          }

          if (appState.hasPendingSave || appState.isDirty) {
            appState.hasPendingSave = false;
            appState.isDirty = false;
            saveSelectedProject(true);
          }
        })
        .withFailureHandler(function (error) {
          appState.isSaving = false;
          console.error("SAVE ERROR", error);
          var pdErrTitle = String(detailPayload && detailPayload.title || el.detailTitleInput && el.detailTitleInput.value || "").trim();
          setStatus("Save failed" + (pdErrTitle ? " '" + pdErrTitle + "'" : "") + ": " + (error && error.message ? error.message : error), "error");

          if (appState.hasPendingSave || appState.isDirty) {
            appState.hasPendingSave = false;
          }
        })
        .saveProjectJsonFromClient(JSON.stringify(payload));
    }

    window.onerror = function (message, source, line, column) {
      var statusMessage = "JS ERROR: " + message + " @ line " + line;
      if (el.statusBar) {
        el.statusBar.textContent = statusMessage;
        el.statusBar.className = "status-bar error";
      }
      if (el.resourceStatusBar) {
        el.resourceStatusBar.textContent = statusMessage;
        el.resourceStatusBar.className = "status-bar error";
      }
      appendStatusLogEntry("error", String(message || "Unknown JavaScript error"), {
        kind: "error",
        source: source,
        line: line,
        column: column
      });
      console.error("window.onerror:", message, source, line, column);
    };

    window.addEventListener("unhandledrejection", function (event) {
      var reason = event && event.reason;
      var message = reason && reason.message ? reason.message : String(reason || "Unhandled promise rejection");
      if (el.statusBar) {
        el.statusBar.textContent = "JS ERROR: " + message;
        el.statusBar.className = "status-bar error";
      }
      if (el.resourceStatusBar) {
        el.resourceStatusBar.textContent = "JS ERROR: " + message;
        el.resourceStatusBar.className = "status-bar error";
      }
      appendStatusLogEntry("error", message, {
        kind: "error",
        source: "unhandledrejection"
      });
      console.error("window.unhandledrejection:", reason);
    });
