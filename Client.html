    function calcMilestoneDates(milestones, fromDate, shiftToPublish) {
      var base = fromDate ? new Date(fromDate) : new Date();
      return milestones.map(function (m) {
        var d = new Date(base);
        var offset = m.dayOffset;
        if (shiftToPublish) {
          offset = offset - shiftToPublish;
        }
        d.setDate(d.getDate() + offset);
        return {
          name: m.name,
          dayOffset: offset,
          date: d.toISOString().split("T")[0],
          completed: false
        };
      });
    }

      var style = window.getComputedStyle(textarea);

    function jumpToResourceSourceHeading(offset, headingText, options) {
      if (!el.resourceEditorTextarea) return;
      var opts = options || {};
      var textarea = el.resourceEditorTextarea;
      var markdown = textarea.value || "";
      var numericOffset = Number(offset || 0) || 0;
      var headings = getMarkdownHeadings(markdown);
      var heading = headings.find(function (item) { return Number(item.offset || 0) === numericOffset; }) || { offset: numericOffset, text: headingText || "" };
      var style = window.getComputedStyle(textarea);
      var lineHeight = parseFloat(style.lineHeight) || 20;
      var targetTop = getHeadingAbsoluteTop(textarea, markdown, heading);
      if (opts.focus !== false) textarea.focus();
      textarea.scrollTop = Math.max(0, targetTop - (lineHeight * 2));
      if (typeof textarea.setSelectionRange === "function") {

    function shouldBlockModalOverlayWheel(event) {
      const target = event.target instanceof Element ? event.target : null;
      if (!target) return !!document.querySelector(".modal.is-open");
      if (target.closest(".writing-codex-panel")) return false;
      const openModal = target.closest(".modal.is-open") || document.querySelector(".modal.is-open");
      if (!openModal) return false;
      const card = target.closest(".modal-card");
      if (!card || !openModal.contains(card)) return true;

      const scrollHost = target.closest(
        ".image-picker-grid, .modal-body, .series-books-list, .book-creator-body, .image-generator-body, .story-seed-body, .markdown-help-nav, .markdown-help-content, .ai-provider-nav, .markdown-reference-nav, .markdown-heading-list, .markdown-preview, .table-wrap"
      );
      if (!scrollHost) return true;
      if (scrollHost.scrollHeight <= scrollHost.clientHeight + 1) return false;

      const deltaY = Number(event.deltaY || 0);
      if (!deltaY) return false;
      const atTop = scrollHost.scrollTop <= 0;
      const atBottom = scrollHost.scrollTop + scrollHost.clientHeight >= scrollHost.scrollHeight - 1;
      return (deltaY < 0 && atTop) || (deltaY > 0 && atBottom);
    }

    function handleModalOverlayWheel(event) {

      const delta = Math.abs(Number(event.deltaY || 0)) >= Math.abs(Number(event.deltaX || 0))

        : Number(event.deltaX || 0);
      if (!delta) return;
      el.landingSeriesDeck.scrollBy({ left: delta, behavior: "smooth" });
      event.preventDefault();
    }

      const image = await loadImageElementFromBlob(blob);
      const safeBaseName = stripFileExtension(preferredBaseName || "project-image");
      const originalMax = 1600;
      const thumbMax = 420;

      function drawVariant(maxEdge) {
        const sourceWidth = image.naturalWidth || image.width || 1;
        const sourceHeight = image.naturalHeight || image.height || 1;
        const scale = Math.min(1, maxEdge / Math.max(sourceWidth, sourceHeight));
        const width = Math.max(1, Math.round(sourceWidth * scale));
        const height = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d", { alpha: false });
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);
        return canvas;
      }

      const thumbCanvas = drawVariant(thumbMax);

        originalName: safeBaseName + ".webp",

      if (!appState.markdownEditor) return null;
      if (!field || !cached || typeof cached.text !== "string") return null;
      const referenceText = cached.text || "";
      appState.markdownEditor.referenceDocs[field.key] = {
        field: field,
        text: referenceText,
        title: cached.title || field.label,
        headings: getMarkdownHeadings(referenceText),
        sections: Array.isArray(cached.sections) ? cached.sections : []
      };
      return appState.markdownEditor.referenceDocs[field.key];
    }

    function preloadReferencePanelSelections(project, activeField) {
      if (!appState.markdownEditor) return;
      if (!project || (!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;
      getReferenceFieldsForActiveEditor(activeField).forEach(function (field) {
        const url = String(project[field.urlKey] || "").trim();
        const activeUrl = String(activeField && project[activeField.urlKey] || "").trim();
        const isSupabaseField = isSupabaseProjectMarkdownField(field);
        if (!isSupabaseField && (!url || (activeUrl && url === activeUrl))) return;

        const cacheKey = isSupabaseField
          ? getSupabaseProjectDocCacheKey(project.rowNumber, getSupabaseProjectMarkdownConfig(field).docType)
          : url;
        const cached = getCachedDoc(cacheKey);
        if (cached && typeof cached.text === "string") {
          rememberReferenceDoc(field, cached);
          return;
        }

        const loader = isSupabaseField ? loadSupabaseProjectDocIntoCache : loadGoogleDocIntoCache;
        loader(isSupabaseField ? project : url, isSupabaseField ? field : field.label, isSupabaseField ? {
          onSuccess: function (nextCache) {
            rememberReferenceDoc(field, nextCache);
            if (appState.markdownEditor.referenceMode === "reference" && appState.markdownEditor.referenceKey === field.key) {
              setReferenceText(field, nextCache.text || "", nextCache.title || field.label);
            }
            renderReferenceTabs();
          }
        } : {
          onSuccess: function (nextCache) {
            const stillSelected = getProjectByRow(appState.selectedRowNumber);
            const stillUrl = String(stillSelected && stillSelected[field.urlKey] || "").trim();
            const currentActiveUrl = String(stillSelected && appState.markdownEditor.field && stillSelected[appState.markdownEditor.field.urlKey] || "").trim();
            if (stillUrl !== url || currentActiveUrl === url) return;
            rememberReferenceDoc(field, nextCache);
            if (appState.markdownEditor.referenceMode === "reference" && appState.markdownEditor.referenceKey === field.key) {
              setReferenceText(field, nextCache.text || "", nextCache.title || field.label);
            }
            renderReferenceTabs();
          }
        });
      });
    }

    function applyCreatedDocResult(docKey, result, previousPayload) {
      const url = String(result && result.docUrl || "").trim();
      if (!url) throw new Error("Create doc did not return a URL.");

      const refreshed = Object.assign({}, previousPayload || collectDetailFormData() || {}, result.project || {});
      refreshed.workspace_url = result.folderUrl || refreshed.workspace_url || el.detailWorkspaceUrl.value.trim();
      refreshed[docKey] = url;

      if (docKey === "dev_edit_doc_url") { refreshed.development_edit = url; refreshed["development edit"] = url; }
      if (docKey === "line_edit_doc_url") { refreshed.line_edit = url; refreshed["line edit"] = url; }
      if (docKey === "copy_edit_doc_url") { refreshed.copy_edit = url; refreshed["copy edit"] = url; }
      if (docKey === "outline_template_doc_url") { refreshed.outline_template = url; refreshed["outline template"] = url; }
      if (docKey === "notes_doc_url") refreshed.notes = url;
      if (docKey === "characters_doc_url") refreshed.characters = url;
      if (docKey === "world_build_doc_url") refreshed["world build"] = url;
      if (docKey === "concept_doc_url") refreshed.concept = url;

      updateProjectInStateOnly(refreshed, result);

      el.detailWorkspaceUrl.value = refreshed.workspace_url || "";
      el.detailDraftUrl.value = refreshed.draft_doc_url || "";
      el.detailDevEditUrl.value = refreshed.dev_edit_doc_url || "";
      el.detailLineEditUrl.value = refreshed.line_edit_doc_url || "";
      el.detailCopyEditUrl.value = refreshed.copy_edit_doc_url || "";
      el.detailOutlineUrl.value = refreshed.outline_doc_url || "";
      el.detailOutlineTemplateUrl.value = refreshed.outline_template_doc_url || "";
      el.detailBrainstormUrl.value = refreshed.brainstorm_doc_url || "";
      el.detailNotesUrl.value = refreshed.notes_doc_url || "";
      el.detailCharactersUrl.value = refreshed.characters_doc_url || "";
      el.detailWorldBuildUrl.value = refreshed.world_build_doc_url || "";
      el.detailConceptUrl.value = refreshed.concept_doc_url || "";
      el.detailSeriesOutlineUrl.value = refreshed.series_outline_doc_url || "";
      el.detailSeriesBrainstormUrl.value = refreshed.series_brainstorm_doc_url || "";

    function createLinkedDoc(docKey) {
      const payload = getSelectedProjectPayloadForDocCreation();
      if (!payload) return;

      const field = GOOGLE_DOC_MARKDOWN_FIELDS.find(function (item) { return item.key === docKey; });
      const label = field ? field.label : "Linked Doc";
      setStatus("Creating " + label + " doc...", "warn");

      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Create doc failed.");
            applyCreatedDocResult(docKey, result, payload);
            setStatus(label + " doc created.", "ok");
          } catch (err) {
            console.error("CREATE DOC PARSE ERROR", err, json);
            setStatus("Create doc failed: " + err.message, "error");
          }
        })
        .withFailureHandler(function (error) {
          console.error("CREATE DOC ERROR", error);
          setStatus("Create doc failed: " + (error && error.message ? error.message : error), "error");
        })
        .createLinkedProjectDocJsonFromClient(JSON.stringify(payload), docKey);
    }

    function getSavedImagePickerViewMode() {

        return ["list", "small", "large"].indexOf(saved) !== -1 ? saved : "large";
      } catch (err) {
        return "large";
      }
    }

    function persistImagePickerViewMode(mode) {
      try {
        localStorage.setItem(IMAGE_PICKER_VIEW_CACHE_KEY, mode);
      } catch (err) {
        console.warn("Image picker view preference could not be saved", err);
      }
    }

    function readImagePickerLibraryCache() {
      try {
        const raw = localStorage.getItem(IMAGE_PICKER_LIBRARY_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.files)) return null;
        return {
          files: parsed.files,
          lastLoadedAt: Number(parsed.lastLoadedAt || 0) || 0
        };
      } catch (err) {
        console.warn("Image picker library cache could not be read", err);
        return null;
      }
    }

    function persistImagePickerLibraryCache(files, lastLoadedAt) {
      try {
        localStorage.setItem(IMAGE_PICKER_LIBRARY_CACHE_KEY, JSON.stringify({
          files: Array.isArray(files) ? files : [],
          lastLoadedAt: Number(lastLoadedAt || Date.now()) || Date.now()
        }));
      } catch (err) {
        console.warn("Image picker library cache could not be saved", err);
      }
    }

    function hydrateImagePickerLibraryFromCache() {
      const cached = readImagePickerLibraryCache();
      if (!cached || !cached.files || !cached.files.length) return false;
      appState.imagePicker.files = cached.files.slice();
      appState.imagePicker.lastLoadedAt = Number(cached.lastLoadedAt || 0) || 0;
      return true;
    }

      projectList.innerHTML = "";

        if (!selectedSeries || String(p.series || "").trim() === selectedSeries) {
          var t = String(p.title || "").trim();
          if (t && !seen[t]) { seen[t] = true; var opt = document.createElement("option"); opt.value = t; projectList.appendChild(opt); }
        }
      });

    function populateImagePickerMetaDatalists() {
      var projectValues = {}, seriesValues = {};
      (appState.projects || []).forEach(function (p) {
        if (p.title) projectValues[p.title] = true;
        if (p.series) seriesValues[p.series] = true;
      });
      var projectList = document.getElementById("imagePickerProjectList");
      var seriesList = document.getElementById("imagePickerSeriesList");
      if (projectList) {
        projectList.innerHTML = "";
        Object.keys(projectValues).sort(function (a, b) { return a.localeCompare(b); }).forEach(function (v) {
          var opt = document.createElement("option");
          opt.value = v;
          projectList.appendChild(opt);
        });
      }
      if (seriesList) {
        seriesList.innerHTML = "";
        Object.keys(seriesValues).sort(function (a, b) { return a.localeCompare(b); }).forEach(function (v) {
          var opt = document.createElement("option");
          opt.value = v;
          seriesList.appendChild(opt);
        });

    function hideImagePickerMetaPanel() {

    }

    function saveImagePickerMeta() {
      if (!el.imagePickerMetaSaveButton) return;
      var url = appState.imagePicker.selectedUrl;
      if (!url) return;
      var file = findImagePickerFileByUrl(url);
      if (!file) return;
      el.imagePickerMetaSaveButton.disabled = true;
      el.imagePickerMetaSaveButton.textContent = "Saving...";
      var updates = {};
      if (el.imagePickerMetaNameInput && el.imagePickerMetaNameInput.value !== (file.name || "")) {
        updates.file_name = el.imagePickerMetaNameInput.value;
      }
      if (el.imagePickerMetaCategory && el.imagePickerMetaCategory.value !== (file.category || "general")) {
        updates.category = el.imagePickerMetaCategory.value;
      }
      var gs = Object.assign({}, file.generatorSettings || {});
      var gsChanged = false;
      if (el.imagePickerMetaSummary) { gs.summary = el.imagePickerMetaSummary.value; gsChanged = true; }
      if (el.imagePickerMetaPrompt) { gs.prompt = el.imagePickerMetaPrompt.value; gsChanged = true; }
      if (el.imagePickerMetaSeries) { gs.series = el.imagePickerMetaSeries.value; gsChanged = true; }
      if (el.imagePickerMetaProject) { gs.projectTitle = el.imagePickerMetaProject.value; gsChanged = true; }
      if (gsChanged) {
        updates.generator_settings = gs;
      }
      var hasUpdates = false;
      for (var k in updates) { hasUpdates = true; break; }
      if (!hasUpdates) {
        el.imagePickerMetaSaveButton.disabled = false;
        el.imagePickerMetaSaveButton.textContent = "Save Metadata";
        return;
      }
      if (gsChanged && file.generatorSettings) {
        file.generatorSettings = gs;
      } else if (gsChanged) {
        file.generatorSettings = gs;
      }
      if (updates.file_name) file.name = updates.file_name;
      if (updates.category) file.category = updates.category;
      supabaseRunner
        .withSuccessHandler(function () {
          el.imagePickerMetaSaveButton.disabled = false;
          el.imagePickerMetaSaveButton.textContent = "Save Metadata";
          setStatus("Image metadata saved.", "ok");
          persistImagePickerLibraryCache(appState.imagePicker.files, appState.imagePicker.lastLoadedAt);
          if (updates.file_name && el.imagePickerGrid) {
            var selectedUrl = normalizeImageUrl(appState.imagePicker.selectedUrl || "") || "";
            el.imagePickerGrid.querySelectorAll(".image-choice[data-image-url]").forEach(function (btn) {
              if (String(btn.getAttribute("data-image-url") || "").trim() === selectedUrl) {
                var nameEl = btn.querySelector(".image-choice-name");
                if (nameEl) nameEl.textContent = updates.file_name;
              }
            });
          }
          if (gsChanged && el.imagePickerGrid) {
            var pt = String(gs.projectTitle || "").trim();
            var sr = String(gs.series || "").trim();
            var parts = [];
            if (pt) parts.push(pt);
            if (sr) parts.push(sr);
            var projectLine = parts.length ? parts.join(" · ") : "";
            var selectedUrl = normalizeImageUrl(appState.imagePicker.selectedUrl || "") || "";
            el.imagePickerGrid.querySelectorAll(".image-choice[data-image-url]").forEach(function (btn) {
              if (String(btn.getAttribute("data-image-url") || "").trim() === selectedUrl) {
                var projectEl = btn.querySelector(".image-choice-project");
                if (projectEl) {
                  projectEl.textContent = projectLine;
                  projectEl.style.display = projectLine ? "" : "none";
                }
              }
            });
          }
        })
        .withFailureHandler(function (e) {
          el.imagePickerMetaSaveButton.disabled = false;
          el.imagePickerMetaSaveButton.textContent = "Save Metadata";
          setStatus("Save failed: " + (e.message || e), "error");
        })
        .saveImagePickerMetaFromClient(file.id, JSON.stringify(updates));
    }

    function persistImageGeneratorSettingsForAsset(fileRecord) {
      if (!fileRecord || !fileRecord.id) return;
      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;
      const settings = fileRecord.generatorSettings && typeof fileRecord.generatorSettings === "object"
        ? fileRecord.generatorSettings
        : captureImageGeneratorSettings();
      supabaseRunner
        .withSuccessHandler(function () {})
        .withFailureHandler(function (error) {
          console.warn("IMAGE GENERATOR SETTINGS PERSIST FAILED", error);
        })
        .updateImageAssetGeneratorSettingsJsonFromClient(fileRecord.id, JSON.stringify(settings));
    }

    function backfillLegacyImageGeneratorSettingsToAssets(files) {
      if (!Array.isArray(files) || !files.length) return 0;
      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return 0;
      const store = readImageGeneratorSettingsStore();
      const legacyImages = store && store.images && typeof store.images === "object" ? store.images : {};
      let queued = 0;

      files.forEach(function (fileRecord) {
        if (!fileRecord || !fileRecord.id) return;
        if (fileRecord.generatorSettings && typeof fileRecord.generatorSettings === "object" && Object.keys(fileRecord.generatorSettings).length) return;
        const identityKeys = getImageIdentityKeys(fileRecord.url, fileRecord.legacyDriveUrl);
        let matchedSettings = null;
        for (let i = 0; i < identityKeys.length; i += 1) {
          const key = identityKeys[i];
          if (legacyImages[key] && typeof legacyImages[key] === "object") {
            matchedSettings = legacyImages[key];
            break;
          }
        }
        if (!matchedSettings) return;
        fileRecord.generatorSettings = Object.assign({}, matchedSettings);
        queued += 1;
        persistImageGeneratorSettingsForAsset(fileRecord);
      });

      return queued;
    }

    function getUsedImageUrlsSet() {
      const used = {};
      (appState.projects || []).forEach(function (project) {
        [project && project.image, project && project.series_image].forEach(function (value) {
          const safe = normalizeImageUrl(value || "");
          if (safe) used[safe] = true;
        });
      });
      if (typeof codexCache !== "undefined" && codexCache && codexCache.entitiesBySeries) {
        try {
          Object.keys(codexCache.entitiesBySeries).forEach(function (seriesId) {
            var entities = codexCache.entitiesBySeries[seriesId] || [];
            entities.forEach(function (entity) {
              if (entity && entity.image_url) {
                var safe = normalizeImageUrl(entity.image_url);
                if (safe) used[safe] = true;
              }
            });
          });
        } catch (e) { /* ignore */ }
      }
      return used;
    }

    function ensureImagePickerThumbObserver() {
      if (appState.imagePicker.thumbObserver || typeof IntersectionObserver === "undefined") return appState.imagePicker.thumbObserver || null;
      appState.imagePicker.thumbObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          const src = String(img.getAttribute("data-src") || "").trim();
          if (src && !img.getAttribute("src")) {
            img.setAttribute("src", src);
          }
          appState.imagePicker.thumbObserver.unobserve(img);
        });
      }, {
        root: el.imagePickerGrid || null,
        rootMargin: "80px 0px",
        threshold: 0.01
      });
      return appState.imagePicker.thumbObserver;
    }

    function primeImagePickerThumb(img, thumbUrl) {
      if (!img) return;
      const safeUrl = String(thumbUrl || "").trim();
      img.setAttribute("loading", "lazy");
      img.setAttribute("decoding", "async");
      img.classList.add("is-thumb-loading");
      img.addEventListener("load", function handleLoad() {
        img.classList.remove("is-thumb-loading");
        img.classList.add("is-thumb-ready");
        if (safeUrl) appState.imagePicker.loadedThumbs[safeUrl] = true;
        img.removeEventListener("load", handleLoad);
      });
      img.addEventListener("error", function handleError() {
        img.classList.remove("is-thumb-loading");
        img.classList.add("is-thumb-error");
        img.removeEventListener("error", handleError);
      });

      if (!safeUrl) return;

      if (appState.imagePicker.loadedThumbs[safeUrl]) {
        img.setAttribute("src", safeUrl);
        return;
      }

      img.setAttribute("data-src", safeUrl);
      const observer = ensureImagePickerThumbObserver();
      if (observer) {
        observer.observe(img);
      } else {
        img.setAttribute("src", safeUrl);
      }
    }

    function syncImagePickerSelectionState() {
      if (!el.imagePickerGrid) return;

      el.imagePickerGrid.querySelectorAll(".image-choice[data-image-url]").forEach(function (button) {

    function renderImagePickerGrid() {
      if (!el.imagePickerGrid) return;
      const allFiles = appState.imagePicker.files || [];
      const filter = appState.imagePicker.activeFilter || "all";
      const files = filter === "all" ? allFiles : allFiles.filter(function (f) { return String(f.category || "general") === filter; });
      const mode = appState.imagePicker.viewMode || "large";
      const fileToken = files.map(function (f) { return String(f.url || f.id || ""); }).join(",");
      appState.imagePicker._lastFileToken = appState.imagePicker._lastFileToken || "";
      const filesChanged = fileToken !== appState.imagePicker._lastFileToken;
      appState.imagePicker._lastFileToken = fileToken;

      el.imagePickerGrid.className = "image-picker-grid view-" + mode;

      if (appState.imagePicker.isLoading) {
        el.imagePickerGrid.innerHTML = "<div class='image-picker-empty tiny'>Loading images...</div>";

      if (!files.length) {

        return;
      }

      if (!filesChanged && el.imagePickerGrid.querySelectorAll(".image-choice").length === files.length) {
        // Files unchanged and DOM count matches — CSS handles all layout via className.
        // Only skip rebuild if DOM structure is compatible (list mode has .image-choice-copy).
        var firstButton = el.imagePickerGrid.querySelector(".image-choice");
        var hasCopySection = firstButton && firstButton.querySelector(".image-choice-copy");
        var needsCopySection = mode === "list";
        if (hasCopySection === needsCopySection) {

      }

      const usedImageUrls = getUsedImageUrlsSet();
      el.imagePickerGrid.innerHTML = "";

      function createImageChoiceButton(file) {
        const url = String(file.url || "").trim();
        const normalizedUrl = normalizeImageUrl(url) || url;
        const identityKeys = getImageIdentityKeys(file.url, file.legacyDriveUrl);
        const thumb = String(file.thumbnailUrl || getDriveImageThumbnailUrl(file) || url).trim();
        const name = String(file.name || "Untitled image");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "image-choice" + (identityKeys.indexOf(normalizeImageUrl(appState.imagePicker.selectedUrl || "") || String(appState.imagePicker.selectedUrl || "").trim()) !== -1 ? " is-selected" : "");
        button.setAttribute("data-image-url", normalizedUrl);

        const deleteBtn = document.createElement("span");

        button.appendChild(deleteBtn);

        const thumbWrap = document.createElement("div");
        thumbWrap.className = "image-choice-thumb";
        const img = document.createElement("img");
        img.alt = name;

        var projectLine = "";
        if (file.generatorSettings) {
          var pt = String(file.generatorSettings.projectTitle || "").trim();
          var sr = String(file.generatorSettings.series || "").trim();
          var parts = [];
          if (pt) parts.push(pt);
          if (sr) parts.push(sr);
          if (parts.length) projectLine = parts.join(" · ");
        }
        if (mode === "list") {
          const copy = document.createElement("div");

          urlLine.className = "image-choice-url tiny";
          urlLine.textContent = projectLine || url || "No URL";

          textWrap.className = "image-choice-text";
          const title = document.createElement("div");
          title.className = "image-choice-name";

      if (files.length <= 100) {

        for (var i = 0; i < files.length; i++) {
          frag.appendChild(createImageChoiceButton(files[i]));
        }
        el.imagePickerGrid.appendChild(frag);

        // Large count: yield once before building to keep UI responsive
        window.requestAnimationFrame(function () {
          if (!el.imagePickerGrid) return;
          var frag = document.createDocumentFragment();
          for (var i = 0; i < files.length; i++) {
            frag.appendChild(createImageChoiceButton(files[i]));
          }
          el.imagePickerGrid.appendChild(frag);
        });

    function loadDriveImages(forceRefresh) {

    var _cropState = { imageUrl: "", imageEl: null, box: { x: 0, y: 0, w: 0, h: 0 }, aspect: 1, dragging: false, resizing: false, handle: "", startX: 0, startY: 0, startBox: null };

    function openImageCropModal(imageUrl) {
      if (!el.imageCropModal || !el.imageCropSource) return;
      var safe = String(imageUrl || "").trim();
      if (!safe) return;
      _cropState.imageUrl = safe;
      _cropState.aspect = 1;
      el.imageCropSource.src = safe;
      el.imageCropModal.classList.add("is-open");
      el.imageCropModal.setAttribute("aria-hidden", "false");
      updateModalScrollLock();
      el.imageCropSource.onload = function () { initCropBox(); };
      updateCropAspectButtons();
    }

    function closeImageCropModal() {
      if (!el.imageCropModal) return;
      el.imageCropModal.classList.remove("is-open");
      el.imageCropModal.setAttribute("aria-hidden", "true");
      updateModalScrollLock();
    }

    function updateCropAspectButtons() {
      if (!el.imageCropModal) return;
      el.imageCropModal.querySelectorAll(".image-crop-aspect-btn").forEach(function (btn) {
        btn.classList.toggle("is-active", btn.getAttribute("data-aspect") === (_cropState.aspect === 0 ? "free" : (_cropState.aspect === 1 ? "1:1" : _cropState.aspect === 0.75 ? "3:4" : "16:9")));
      });
    }

    function setCropAspect(ratio) {
      if (ratio === "free") _cropState.aspect = 0;
      else if (ratio === "1:1") _cropState.aspect = 1;
      else if (ratio === "3:4") _cropState.aspect = 0.75;
      else if (ratio === "16:9") _cropState.aspect = 16 / 9;
      updateCropAspectButtons();
      if (_cropState.imageEl) constrainCropBox();
      renderCropBox();
    }

    function initCropBox() {
      var img = el.imageCropSource;
      if (!img || !img.naturalWidth) return;
      _cropState.imageEl = { w: img.naturalWidth, h: img.naturalHeight, displayW: img.clientWidth, displayH: img.clientHeight };
      var minDim = Math.min(img.clientWidth, img.clientHeight);
      var size = Math.round(minDim * 0.6);
      _cropState.box = {
        x: Math.round((img.clientWidth - size) / 2),
        y: Math.round((img.clientHeight - size) / 2),
        w: size,
        h: _cropState.aspect ? Math.round(size / _cropState.aspect) : size
      };
      constrainCropBox();
      renderCropBox();
    }

    function constrainCropBox() {
      var img = el.imageCropSource;
      if (!img) return;
      var b = _cropState.box;
      var maxW = img.clientWidth, maxH = img.clientHeight;
      if (b.w < 40) b.w = 40;
      if (b.h < 40) b.h = 40;
      if (_cropState.aspect) { b.h = Math.round(b.w / _cropState.aspect); }
      if (b.w > maxW) b.w = maxW;
      if (b.h > maxH) b.h = maxH;
      if (_cropState.aspect) { b.w = Math.round(b.h * _cropState.aspect); }
      if (b.x < 0) b.x = 0;
      if (b.y < 0) b.y = 0;
      if (b.x + b.w > maxW) b.x = maxW - b.w;
      if (b.y + b.h > maxH) b.y = maxH - b.h;
    }

    function renderCropBox() {
      if (!el.imageCropBox || !el.imageCropSource) return;
      var b = _cropState.box;
      el.imageCropBox.style.left = b.x + "px";
      el.imageCropBox.style.top = b.y + "px";
      el.imageCropBox.style.width = b.w + "px";
      el.imageCropBox.style.height = b.h + "px";
      if (el.imageCropOverlay) {
        var img = el.imageCropSource;
        var iw = img.clientWidth, ih = img.clientHeight;
        el.imageCropOverlay.style.clipPath = "polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, " +
          (b.x / iw * 100) + "% " + (b.y / ih * 100) + "%, " +
          (b.x / iw * 100) + "% " + ((b.y + b.h) / ih * 100) + "%, " +
          ((b.x + b.w) / iw * 100) + "% " + ((b.y + b.h) / ih * 100) + "%, " +
          ((b.x + b.w) / iw * 100) + "% " + (b.y / ih * 100) + "%, " +
          (b.x / iw * 100) + "% " + (b.y / ih * 100) + "%)";
      }
    }

    function getCropData() {
      var img = _cropState.imageEl;
      if (!img) return null;
      var b = _cropState.box;
      var scaleX = img.w / img.displayW;
      var scaleY = img.h / img.displayH;
      return { x: Math.round(b.x * scaleX), y: Math.round(b.y * scaleY), width: Math.round(b.w * scaleX), height: Math.round(b.h * scaleY) };
    }

    function applyImageCrop() {
      var cropData = getCropData();
      if (!cropData || cropData.width < 10 || cropData.height < 10) { setStatus("Crop area too small.", "error"); return; }
      setStatus("Cropping image...", "warn");
      var img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = function () {
        var canvas = document.createElement("canvas");
        canvas.width = cropData.width;
        canvas.height = cropData.height;
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, cropData.x, cropData.y, cropData.width, cropData.height, 0, 0, cropData.width, cropData.height);
        canvas.toBlob(function (blob) {
          if (!blob) { setStatus("Crop failed.", "error"); return; }
          uploadCroppedImage(blob, cropData);
        }, "image/webp", 0.9);
      };
      img.onerror = function () { setStatus("Failed to load image for cropping.", "error"); };
      img.src = _cropState.imageUrl;
    }

    function uploadCroppedImage(blob, cropData) {
      var reader = new FileReader();
      reader.onload = function () {
        var dataUrl = reader.result;
        var safeName = "crop-" + Date.now();
        supabaseRunner
          .withSuccessHandler(function (json) {
            try {
              var result = parseServerResult(json);
              if (result.ok === false) throw new Error(result.error || "Upload failed.");
              var croppedUrl = result.url;
              var croppedPath = result.thumbnailFileId || "";
              var selectedFile = findImagePickerFileByUrl(appState.imagePicker.selectedUrl);
              if (selectedFile) {
                supabaseRunner
                  .withSuccessHandler(function () {
                    selectedFile.cropData = cropData;
                    selectedFile.cropData.cropped_path = croppedPath;
                    appState.imagePicker.selectedUrl = croppedUrl;
                    syncImagePickerSelectionState();
                    closeImageCropModal();
                    setStatus("Image cropped. Use Selected Image to apply.", "ok");
                  })
                  .withFailureHandler(function (e) { setStatus("Crop metadata save failed: " + (e.message || e), "error"); })
                  .saveImageCropJsonFromClient(selectedFile.id, JSON.stringify(cropData), croppedPath);
              } else {
                appState.imagePicker.selectedUrl = croppedUrl;
                closeImageCropModal();
                if (el.imageGeneratorModal && el.imageGeneratorModal.classList.contains("is-open")) {
                  closeImageGeneratorModal();
                  applySelectedImageUrl(croppedUrl);
                  setStatus("Cropped image applied.", "ok");
                } else {
                  setStatus("Image cropped. Use Selected Image to apply.", "ok");
                }
              }
            } catch (e) { setStatus("Crop upload failed: " + e.message, "error"); }
          })
          .withFailureHandler(function (e) { setStatus("Crop upload failed: " + (e.message || e), "error"); })
          .uploadProjectImageJsonFromClient("", safeName + ".webp", "image/webp", dataUrl, safeName + "-thumb.webp", "image/webp", dataUrl, "", "general");
      };
      reader.readAsDataURL(blob);
    }

    (function initCropBoxInteraction() {
      var canvasEl = null;
      function getCanvas() { return canvasEl || (canvasEl = el.imageCropCanvas); }
      function onPointerDown(e) {
        var handle = e.target.getAttribute("data-handle");
        var box = el.imageCropBox;
        if (handle) {
          _cropState.resizing = true;
          _cropState.handle = handle;
        } else if (box && (e.target === box || box.contains(e.target))) {
          _cropState.dragging = true;
        } else { return; }
        _cropState.startX = e.clientX;
        _cropState.startY = e.clientY;
        _cropState.startBox = Object.assign({}, _cropState.box);
        e.preventDefault();
      }
      function onPointerMove(e) {
        if (!_cropState.dragging && !_cropState.resizing) return;
        var dx = e.clientX - _cropState.startX;
        var dy = e.clientY - _cropState.startY;
        var b = _cropState.startBox;
        var img = el.imageCropSource;
        if (!img) return;
        var maxW = img.clientWidth, maxH = img.clientHeight;
        if (_cropState.dragging) {
          _cropState.box.x = Math.max(0, Math.min(maxW - b.w, b.x + dx));
          _cropState.box.y = Math.max(0, Math.min(maxH - b.h, b.y + dy));
        } else if (_cropState.resizing) {
          var h = _cropState.handle;
          var newW = b.w, newH = b.h, newX = b.x, newY = b.y;
          if (h === "se") { newW = Math.max(40, b.w + dx); newH = _cropState.aspect ? Math.round(newW / _cropState.aspect) : Math.max(40, b.h + dy); }
          else if (h === "sw") { newW = Math.max(40, b.w - dx); newH = _cropState.aspect ? Math.round(newW / _cropState.aspect) : Math.max(40, b.h + dy); newX = b.x + b.w - newW; }
          else if (h === "ne") { newW = Math.max(40, b.w + dx); newH = _cropState.aspect ? Math.round(newW / _cropState.aspect) : Math.max(40, b.h - dy); newY = b.y + b.h - newH; }
          else if (h === "nw") { newW = Math.max(40, b.w - dx); newH = _cropState.aspect ? Math.round(newW / _cropState.aspect) : Math.max(40, b.h - dy); newX = b.x + b.w - newW; newY = b.y + b.h - newH; }
          _cropState.box = { x: newX, y: newY, w: newW, h: newH };
          constrainCropBox();
        }
        renderCropBox();
        e.preventDefault();
      }
      function onPointerUp() { _cropState.dragging = false; _cropState.resizing = false; }
      document.addEventListener("mousedown", function (e) {
        if (el.imageCropModal && el.imageCropModal.classList.contains("is-open") && el.imageCropCanvas && el.imageCropCanvas.contains(e.target)) onPointerDown(e);
      });
      document.addEventListener("mousemove", function (e) { if (_cropState.dragging || _cropState.resizing) onPointerMove(e); });
      document.addEventListener("mouseup", onPointerUp);
    })();

    function triggerLocalImageUpload() {
      if (el.localImageFileInput) el.localImageFileInput.click();
    }

    function uploadLocalImageFile(file) {
      if (!file) return;
      if (!/^image\//.test(file.type || "")) {
        setStatus("Please choose an image file.", "error");
        return;
      }

      appState.imagePicker.isUploading = true;

    async function optimizeLegacyImages() {
      if (appState.imagePicker.isUploading || appState.imagePicker.isLoading) return;
      try {
        appState.imagePicker.isUploading = true;
        const useSupabaseMigration = isSupabaseManagedDocUrlKey("outline_doc_url");
        setImagePickerStatus(useSupabaseMigration ? "Migrating Drive images into Supabase..." : "Scanning for legacy images...", "warn");
        setStatus(useSupabaseMigration ? "Migrating Drive images into Supabase..." : "Scanning for legacy images...", "warn");

        if (useSupabaseMigration) {
          const migration = await callAppsScriptJson("migrateDriveImagesToSupabaseJsonFromClient", [PROJECT_IMAGE_FOLDER_ID]);
          appState.imagePicker.isUploading = false;
          await loadProjects();
          loadDriveImages(true);
          const migratedCount = Number(migration.migratedCount || 0) || 0;
          const updatedRows = Number(migration.updatedRows || 0) || 0;
          setImagePickerStatus("Migrated " + migratedCount + " Drive image" + (migratedCount === 1 ? "" : "s") + " to Supabase.", "ok");
          setStatus("Image migration complete" + (updatedRows ? ". Updated " + updatedRows + " linked image field" + (updatedRows === 1 ? "" : "s") + "." : "."), "ok");
          return;
        }

        const legacy = await callAppsScriptJson("listLegacyProjectImagesJsonFromClient", [PROJECT_IMAGE_FOLDER_ID]);
        const legacyFiles = Array.isArray(legacy.files) ? legacy.files : [];
        if (!legacyFiles.length) {
          appState.imagePicker.isUploading = false;
          setImagePickerStatus("No legacy root-folder images were found.", "ok");
          setStatus("No legacy root-folder images were found.", "ok");
          return;
        }

        let migrated = 0;
        for (let i = 0; i < legacyFiles.length; i += 1) {
          const legacyFile = legacyFiles[i];
          setImagePickerStatus("Optimizing legacy image " + (i + 1) + " of " + legacyFiles.length + "...", "warn");
          const imageData = await callAppsScriptJson("getProjectImageDataJsonFromClient", [legacyFile.id]);
          const blob = await fetch(String(imageData.dataUrl || "")).then(function (response) { return response.blob(); });
          const bundle = await buildOptimizedImageUploadBundle(blob, legacyFile.name);
          const uploadResult = await callAppsScriptJson("uploadProjectImageJsonFromClient", [
            PROJECT_IMAGE_FOLDER_ID,
            bundle.originalName,
            bundle.originalMimeType,
            bundle.originalDataUrl,
            bundle.previewName,
            bundle.previewMimeType,
            bundle.previewDataUrl
          ]);
          await callAppsScriptJson("finalizeLegacyProjectImageMigrationJsonFromClient", [
            PROJECT_IMAGE_FOLDER_ID,
            legacyFile.id,
            legacyFile.url,
            uploadResult.url
          ]);
          migrated += 1;
        }

        appState.imagePicker.isUploading = false;
        setImagePickerStatus("Optimized " + migrated + " legacy image" + (migrated === 1 ? "" : "s") + ".", "ok");
        setStatus("Optimized " + migrated + " legacy image" + (migrated === 1 ? "" : "s") + ".", "ok");
        loadDriveImages(true);
        loadProjects();
      } catch (error) {
        appState.imagePicker.isUploading = false;
        console.error("LEGACY IMAGE OPTIMIZE ERROR", error);
        const message = error && error.message ? error.message : "Legacy image optimization failed.";
        setImagePickerStatus(message, "error");
        setStatus(message, "error");
      }
    }

    async function deleteSelectedImageFromLibrary() {
      const selectedUrl = normalizeImageUrl(appState.imagePicker.selectedUrl || "");
      if (!selectedUrl) {
        setImagePickerStatus("Select an image first.", "error");
        return;
      }

      const selectedFile = (appState.imagePicker.files || []).find(function (file) {
        return normalizeImageUrl(file && file.url || "") === selectedUrl;
      });

      if (!selectedFile || !selectedFile.id) {
        setImagePickerStatus("The selected image could not be resolved.", "error");

      }

      const label = String(selectedFile.name || "selected image").trim();
      const confirmed = window.confirm("Delete '" + label + "' from the image library?\n\nThis will also clear any project or series image links currently pointing at it.");
      if (!confirmed) return;

      try {
        appState.imagePicker.isUploading = true;
        setImagePickerStatus("Deleting selected image...", "warn");
        setStatus("Deleting selected image...", "warn");

        const result = await callAppsScriptJson("deleteProjectImageJsonFromClient", [
          PROJECT_IMAGE_FOLDER_ID,
          selectedFile.id,
          selectedFile.thumbnailFileId || "",
          selectedFile.url
        ]);

        appState.imagePicker.files = (appState.imagePicker.files || []).filter(function (file) {
          return normalizeImageUrl(file && file.url || "") !== selectedUrl;
        });
        appState.imagePicker.selectedUrl = "";
        appState.imagePicker.isUploading = false;
        renderImagePickerGrid();
        loadProjects();

        setImagePickerStatus("Deleted image. Cleared " + Number(result.updatedRows || 0) + " linked project field" + (Number(result.updatedRows || 0) === 1 ? "" : "s") + ".", "ok");
        setStatus("Image deleted and linked fields cleared.", "ok");
      } catch (error) {
        appState.imagePicker.isUploading = false;
        console.error("IMAGE DELETE ERROR", error);
        const message = error && error.message ? error.message : "Delete failed.";
        setImagePickerStatus(message, "error");
        setStatus(message, "error");
      }
    }

    function getImageDeleteConfirmPopup() {
      var popup = document.getElementById("imageDeleteConfirmPopup");

        popup.className = "image-delete-popup";
        popup.innerHTML = '<div class="image-delete-popup-text">Delete this image?</div>'
          + '<div class="image-delete-popup-actions">'
          + '<button class="image-delete-popup-cancel">Cancel</button>'
          + '<button class="image-delete-popup-delete">Delete</button>'
          + '</div>';
        popup.addEventListener("click", function (e) { e.stopPropagation(); });
        document.body.appendChild(popup);
        popup.querySelector(".image-delete-popup-cancel").addEventListener("click", function () {
          hideImageDeleteConfirm();
        });
        popup.querySelector(".image-delete-popup-delete").addEventListener("click", function () {
          var file = popup._deleteFile;
          if (file) deleteImageFile(file);
        });
      }
      return popup;
    }

    function showImageDeleteConfirm(anchorEl, file) {
      var existing = document.getElementById("imageDeleteConfirmPopup");
      if (existing && existing.style.display !== "none") return;
      var popup = getImageDeleteConfirmPopup();
      popup._deleteFile = file;
      var rect = anchorEl.getBoundingClientRect();
      var left = rect.left;
      var top = rect.bottom + 4;
      var w = popup.offsetWidth || 160;
      if (left + w > window.innerWidth - 8) {
        left = window.innerWidth - w - 8;
      }
      if (left < 4) left = 4;
      popup.style.left = left + "px";
      popup.style.top = top + "px";
      popup.style.display = "block";
      var hideHandler = function (e) {
        if (!popup.contains(e.target)) {
          popup.style.display = "none";
          document.removeEventListener("click", hideHandler);
        }
      };
      setTimeout(function () { document.addEventListener("click", hideHandler); }, 0);
    }

    function hideImageDeleteConfirm() {
      var popup = document.getElementById("imageDeleteConfirmPopup");
      if (popup) popup.style.display = "none";

    function deleteImageFile(file) {
      if (!file || !file.id) {
        setImagePickerStatus("Cannot delete: image ID not found.", "error");

      hideImageDeleteConfirm();
      var selectedUrl = normalizeImageUrl(file.url || "");

      appState.imagePicker.isUploading = true;

      supabaseRunner

    function stripWritingWorkspaceMarkdown(text) {
      return String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/^#{1,6}\s+/gm, "")
        .replace(/^\s*>\s?/gm, "")
        .replace(/\*\*(.*?)\*\*/g, "$1")
        .replace(/\*(.*?)\*/g, "$1")
        .replace(/__(.*?)__/g, "$1")
        .replace(/_(.*?)_/g, "$1")
        .replace(/`([^`]+)`/g, "$1")
        .replace(/\[(.*?)\]\((.*?)\)/g, "$1")
        .trim();
    }

    function countWritingWorkspaceWords(text) {
      var clean = stripWritingWorkspaceMarkdown(stripHtmlTags(text));
      if (!clean) return 0;
      return clean.split(/\s+/).filter(Boolean).length;

    function formatWritingWorkspaceReadTime(wordCount) {

    function inferWritingWorkspaceSegmentKind(title, level) {
      var safeTitle = String(title || "").trim();
      if (/^(act|part|book|volume|episode)\b/i.test(safeTitle)) return "act";
      if (/^(chapter|scene)\b/i.test(safeTitle)) return "chapter";
      if (Number(level || 0) === 1) return "act";
      if (Number(level || 0) === 2) return "chapter";
      return "section";
    }

    function parseWritingWorkspaceSegments(text, project) {
      var source = String(text || "").replace(/\r\n/g, "\n").trim();

      var selected = project || getSelectedProject() || {};
      var fallbackTitle = String(selected.title || "Manuscript").trim() || "Manuscript";
      var structureTemplate = getDraftStructureTemplate(selected);
      var templateSection = structureTemplate[0] || {};
      var title = String(templateSection.title || fallbackTitle).trim() || fallbackTitle;
      var kind = inferWritingWorkspaceSegmentKind(title, 1);
      return [{
        key: String(templateSection.sectionKey || templateSection.id || "segment-1").trim() || "segment-1",
        title: title,
        level: 1,
        kind: kind,
        startLine: 0,
        endLine: source.split("\n").length,
        text: source,
        cleanText: stripWritingWorkspaceMarkdown(stripHtmlTags(source)),
        wordCount: countWritingWorkspaceWords(source),
        label: title,
        parentKey: "",
        parentTitle: "",
        childTitles: []
      }];
    }

    function buildWritingWorkspaceTextFromSections(sections) {
      return (Array.isArray(sections) ? sections : [])
        .map(function (section) { return String(section && section.text || "").trim(); })
        .filter(Boolean)
        .join("\n\n")
        .trim();
    }

    function buildWritingWorkspaceSegmentsFromSections(sections, project) {
      var selected = project || getSelectedProject() || {};
      var fallbackTitle = String(selected.title || "Manuscript").trim() || "Manuscript";
      var seen = {};
      return (Array.isArray(sections) ? sections : []).map(function (section, index) {
        var title = String(section && section.title || "").trim() || ("Section " + (index + 1));
        var keyBase = String(section && (section.key || section.sectionKey || section.section_key || section.id) || "").trim();
        var normalizedKey = keyBase || ("segment-" + (index + 1));
        var dedupeKey = normalizedKey.toLowerCase();
        if (seen[dedupeKey]) return null;
        seen[dedupeKey] = true;
        var textBlock = String(section && (section.text || section.markdown_content) || "").trim();
        return {
          key: normalizedKey,
          title: title,
          level: 1,
          kind: inferWritingWorkspaceSegmentKind(title, 1),
          startLine: 0,
          endLine: 0,
          text: textBlock,
          cleanText: stripWritingWorkspaceMarkdown(stripHtmlTags(textBlock)),
          wordCount: Number(section && section.wordCount != null ? section.wordCount : countWritingWorkspaceWords(textBlock)) || 0,
          label: title,
          parentKey: "",

          childTitles: [],
          sortOrder: section && section.sortOrder != null ? Number(section.sortOrder) : (index + 1)

      var selected = project || getSelectedProject();
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var fullText = String(appState.writingWorkspace.draftText || "").trim();
      var fullWordCount = countWritingWorkspaceWords(fullText);
      var scope = String(appState.writingWorkspace.scope || "");
      var segment = scope ? segments.find(function (item) { return item.key === scope; }) || null : null;
      if (!segment && segments.length) {
        segment = segments[0];
        scope = segment.key;
        appState.writingWorkspace.scope = scope;
      }

      if (el.writingInspectorMeta) {
        el.writingInspectorMeta.textContent = selected ? ((selected.series || "Standalone") + " - " + (selected.title || "Untitled")) : "No manuscript loaded";
      }
      if (el.writingInspectorScopeTitle) {
        el.writingInspectorScopeTitle.textContent = segment ? segment.title : "No section selected";
      }
      if (el.writingInspectorScopeNote) {
        if (segment) {
          var notes = [];
          notes.push((segment.kind || "section").toUpperCase());
          notes.push(String(segment.wordCount || 0) + " words");
          notes.push(formatWritingWorkspaceReadTime(segment.wordCount || 0));
          el.writingInspectorScopeNote.textContent = notes.join(" - ");
        } else {
          el.writingInspectorScopeNote.textContent = "FULL MANUSCRIPT - " + String(fullWordCount || 0) + " words - " + formatWritingWorkspaceReadTime(fullWordCount);
        }
      }
      var segIdx = segment ? segments.indexOf(segment) : -1;
      if (el.writingInspectorScopeChapter) {
        el.writingInspectorScopeChapter.textContent = segIdx >= 0 ? "— CHAPTER " + (segIdx + 1) : "";
      }
      if (el.writingInspectorOutline) {
        if (segment) {
          var sceneHtml = getOutlineScenesForChapterHtml(segment.key);
          if (sceneHtml) {
            el.writingInspectorOutline.innerHTML = sceneHtml;
          } else {
            var excerpt = stripHtmlTags(segment.cleanText || "").split("\n").map(function (line) { return String(line || "").trim(); }).filter(Boolean).slice(0, 3).join("\n");
            el.writingInspectorOutline.textContent = excerpt ? ("Excerpt:\n" + excerpt) : "No outline notes were found in this section yet.";
          }
        } else {
          el.writingInspectorOutline.textContent = "Structure overview:\n" +
            "- " + segments.length + " chapter section" + (segments.length === 1 ? "" : "s") + "\n" +
            "- Scope dropdown follows the saved draft section list.\n" +
            "- Use New Chapter or New Scene to grow the manuscript.";
        }
      }
      updateWritingInspectorCodex(selected);
      switchInspectorTab(appState.writingWorkspace.inspectorTab || "outline");
      renderWritingWorkspaceNotes();
      renderWritingWorkspaceFixes();
    }

    function syncOutlineChaptersToSections(existingSections, project) {
      var outline = appState.writingWorkspace.outline || {};
      var acts = Array.isArray(outline.acts) ? outline.acts : [];
      var outlineChapters = [];
      acts.forEach(function (act) {
        (act.children || []).forEach(function (ch) {
          if (ch && ch.id) outlineChapters.push(ch);
        });
      });
      if (!outlineChapters.length) return existingSections;
      var existingKeys = {};
      existingSections.forEach(function (s) {
        existingKeys[String(s.sectionKey || s.key || "")] = true;
      });
      var result = existingSections.slice();
      outlineChapters.forEach(function (ch) {
        if (!existingKeys[ch.id]) {
          result.push({
            id: "",
            sectionKey: ch.id,
            title: String(ch.title || "").trim() || ("Chapter " + (result.length + 1)),
            text: "",
            sortOrder: result.length + 1
          });
        }
      });
      return result;
    }

    function renderWritingWorkspaceNotes() {
      var segment = getWritingWorkspaceCurrentSegment();
      var noteText = document.getElementById("writingInspectorNoteText");
      if (!noteText) return;
      noteText.value = segment ? (appState.writingWorkspace.chapterNotes[segment.key] || "") : "";
    }

    function renderWritingWorkspaceFixes() {
      var segment = getWritingWorkspaceCurrentSegment();
      var fixText = document.getElementById("writingInspectorFixText");
      if (!fixText) return;
      fixText.value = segment ? (appState.writingWorkspace.chapterFixes[segment.key] || "") : "";
    }

    function switchInspectorTab(tabName) {
      var tabs = document.querySelectorAll(".writing-inspector-tab");
      var panes = document.querySelectorAll(".writing-inspector-tab-pane");
      tabs.forEach(function (tab) {
        tab.classList.toggle("is-active", tab.getAttribute("data-inspector-tab") === tabName);
      });
      panes.forEach(function (pane) {
        var isTarget = pane.getAttribute("data-inspector-pane") === tabName;
        pane.hidden = !isTarget;
        pane.classList.toggle("is-active", isTarget);
      });
      appState.writingWorkspace.inspectorTab = tabName;
    }

    function getWritingWorkspaceCurrentSegment() {
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var scope = String(appState.writingWorkspace.scope || "");
      return scope ? segments.find(function (item) { return item.key === scope; }) || null : null;
    }

    function saveWritingWorkspaceNote() {
      var segment = getWritingWorkspaceCurrentSegment();
      if (!segment) return;
      var project = getSelectedProject();
      if (!project || !Number(project.project_id || 0)) return;
      var text = document.getElementById("writingInspectorNoteText").value || "";
      appState.writingWorkspace.chapterNotes[segment.key] = text;
      callAppsScriptJson("upsertSupabaseProjectSectionNoteFromClient", [
        project.project_id, "notes", segment.key, text
      ]).catch(function (err) { console.warn("Failed to save chapter notes:", err); });
    }

    function saveWritingWorkspaceFix() {
      var segment = getWritingWorkspaceCurrentSegment();
      if (!segment) return;
      var project = getSelectedProject();
      if (!project || !Number(project.project_id || 0)) return;
      var text = document.getElementById("writingInspectorFixText").value || "";
      appState.writingWorkspace.chapterFixes[segment.key] = text;
      callAppsScriptJson("upsertSupabaseProjectSectionNoteFromClient", [
        project.project_id, "fixes", segment.key, text
      ]).catch(function (err) { console.warn("Failed to save chapter fixes:", err); });
    }

    function loadChapterNotesAndFixes(project) {
      var selected = project || getSelectedProject();
      if (!selected || !Number(selected.project_id || 0)) return Promise.resolve();
      if (appState.writingWorkspace.chapterNotesLoaded && appState.writingWorkspace.chapterFixesLoaded) return Promise.resolve();
      return Promise.all([
        callAppsScriptJson("getSupabaseProjectSectionDocumentJsonFromClient", [selected.project_id, "notes"]),
        callAppsScriptJson("getSupabaseProjectSectionDocumentJsonFromClient", [selected.project_id, "fixes"])
      ]).then(function (results) {
        var notesResult = results[0];
        var fixesResult = results[1];
        appState.writingWorkspace.chapterNotes = {};
        if (notesResult && notesResult.ok && Array.isArray(notesResult.sections)) {
          notesResult.sections.forEach(function (sec) {
            var key = sec.sectionKey || sec.key;
            if (key) appState.writingWorkspace.chapterNotes[key] = sec.text || sec.markdown_content || "";
          });
        }
        appState.writingWorkspace.chapterFixes = {};
        if (fixesResult && fixesResult.ok && Array.isArray(fixesResult.sections)) {
          fixesResult.sections.forEach(function (sec) {
            var key = sec.sectionKey || sec.key;
            if (key) appState.writingWorkspace.chapterFixes[key] = sec.text || sec.markdown_content || "";
          });
        }
        appState.writingWorkspace.chapterNotesLoaded = true;
        appState.writingWorkspace.chapterFixesLoaded = true;
      }).catch(function () {
        appState.writingWorkspace.chapterNotesLoaded = true;
        appState.writingWorkspace.chapterFixesLoaded = true;
      });
    }

    function renderWritingWorkspaceEditor(project) {
      var selected = project || getSelectedProject();
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var scope = String(appState.writingWorkspace.scope || "");
      var segment = scope ? segments.find(function (item) { return item.key === scope; }) || null : null;
      var displayText = segment ? String(segment.text || "") : "";
      var hasContent = segments.length > 0;
      if (el.writingWorkspaceChapterHeader) {
        el.writingWorkspaceChapterHeader.hidden = !hasContent;
        if (segment) {
          var segIdx = segments.findIndex(function (item) { return item.key === scope; });
          var chapterNum = segIdx >= 0 ? (segIdx + 1) : 1;
          var customTitle = String(segment.title || "").trim();
          el.writingWorkspaceChapterNumber.textContent = "CHAPTER " + chapterNum;
          el.writingWorkspaceChapterTitle.textContent = customTitle || "Untitled";
        }
      }
      if (el.writingWorkspaceEditor) {
        if (!hasContent) {
          el.writingWorkspaceEditor.innerHTML = "";
          el.writingWorkspaceEmpty.hidden = false;
          el.writingWorkspaceEmpty.textContent = selected ? "No sections loaded yet." : "Select a project to load its manuscript view.";
        } else {
          el.writingWorkspaceEmpty.hidden = true;
          el.writingWorkspaceEditor.innerHTML = displayText.indexOf("<") !== -1 ? displayText : escapeHtmlForEditor(displayText);
          applyWritingWorkspaceSpellcheck();
          applyWritingWorkspaceAutocomplete();
          applyWritingWorkspaceAutocorrect();
          updateWritingWorkspaceTypography();
        }
      }
      renderWritingWorkspaceInspector(selected);
      updateWritingWorkspaceWordCount();
    }

    function loadWritingWorkspaceDraft(forceRefresh, loadVersion) {
      var project = getSelectedProject();
      if (!project) {
        appState.writingWorkspace.draftText = "";
        appState.writingWorkspace.segments = [];
        appState.writingWorkspace.projectRow = 0;
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(null);
        renderWritingCodexList(null);
        renderPlanOutline();
        refreshWritingWorkspaceSaveState();
        return Promise.resolve("");
      }
      if (!forceRefresh && appState.writingWorkspace.projectRow === Number(project.rowNumber || 0) && appState.writingWorkspace.draftText) {
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(project);
        renderWritingCodexList(project);
        renderPlanOutline();
        refreshWritingWorkspaceSaveState();
        return Promise.resolve(appState.writingWorkspace.draftText);
      }
      var fallback = String(project.short_summary || "").trim();
      appState.writingWorkspace.projectRow = Number(project.rowNumber || 0);
      if (el.writingWorkspaceTitle) el.writingWorkspaceTitle.textContent = project.title || "Untitled";
      setWritingWorkspaceMeta(project, "");
      renderWritingCodexList(project);
      if (loadVersion == null) loadVersion = appState.writingWorkspace.version;
      if (!Number(project.project_id || 0)) {
        appState.writingWorkspace.draftText = fallback;
        appState.writingWorkspace.lastSavedAt = "";
        appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(
          buildWritingWorkspaceSectionPayloadsFromText(fallback, project),
          project
        );
        appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(project);
        renderWritingCodexList(project);
        renderPlanOutline();

        refreshWritingWorkspaceSaveState();
        return Promise.resolve(fallback);
      }
      if (el.writingWorkspaceEmpty) {
        el.writingWorkspaceEditor.innerHTML = "";
        el.writingWorkspaceEmpty.hidden = false;
        el.writingWorkspaceEmpty.textContent = "Loading manuscript...";
      }
      return Promise.all([
        callAppsScriptJson("getSupabaseProjectSectionDocumentJsonFromClient", [project.project_id, "draft"]),
        callAppsScriptJson("getSupabaseProjectOutlineJsonFromClient", [project.project_id])
      ]).then(function (results) {
          var result = results[0];
          var outlineResult = results[1];
          if (appState.writingWorkspace.version !== loadVersion) return fallback;
          var sections = Array.isArray(result && result.sections) ? result.sections : [];
          var text = buildWritingWorkspaceTextFromSections(sections) || String(result && result.text || "").trim() || fallback;
          appState.writingWorkspace.draftText = text;
          appState.writingWorkspace.lastSavedAt = "";
          appState.writingWorkspace.segments = sections.length
            ? buildWritingWorkspaceSegmentsFromSections(sections, project)
            : [];
          appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
          appState.writingWorkspace.savedSegmentTexts = {};
          appState.writingWorkspace.segments.forEach(function (seg) {
            appState.writingWorkspace.savedSegmentTexts[String(seg.key || "")] = {
              text: String(seg.text || "").trim(),
              title: String(seg.title || "").trim()
            };
          });
          if (outlineResult && outlineResult.ok && outlineResult.outline) {
            appState.writingWorkspace.outline = outlineResult.outline;
            sortOutlineBySortOrder_(appState.writingWorkspace.outline);
          }
          getPlanOutline();
          appState.writingWorkspace.outlineSnapshot = JSON.stringify(appState.writingWorkspace.outline || {});
          populatePlanTextareas();
          var syncedSections = syncOutlineChaptersToSections(sections, project);
          if (syncedSections.length !== sections.length) {
            sections = syncedSections;
            appState.writingWorkspace.segments = buildWritingWorkspaceSegmentsFromSections(sections, project);
            appState.writingWorkspace.draftText = buildWritingWorkspaceTextFromSections(sections);
            appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
            appState.writingWorkspace.savedSegmentTexts = {};
            appState.writingWorkspace.segments.forEach(function (seg) {
              appState.writingWorkspace.savedSegmentTexts[String(seg.key || "")] = {
                text: String(seg.text || "").trim(),
                title: String(seg.title || "").trim()
              };
            });
          }
          refreshWorkspaceTabDisabledState();
          cacheWritingWorkspaceDraft(project);
          renderWritingWorkspaceScopeOptions();
          renderWritingWorkspaceEditor(project);
          renderWritingCodexList(project);
          renderPlanOutline();
          loadChapterNotesAndFixes(project).then(function () {
            renderWritingWorkspaceNotes();
            renderWritingWorkspaceFixes();
          });

          refreshWritingWorkspaceSaveState();
          return text;
        })
        .catch(function () {
          if (appState.writingWorkspace.version !== loadVersion) return fallback;
          var backup = loadWorkspaceBackupFromLocalStorage(Number(project.project_id || 0));
          if (backup && backup.segments && backup.segments.length) {
            appState.writingWorkspace.draftText = backup.draftText || "";
            appState.writingWorkspace.segments = backup.segments;
            appState.writingWorkspace.savedSnapshot = backup.savedSnapshot || JSON.stringify(backup.segments);
            appState.writingWorkspace.scope = backup.scope || "";
            appState.writingWorkspace.outline = backup.outline || {};
            setStatus("Loaded workspace from local backup (Supabase unreachable).", "warn");
          } else {
            appState.writingWorkspace.draftText = fallback;
            appState.writingWorkspace.lastSavedAt = "";
            appState.writingWorkspace.segments = [];
            appState.writingWorkspace.savedSnapshot = JSON.stringify(appState.writingWorkspace.segments);
            appState.writingWorkspace.savedSegmentTexts = {};
          }
          refreshWorkspaceTabDisabledState();
          cacheWritingWorkspaceDraft(project);
          renderWritingWorkspaceScopeOptions();
          renderWritingWorkspaceEditor(project);
          renderWritingCodexList(project);
          renderPlanOutline();

          refreshWritingWorkspaceSaveState();
          return fallback;
        });
    }

    function openWritingWorkspace() {
      var project = getSelectedProject();
      if (!project) {
        appState.writingWorkspace.draftText = "";
        appState.writingWorkspace.segments = [];
        appState.writingWorkspace.scope = "";
        appState.writingWorkspace.projectRow = 0;
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(null);
        renderWritingCodexList(null);
        refreshWritingWorkspaceSaveState();
        return;
      }
      appState.writingWorkspace.version += 1;
      var version = appState.writingWorkspace.version;
      var projectRow = Number(project.rowNumber || 0);
      var projectId = Number(project.project_id || 0);
      var cached = projectId ? (appState.writingWorkspace.draftCache["p-" + projectId] || null) : null;
      var isSameProject = appState.writingWorkspace.projectRow === projectRow && appState.writingWorkspace.segments.length > 0;
      if (isSameProject) {
        setWritingWorkspaceFilter(appState.writingWorkspace.filter);
        setWritingWorkspaceSidebarTab(appState.writingWorkspace.sidebarTab);
        updateWritingWorkspaceTypography();
        renderWritingCodexList(project);
        renderWritingWorkspaceInspector(project);
        initOutlineFromSegments();

        refreshWritingWorkspaceSaveState();
        if (Number(project.series_id || 0)) {
          loadSeriesKnowledgeForSelectedProject(false).finally(function () {
            if (appState.writingWorkspace.version !== version) return;
            renderWritingCodexList(project);
            updateWritingInspectorCodex(project);
            renderPlanOutline();
          });
        } else {
          renderPlanOutline();
        }
        return;
      }
      if (cached && cached.segments && cached.segments.length) {
        appState.writingWorkspace.draftText = String(cached.draftText || "");
        appState.writingWorkspace.segments = cached.segments.slice();
        appState.writingWorkspace.scope = String(cached.scope || "");
        appState.writingWorkspace.savedSnapshot = String(cached.savedSnapshot || "");
        appState.writingWorkspace.lastSavedAt = String(cached.lastSavedAt || "");
        appState.writingWorkspace.savedSegmentTexts = Object.assign({}, cached.savedSegmentTexts || {});
        appState.writingWorkspace.outline = cached.outline && cached.outline.acts ? cached.outline : null;
        if (appState.writingWorkspace.outline) sortOutlineBySortOrder_(appState.writingWorkspace.outline);
        appState.writingWorkspace.outlineSnapshot = String(cached.outlineSnapshot || "");
        appState.writingWorkspace.chapterNotes = cached.chapterNotes ? JSON.parse(JSON.stringify(cached.chapterNotes)) : {};
        appState.writingWorkspace.chapterFixes = cached.chapterFixes ? JSON.parse(JSON.stringify(cached.chapterFixes)) : {};
        appState.writingWorkspace.chapterNotesLoaded = true;
        appState.writingWorkspace.chapterFixesLoaded = true;
        appState.writingWorkspace.projectRow = projectRow;
        setWritingWorkspaceFilter(appState.writingWorkspace.filter);
        setWritingWorkspaceSidebarTab(appState.writingWorkspace.sidebarTab);
        updateWritingWorkspaceTypography();
        renderWritingWorkspaceScopeOptions();
        renderWritingWorkspaceEditor(project);
        renderWritingCodexList(project);
        renderWritingWorkspaceInspector(project);
        initOutlineFromSegments();
        refreshWorkspaceTabDisabledState();

        refreshWritingWorkspaceSaveState();
        if (Number(project.series_id || 0)) {
          loadSeriesKnowledgeForSelectedProject(false).finally(function () {
            if (appState.writingWorkspace.version !== version) return;
            renderWritingCodexList(project);
            updateWritingInspectorCodex(project);
            renderPlanOutline();
          });
        } else {
          renderPlanOutline();
        }
        return;
      }
      appState.writingWorkspace.draftText = "";
      appState.writingWorkspace.segments = [];
      appState.writingWorkspace.scope = "";
      appState.writingWorkspace.savedSnapshot = "";
      appState.writingWorkspace.lastSavedAt = "";
      setWritingWorkspaceFilter(appState.writingWorkspace.filter);
      setWritingWorkspaceSidebarTab(appState.writingWorkspace.sidebarTab);
      updateWritingWorkspaceTypography();
      renderWritingCodexList(project);
      renderWritingWorkspaceInspector(project);
      refreshWritingWorkspaceSaveState();
        if (Number(project.series_id || 0)) {
          loadSeriesKnowledgeForSelectedProject(false).finally(function () {
            if (appState.writingWorkspace.version !== version) return;
            renderWritingCodexList(project);
            updateWritingInspectorCodex(project);
            loadWritingWorkspaceDraft(true, version);
          });
        } else {
          loadWritingWorkspaceDraft(true, version);
        }
    }

    function getWritingWorkspaceEditorHtml() {
      return el.writingWorkspaceEditor ? String(el.writingWorkspaceEditor.innerHTML || "").replace(/\r\n/g, "\n") : "";
    }

    function getWritingWorkspaceEditorText() {
      return el.writingWorkspaceEditor ? String(el.writingWorkspaceEditor.innerText || "").replace(/\r\n/g, "\n") : "";
    }

    function getWritingWorkspaceMergedDraftText() {
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      return segments.map(function (s) { return String(s.text || "").trim(); }).join("\n\n");
    }

    function setWritingWorkspaceMeta(project, message) {
      if (!el.writingWorkspaceMeta) return;
      var selected = project || getSelectedProject();
      var base = selected ? ((selected.series || "Standalone") + " • " + (selected.format || "No format")) : "No project selected";
      el.writingWorkspaceMeta.textContent = message ? (base + " • " + message) : base;
    }

    function updateWritingWorkspaceSaveState(mode, label) {
      if (!el.writingWorkspaceSaveState) return;
      var nextMode = String(mode || "idle").trim() || "idle";
      var nextLabel = String(label || "").trim() || "Ready";
      el.writingWorkspaceSaveState.className = "writing-workspace-save-state is-" + nextMode;
      el.writingWorkspaceSaveState.textContent = nextLabel;
      if (el.writingWorkspaceSaveButton) {
        el.writingWorkspaceSaveButton.disabled = nextMode === "saving";
        el.writingWorkspaceSaveButton.textContent = nextMode === "saving" ? "Saving..." : "Save";
      }
      appState.writingWorkspace.lastStateLabel = nextLabel;
      updateSidebarSaveBadge();
    }

    function cacheWritingWorkspaceDraft(project) {
      var selected = project || getSelectedProject();
      var projectId = Number(selected && selected.project_id || 0);
      if (!projectId) return;
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      appState.writingWorkspace.draftCache["p-" + projectId] = {
        draftText: String(appState.writingWorkspace.draftText || ""),
        segments: segments.map(function (s) {
          return {
            key: String(s.key || ""),
            title: String(s.title || ""),
            text: String(s.text || ""),
            wordCount: Number(s.wordCount || 0),
            sortOrder: Number(s.sortOrder || 0),
            level: Number(s.level || 1),
            kind: String(s.kind || ""),
            cleanText: String(s.cleanText || ""),
            label: String(s.label || ""),
            parentKey: String(s.parentKey || ""),
            parentTitle: String(s.parentTitle || ""),
            childTitles: Array.isArray(s.childTitles) ? s.childTitles.slice() : []
          };
        }),
        scope: String(appState.writingWorkspace.scope || ""),
        savedSnapshot: String(appState.writingWorkspace.savedSnapshot || ""),
        lastSavedAt: String(appState.writingWorkspace.lastSavedAt || ""),
        projectRow: Number(selected && selected.rowNumber || 0),
        savedSegmentTexts: Object.assign({}, appState.writingWorkspace.savedSegmentTexts || {}),
        outline: JSON.parse(JSON.stringify(appState.writingWorkspace.outline || {})),
        outlineSnapshot: String(appState.writingWorkspace.outlineSnapshot || ""),
        chapterNotes: JSON.parse(JSON.stringify(appState.writingWorkspace.chapterNotes || {})),
        chapterFixes: JSON.parse(JSON.stringify(appState.writingWorkspace.chapterFixes || {}))
      };
    }

    function backupWorkspaceToLocalStorage() {
      var project = getSelectedProject();
      if (!project) return;
      var projectId = Number(project.project_id || 0);
      if (!projectId) return;
      if (typeof flushCurrentWorkspaceEdits === "function") flushCurrentWorkspaceEdits();
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      try {
        localStorage.setItem("workspace_backup_" + projectId, JSON.stringify({
          segments: segments,
          outline: appState.writingWorkspace.outline || {},
          scope: appState.writingWorkspace.scope || "",
          draftText: appState.writingWorkspace.draftText || "",
          savedSnapshot: appState.writingWorkspace.savedSnapshot || "",
          timestamp: Date.now()
        }));
      } catch (e) {}
    }

    function loadWorkspaceBackupFromLocalStorage(projectId) {
      try {
        var raw = localStorage.getItem("workspace_backup_" + projectId);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return null;
    }

    function clearWorkspaceBackup(projectId) {
      try { localStorage.removeItem("workspace_backup_" + projectId); } catch (e) {}
    }

    function refreshWritingWorkspaceSaveState() {
      var project = getSelectedProject();
      if (!project) {
        updateWritingWorkspaceSaveState("idle", "No draft loaded");
        return;
      }
      if (appState.writingWorkspace.isSaving) {
        updateWritingWorkspaceSaveState("saving", "Saving...");
        return;
      }
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var currentSnapshot = JSON.stringify(segments);
      var isDirty = currentSnapshot !== String(appState.writingWorkspace.savedSnapshot || "");
      if (isDirty) {
        updateWritingWorkspaceSaveState("dirty", "Unsaved changes");
        return;
      }
      if (appState.writingWorkspace.lastSavedAt) {
        updateWritingWorkspaceSaveState("saved", "Saved " + appState.writingWorkspace.lastSavedAt);
        return;
      }
      updateWritingWorkspaceSaveState("idle", "Ready");
    }

    function setWritingWorkspaceEditorText(text) {
      if (!el.writingWorkspaceEditor) return;
      el.writingWorkspaceEditor.innerHTML = escapeHtmlForEditor(text);
    }

    function createWritingWorkspaceNewChapter() {
      var project = getSelectedProject();
      if (!project) {
        setStatus("Select a project before adding a chapter.", "warn");
        return;
      }
      flushCurrentWorkspaceEdits();
      var sectionPayloads = getWritingWorkspaceSectionPayloadsCurrent(project);
      var nextIndex = sectionPayloads.length + 1;
      var nextTitle = "Chapter " + nextIndex;
      var newId = typeof generateOutlineNodeId === "function" ? generateOutlineNodeId() : "chapter-" + nextIndex;
      sectionPayloads.push({
        id: newId,
        sectionKey: newId,
        title: nextTitle,
        text: "<div><br></div>",
        sortOrder: nextIndex
      });
      sectionPayloads = renumberWritingWorkspaceSections(sectionPayloads);
      appState.writingWorkspace.draftText = buildWritingWorkspaceTextFromSections(sectionPayloads);

    function saveWritingWorkspaceDraft(options) {

      var scope = String(appState.writingWorkspace.scope || "");
      var segments = Array.isArray(appState.writingWorkspace.segments) ? appState.writingWorkspace.segments : [];
      var target = segments.find(function (item) { return item.key === scope; }) || null;
      if (target) {
        target.text = String(getWritingWorkspaceEditorHtml() || "").trim();

      var snapshot = JSON.stringify(segments);

        refreshWritingWorkspaceSaveState();
        return Promise.resolve(null);

      appState.writingWorkspace.isSaving = true;
      setWritingWorkspaceMeta(project, settings.autosave ? "Autosaving..." : "Saving...");
      refreshWritingWorkspaceSaveState();
      backupWorkspaceToLocalStorage();
      var savedSnapshotCapture = snapshot;
      var savedSegmentsCapture = JSON.parse(snapshot);
      var draftPromise = callAppsScriptJson("saveSupabaseProjectSectionDocumentJsonFromClient", [
        project.project_id,
        "draft",
        String(project.title || "Project").trim() + " - Draft",
        savedSnapshotCapture
