      appState.nextStepOptions.forEach(function (value) {
        const safe = String(value || "").trim();
        if (!safe || merged[safe]) return;
        merged[safe] = true;
        out.push(safe);
      });

      getUniqueValues("next_step").forEach(function (value) {
        const safe = String(value || "").trim();
        if (!safe || merged[safe]) return;
        merged[safe] = true;
        out.push(safe);
      });

      out.sort(function (a, b) {
        return a.localeCompare(b);
      });

      return out;

    function normalizeImageUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";

      const fileMatch = value.match(/drive\.google\.com\/file\/d\/([^/]+)/);
      if (fileMatch) {
        return "https://drive.google.com/thumbnail?id=" + fileMatch[1] + "&sz=w1000";
      }

      const openMatch = value.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (openMatch) {
        return "https://drive.google.com/thumbnail?id=" + openMatch[1] + "&sz=w1000";
      }

      if (/^https?:\/\//i.test(value)) {
        try {
          const parsed = new URL(value);
          return parsed.origin + parsed.pathname;
        } catch (err) {
          return value;
        }
      }

      return value;
    }

    function getImageIdentityKeys(url, legacyUrl) {
      const keys = {};
      [url, legacyUrl].forEach(function (candidate) {
        const normalized = normalizeImageUrl(candidate || "") || String(candidate || "").trim();
        if (normalized) keys[normalized] = true;
      });
      return Object.keys(keys);
    }

      if (projectOrImage && typeof projectOrImage === "object") {
        const project = projectOrImage;
        return normalizeImageUrl(project.image || project.series_image || "") || DEFAULT_IMAGE_URL;

    function buildSeriesSummaryDigest(seriesName, currentProject) {
      const safeSeries = String(seriesName || "").trim();

        if (!projectSummary) return "";
        return projectTitle ? projectTitle + ": " + projectSummary : projectSummary;
      }).filter(Boolean);

      if (!summaryLines.length) {
        return currentProject && currentProject.short_summary ? String(currentProject.short_summary).trim() : "";
      }

      return summaryLines.join(" | ");

    function slugifyImageGeneratorPart(value, fallback) {
      const raw = String(value || "").trim().toLowerCase();
      const slug = raw
        .replace(/['".,!?()[\]{}]/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return slug || String(fallback || "untitled");

    function getNextImageGeneratorVersion(baseName) {
      const files = Array.isArray(appState.imagePicker.files) ? appState.imagePicker.files : [];
      const prefix = String(baseName || "").toLowerCase() + "-v";
      let maxVersion = 0;
      files.forEach(function (file) {
        const name = String(file && file.name || "").trim().toLowerCase();
        const match = name.match(new RegExp("^" + prefix.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "(\\d{3,})\\.(png|jpg|jpeg|webp)$"));
        if (!match) return;
        const version = Number(match[1] || 0);
        if (version > maxVersion) maxVersion = version;
      });
      return String(maxVersion + 1).padStart(3, "0");
    }

    function getNextImageGeneratorFileName(extension) {
      const baseName = isSeriesImageGenerationMode()
        ? slugifyImageGeneratorPart(el.detailSeries && el.detailSeries.value || (getSelectedProjectForImageGenerator() || {}).series || "", "series-image")
        : getImageGeneratorBaseName();
      const version = getNextImageGeneratorVersion(baseName);
      const suffix = String(extension || "png").replace(/^\./, "").toLowerCase() || "png";
      return baseName + "-v" + version + "." + suffix;
    }

    function stripFileExtension(fileName) {
      const safeName = String(fileName || "").trim();
      return safeName.replace(/\.[a-z0-9]+$/i, "") || safeName || "image";
    }

    function loadImageElementFromBlob(blob) {
      return new Promise(function (resolve, reject) {
        const objectUrl = URL.createObjectURL(blob);
        const image = new Image();
        image.onload = function () {
          URL.revokeObjectURL(objectUrl);
          resolve(image);
        };
        image.onerror = function (error) {
          URL.revokeObjectURL(objectUrl);
          reject(error || new Error("Image could not be decoded."));
        };
        image.src = objectUrl;
      });
    }

    function canvasToDataUrl(canvas, mimeType, quality) {
      try {
        return canvas.toDataURL(mimeType, quality);
      } catch (error) {
        return canvas.toDataURL("image/jpeg", Math.min(0.88, quality || 0.88));
      }
    }

    async function buildOptimizedImageUploadBundle(blob, preferredBaseName) {
      const image = await loadImageElementFromBlob(blob);
      const safeBaseName = stripFileExtension(preferredBaseName || "project-image");
      const originalMax = 1600;
      const thumbMax = 420;

      function drawVariant(maxEdge) {
        const sourceWidth = image.naturalWidth || image.width || 1;
        const sourceHeight = image.naturalHeight || image.height || 1;
        const scale = Math.min(1, maxEdge / Math.max(sourceWidth, sourceHeight));
        const width = Math.max(1, Math.round(sourceWidth * scale));
        const height = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d", { alpha: false });
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);
        return canvas;
      }

      const originalCanvas = drawVariant(originalMax);
      const thumbCanvas = drawVariant(thumbMax);

      return {
        originalName: safeBaseName + ".webp",
        originalMimeType: "image/webp",
        originalDataUrl: canvasToDataUrl(originalCanvas, "image/webp", 0.9),
        previewName: safeBaseName + "--thumb.webp",
        previewMimeType: "image/webp",
        previewDataUrl: canvasToDataUrl(thumbCanvas, "image/webp", 0.76)
      };
    }

    function getComfyBaseUrl() {
      const raw = String(el.imageGeneratorEndpoint && el.imageGeneratorEndpoint.value || "").trim().replace(/\/+$/, "");
      if (/^https?:\/\//i.test(raw)) return raw;
      return "http://127.0.0.1:8188";
    }

    async function comfyApiFetch(path, options) {
      const comfyEndpoint = String(el.imageGeneratorEndpoint && el.imageGeneratorEndpoint.value || "").trim().replace(/\/+$/, "");
      const isLocalhost = location.hostname === "localhost" || location.hostname === "127.0.0.1";
      const useBrowserDirect = !!(el.imageGeneratorUseBrowser && el.imageGeneratorUseBrowser.checked);

      if (useBrowserDirect) {
        const base = getComfyBaseUrl();
        const response = await fetch(base + path, options || {});
        if (!response.ok) {
          const text = await response.text();
          throw new Error("ComfyUI request failed (" + response.status + "): " + text);
        }
        return response;
      }

      const headers = Object.assign({}, (options && options.headers) || {});
      if (comfyEndpoint && !isLocalhost) {
        headers["x-comfy-endpoint"] = comfyEndpoint;
      } else if (!comfyEndpoint && !isLocalhost) {
        throw new Error("Set your ComfyUI endpoint in AI Settings (e.g. https://your-id.ngrok.io), or enable browser/direct mode.");
      }
      const proxyBase = isLocalhost ? "/api/comfy" : "/api/comfy?path=" + encodeURIComponent(path.replace(/^\//, ""));
      const url = isLocalhost ? ("/api/comfy" + path) : proxyBase;
      const response = await fetch(url, Object.assign({}, options || {}, { headers }));
      if (!response.ok) {
        const text = await response.text();
        throw new Error("ComfyUI request failed (" + response.status + "): " + text);
      }
      return response;
    }

    async function checkImageGeneratorComfyConnection() {
      try {
        await comfyApiFetch("/system_stats");
        setImageGeneratorStatus("ComfyUI is online and ready.", "ok");
        return true;
      } catch (error) {
        setImageGeneratorStatus("ComfyUI is not responding. Start your local ComfyUI app, then try again.", "warn");
        return false;
      }
    }

    function openComfyUiFromGenerator() {
      const useBrowserDirect = !!(el.imageGeneratorUseBrowser && el.imageGeneratorUseBrowser.checked);
      const endpoint = useBrowserDirect
        ? getComfyBaseUrl()
        : String(el.imageGeneratorEndpoint && el.imageGeneratorEndpoint.value || "http://127.0.0.1:8188").trim().replace(/\/+$/, "");
      if (!endpoint) {
        setImageGeneratorStatus("Add a ComfyUI endpoint first.", "warn");
        return;
      }
      window.open(endpoint, "_blank", "noopener,noreferrer");
    }

    function getComfyViewUrl(imageMeta) {
      const filename = String(imageMeta && imageMeta.filename || "").trim();
      if (!filename) return "";
      const useBrowserDirect = !!(el.imageGeneratorUseBrowser && el.imageGeneratorUseBrowser.checked);
      const endpoint = useBrowserDirect
        ? getComfyBaseUrl()
        : String(el.imageGeneratorEndpoint && el.imageGeneratorEndpoint.value || "/api/comfy").trim().replace(/\/+$/, "");
      const params = new URLSearchParams({
        filename: String(imageMeta.filename || ""),
        subfolder: String(imageMeta.subfolder || ""),
        type: String(imageMeta.type || "output")
      });
      return endpoint + "/view?" + params.toString();
    }

    async function waitForComfyResult(promptId) {
      const startedAt = Date.now();
      while (Date.now() - startedAt < 240000) {
        await new Promise(function (resolve) { setTimeout(resolve, 1800); });
        const response = await comfyApiFetch("/history/" + encodeURIComponent(promptId));
        const history = await response.json();
        const item = history && history[promptId];
        if (!item || !item.outputs) continue;
        const outputKeys = Object.keys(item.outputs);
        for (var i = 0; i < outputKeys.length; i += 1) {
          const nodeOutput = item.outputs[outputKeys[i]];
          if (nodeOutput && Array.isArray(nodeOutput.images) && nodeOutput.images.length) {
            return nodeOutput.images[0];
          }
        }
      }
      throw new Error("Timed out waiting for ComfyUI to finish.");
    }

    async function runImageGenerator() {
      if (appState.imageGenerator.isGenerating) return;
      const promptText = updateImageGeneratorPromptPreview();
      const generationCount = Math.max(1, Math.min(4, Number(el.imageGeneratorAmount && el.imageGeneratorAmount.value || 1) || 1));
      if (!promptText) {
        setImageGeneratorStatus("Prompt preview is empty.", "error");
        return;
      }
      rememberImageGeneratorScopeSettings(getSelectedProjectForImageGenerator());
      setImageGeneratorBusy(true, "Generating image...");
      if (el.imageGeneratorRunButton) el.imageGeneratorRunButton.disabled = true;
      if (el.imageGeneratorUseButton) el.imageGeneratorUseButton.disabled = true;
      setImageGeneratorStatus("Sending " + generationCount + " render" + (generationCount === 1 ? "" : "s") + " to ComfyUI...", "warn");
      try {
        let latestHistoryEntry = null;
        for (var generationIndex = 0; generationIndex < generationCount; generationIndex += 1) {
          setImageGeneratorStatus("Generating render " + (generationIndex + 1) + " of " + generationCount + "...", "warn");
          const response = await comfyApiFetch("/prompt", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: buildComfyWorkflowPrompt(promptText),
              client_id: "book-cover-generator"
            })
          });
          const result = await response.json();
          const promptId = String(result && result.prompt_id || "").trim();
          if (!promptId) throw new Error("ComfyUI did not return a prompt id.");
          appState.imageGenerator.promptId = promptId;
          const imageMeta = await waitForComfyResult(promptId);
          const imageUrl = getComfyViewUrl(imageMeta);
          latestHistoryEntry = rememberImageGeneratorHistoryEntry(imageUrl, imageMeta, promptText);
          setImageGeneratorPreviewFromEntry(latestHistoryEntry);
        }
        setImageGeneratorBusy(false);
        setImageGeneratorPreviewFromEntry(latestHistoryEntry);
        setImageGeneratorStatus(generationCount === 1
          ? "Generation complete. Review the preview and use it if you like it."
          : generationCount + " renders complete. Review the stack and pick your favorite.", "ok");
      } catch (err) {
        console.error("IMAGE GENERATOR ERROR", err);
        setImageGeneratorBusy(false);
        setImageGeneratorStatus("Generation failed: " + err.message, "error");
      } finally {
        if (el.imageGeneratorRunButton) el.imageGeneratorRunButton.disabled = false;
      }
    }

    function blobToDataUrl(blob) {
      return new Promise(function (resolve, reject) {
        const reader = new FileReader();
        reader.onloadend = function () { resolve(String(reader.result || "")); };
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function useGeneratedImageFromComfy() {
      if (!appState.imageGenerator.lastImageUrl) {
        setImageGeneratorStatus("Generate an image first.", "error");
        return;
      }
      if (el.imageGeneratorUseButton) el.imageGeneratorUseButton.disabled = true;
      setImageGeneratorStatus("Fetching generated image from ComfyUI...", "warn");
      try {
        const response = await fetch(appState.imageGenerator.lastImageUrl);
        if (!response.ok) throw new Error("Could not fetch the generated image.");
        const blob = await response.blob();
        const bundle = await buildOptimizedImageUploadBundle(blob, getNextImageGeneratorFileName("webp"));
        setImageGeneratorStatus("Uploading generated image to Drive...", "warn");
        supabaseRunner
          .withSuccessHandler(function (json) {
            try {
              const result = parseServerResult(json);
              if (result.ok === false) throw new Error(result.error || "Upload failed.");
              const fileRecord = {
                id: result.fileId,
                name: result.name,
                url: result.url,
                thumbnailUrl: result.thumbnailUrl,

              };
              appState.imagePicker.files.unshift(fileRecord);

              rememberImageGeneratorSettingsForImage(result.url);
              renderImagePickerGrid();
              applySelectedImageUrl(result.url);
              closeImageGeneratorModal();
              setStatus("Generated cover uploaded and applied.", "ok");
            } catch (err) {
              console.error("GENERATED IMAGE UPLOAD PARSE ERROR", err, json);
              setImageGeneratorStatus("Upload failed: " + err.message, "error");
              if (el.imageGeneratorUseButton) el.imageGeneratorUseButton.disabled = false;
            }
          })
          .withFailureHandler(function (error) {
            const message = error && error.message ? error.message : String(error || "Unknown error");
            setImageGeneratorStatus("Upload failed: " + message, "error");
            if (el.imageGeneratorUseButton) el.imageGeneratorUseButton.disabled = false;
          })
          .uploadProjectImageJsonFromClient(
            PROJECT_IMAGE_FOLDER_ID,
            bundle.originalName,
            bundle.originalMimeType,
            bundle.originalDataUrl,
            bundle.previewName,
            bundle.previewMimeType,
            bundle.previewDataUrl,
            ""
          );
      } catch (err) {
        console.error("GENERATED IMAGE FETCH ERROR", err);
        setImageGeneratorStatus("Could not use generated image: " + err.message, "error");
        if (el.imageGeneratorUseButton) el.imageGeneratorUseButton.disabled = false;
      }
    }

    function getGoogleDocMarkdownFieldByKey(key) {
      const safeKey = String(key || "").trim();
      if (!safeKey) return null;
      const direct = GOOGLE_DOC_MARKDOWN_FIELDS.find(function (field) {
        return field.key === safeKey || field.urlKey === safeKey;
      });
      if (direct) return direct;
      if (safeKey === "summary") {
        return GOOGLE_DOC_MARKDOWN_FIELDS.find(function (field) {
          return field.key === "short_summary";
        }) || null;
      }
      const docUrlKey = /_doc_url$/i.test(safeKey) ? safeKey : safeKey + "_doc_url";
      return GOOGLE_DOC_MARKDOWN_FIELDS.find(function (field) {
        return field.key === docUrlKey || field.urlKey === docUrlKey;
      }) || null;
    }

    function isProjectSummaryMarkdownField(field) {
      return !!field && field.projectKey === "short_summary";
    }

    function getSupabaseProjectMarkdownConfig(field) {
      if (!field) return null;
      const key = String(field.urlKey || field.key || "").trim();
      return Object.prototype.hasOwnProperty.call(SUPABASE_PROJECT_MARKDOWN_DOCS, key)
        ? SUPABASE_PROJECT_MARKDOWN_DOCS[key]
        : null;
    }

    function isSupabaseProjectMarkdownField(field) {
      return !!getSupabaseProjectMarkdownConfig(field);
    }

    function isSupabaseManagedDocUrlKey(urlKey) {
      return !!getSupabaseProjectMarkdownConfig({ urlKey: urlKey });
    }

    function isSupabaseManagedLinkField(field) {
      return !!(field && isSupabaseManagedDocUrlKey(field.key));
    }

    function isSectionedProjectMarkdownField(field) {
      if (!field || !isSupabaseProjectMarkdownField(field)) return false;
      const key = String(field.urlKey || field.key || "").trim();
      return !!SECTIONED_PROJECT_MARKDOWN_DOCS[key];
    }

    function isSectionedStructureSourceField(field) {
      return !!field && String(field.urlKey || field.key || "").trim() === "draft_doc_url";
    }

    function usesSectionedReferencePanel(field) {
      return isSectionedProjectMarkdownField(field);
    }

    function getSupabaseDocEntityInfo(project, field) {
      const selected = project || getProjectByRow(appState.selectedRowNumber);
      const config = getSupabaseProjectMarkdownConfig(field);
      if (!selected || !config) return null;

      if (String(config.scope || "project") === "series") {
        const seriesId = Number(selected.series_id || 0);
        const seriesName = String(selected.series || "Series").trim() || "Series";
        if (!seriesId) return null;
        return {
          scope: "series",
          entityId: seriesId,
          entityLabel: seriesName
        };
      }

      const projectId = Number(selected.rowNumber || 0);
      const projectTitle = String(selected.title || "Project").trim() || "Project";
      if (!projectId) return null;
      return {
        scope: "project",
        entityId: projectId,
        entityLabel: projectTitle
      };
    }

    function getSupabaseProjectDocCacheKey(entityId, docType, scope) {
      const safeEntityId = Number(entityId || 0);
      const safeDocType = String(docType || "").trim();
      const safeScope = String(scope || "project").trim() || "project";
      if (!safeEntityId || !safeDocType) return "";
      return "supabase-" + safeScope + "-doc:" + safeEntityId + ":" + safeDocType;
    }

    function isSectionedDraftField(field) {
      return isSectionedProjectMarkdownField(field);
    }

    function isSectionedDraftEditor() {
      return isSectionedProjectMarkdownField(appState.markdownEditor.field);
    }

    function getActiveDraftSection() {
      if (!isSectionedDraftEditor()) return null;
      const activeId = String(appState.markdownEditor.activeDraftSectionId || "").trim();
      return (appState.markdownEditor.draftSections || []).find(function (section) {
        return String(section && section.id || "") === activeId;
      }) || null;
    }

    function isDraftSectionLoaded(section) {
      return !!section && typeof section.text === "string";
    }

    function getDraftSectionTotalWordCount() {
      return (appState.markdownEditor.draftSections || []).reduce(function (sum, section) {
        return sum + (Number(section && section.wordCount || 0) || 0);
      }, 0);
    }

    function getDraftSectionTitleFromText(text, fallbackTitle) {
      const safeText = String(text || "");
      const match = safeText.match(/^\s*#\s+(.+?)\s*#*\s*(?:\n|$)/);
      return String(match && match[1] || fallbackTitle || "Untitled Section").trim() || "Untitled Section";
    }

    function parseDraftChapterTitleParts(rawTitle, fallbackNumber) {
      const safeTitle = String(rawTitle || "").trim();
      const chapterMatch = safeTitle.match(/^chapter\s+(\d+)(?:\s*[-:]\s*(.+))?$/i);
      if (chapterMatch) {
        return {
          chapterNumber: Number(chapterMatch[1] || fallbackNumber || 1) || Number(fallbackNumber || 1) || 1,
          customTitle: String(chapterMatch[2] || "").trim()
        };
      }
      return {
        chapterNumber: Number(fallbackNumber || 1) || 1,
        customTitle: /^(untitled section|section\s+\d+)$/i.test(safeTitle) ? "" : safeTitle
      };
    }

    function buildDraftChapterLabel(chapterNumber, customTitle) {
      const safeNumber = Number(chapterNumber || 1) || 1;
      const suffix = String(customTitle || "").trim();
      return suffix ? ("Chapter " + safeNumber + " - " + suffix) : ("Chapter " + safeNumber);
    }

    function splitMarkdownIntoSectionedDocSections(markdownText, fallbackTitle) {
      const source = String(markdownText == null ? "" : markdownText).replace(/\r\n/g, "\n").trim();
      const safeFallbackTitle = String(fallbackTitle || "Untitled Section").trim() || "Untitled Section";
      if (!source) {
        return [{
          id: "section-1",
          title: safeFallbackTitle,
          text: "",
          sortOrder: 1
        }];
      }

      const lines = source.split("\n");
      const sections = [];
      let currentLines = [];
      let currentTitle = "";

      function pushSection() {
        const text = currentLines.join("\n").trim();
        const title = String(currentTitle || getDraftSectionTitleFromText(text, safeFallbackTitle) || safeFallbackTitle).trim() || safeFallbackTitle;
        sections.push({
          id: "section-" + (sections.length + 1),
          title: title,
          text: text,
          sortOrder: sections.length + 1
        });
        currentLines = [];
        currentTitle = "";
      }

      lines.forEach(function (line) {
        const headingMatch = String(line || "").match(/^#\s+(.+?)\s*#*\s*$/);
        if (headingMatch && currentLines.length) {
          pushSection();
        }
        if (headingMatch && !currentTitle) {
          currentTitle = String(headingMatch[1] || "").trim();
        }
        currentLines.push(line);
      });

      if (currentLines.length) {
        pushSection();
      }

      return sections.length ? sections : [{
        id: "section-1",
        title: safeFallbackTitle,
        text: source,
        sortOrder: 1
      }];
    }

    function getDraftStructureTemplate(project) {
      const selected = project || getProjectByRow(appState.selectedRowNumber);
      const draftField = getGoogleDocMarkdownFieldByKey("draft_doc_url");
      const draftConfig = getSupabaseProjectMarkdownConfig(draftField);
      const draftEntity = getSupabaseDocEntityInfo(selected, draftField);
      if (!draftField || !draftConfig || !draftEntity) return [];
      const draftCacheKey = getSupabaseProjectDocCacheKey(draftEntity.entityId, draftConfig.docType, draftEntity.scope);
      const draftCached = getCachedDoc(draftCacheKey);
      const sections = Array.isArray(draftCached && draftCached.sections) ? draftCached.sections : [];
      return sections.map(function (section, index) {
        return {
          id: String(section && section.id || "").trim(),
          sectionKey: String(section && (section.sectionKey || section.section_key) || "").trim(),
          title: String(section && section.title || ("Chapter " + (index + 1))).trim() || ("Chapter " + (index + 1)),
          sortOrder: Number(section && (section.sortOrder || section.sort_order) || (index + 1)) || (index + 1)
        };
      }).filter(function (section) {
        return !!section.title;
      });
    }

    function alignSectionsToDraftStructure(sections, project, field) {
      const safeSections = Array.isArray(sections) ? sections : [];
      if (!safeSections.length || isSectionedStructureSourceField(field)) return safeSections;
      const template = getDraftStructureTemplate(project);
      if (!template.length) return safeSections;

      const byKey = {};
      safeSections.forEach(function (section) {
        const key = String(section && (section.sectionKey || section.section_key) || "").trim();
        if (key) byKey[key] = section;
      });

      return template.map(function (draftSection, index) {
        const source = byKey[draftSection.sectionKey] || safeSections[index] || {};
        const hasLoadedText = typeof source.text === "string" || typeof source.markdown_content === "string";
        const placeholderText = replaceDraftSectionHeading("", draftSection.title);
        const nextText = hasLoadedText
          ? String(source.text != null ? source.text : source.markdown_content || "")
          : placeholderText;
        return Object.assign({}, source, {
          id: String(source && source.id || draftSection.id || ("section-" + (index + 1))).trim() || ("section-" + (index + 1)),
          sectionKey: draftSection.sectionKey,
          title: draftSection.title,
          sortOrder: draftSection.sortOrder,
          text: nextText,
          savedText: typeof source.savedText === "string" ? source.savedText : nextText,
          loaded: true,
          wordCount: Number(source && source.wordCount != null ? source.wordCount : countMarkdownWords(nextText)) || 0,
          dirty: false
        });
      });
    }

    function replaceDraftSectionHeading(text, headingLabel) {
      var safeText = String(text || "").replace(/\r\n/g, "\n").trim();
      if (!safeText) return "<h1>" + escapeHtml(String(headingLabel || "Chapter 1").trim()) + "</h1><div><br></div>";
      return safeText;
    }

    function normalizeDraftSectionsForChapterModel(preferredSectionId, options) {
      if (!isSectionedDraftEditor()) return null;
      const opts = options || {};
      const preferredId = String(preferredSectionId || appState.markdownEditor.activeDraftSectionId || "").trim();
      const sections = (appState.markdownEditor.draftSections || []).slice().sort(function (a, b) {
        return Number(a && a.sortOrder || 0) - Number(b && b.sortOrder || 0);
      });

      appState.markdownEditor.draftSections = sections.map(function (section, index) {
        const chapterNumber = index + 1;
        const isLoaded = isDraftSectionLoaded(section);
        const baseTitle = isSectionedStructureSourceField(appState.markdownEditor.field)
          ? getDraftSectionTitleFromText(section && section.text || "", section && section.title || "")
          : String(section && section.title || "").trim();
        const parts = parseDraftChapterTitleParts(baseTitle, chapterNumber);
        const chapterLabel = buildDraftChapterLabel(chapterNumber, parts.customTitle);
        const nextText = isLoaded ? replaceDraftSectionHeading(section && section.text || "", chapterLabel) : null;
        const savedText = isLoaded
          ? (opts.syncSavedText ? nextText : String(section && section.savedText || ""))
          : null;
        return Object.assign({}, section, {
          sectionKey: String(section && section.sectionKey || "chapter-" + chapterNumber).trim() || ("chapter-" + chapterNumber),
          title: chapterLabel,
          text: nextText,
          savedText: savedText,
          loaded: isLoaded,
          sortOrder: chapterNumber,
          wordCount: isLoaded ? countMarkdownWords(nextText) : Number(section && section.wordCount || 0) || 0,
          dirty: isLoaded ? (opts.syncSavedText ? false : nextText !== savedText) : false
        });
      });

      const preferredSection = appState.markdownEditor.draftSections.find(function (section) {
        return String(section && section.id || "") === preferredId;
      }) || appState.markdownEditor.draftSections[0] || null;
      appState.markdownEditor.activeDraftSectionId = preferredSection ? String(preferredSection.id || "") : "";
      return preferredSection;
    }

    function syncReferenceSectionsToDraft() {
      if (!isSectionedDraftEditor()) return;
      var draftSections = appState.markdownEditor.draftSections || [];
      if (!draftSections.length) return;
      var activeSection = getActiveDraftSection();
      Object.keys(appState.markdownEditor.referenceDocs).forEach(function (key) {
        var ref = appState.markdownEditor.referenceDocs[key];
        if (!ref || !ref.field || !usesSectionedReferencePanel(ref.field)) return;
        var oldSections = Array.isArray(ref.sections) ? ref.sections : [];
        var oldByKey = {};
        oldSections.forEach(function (s) {
          var k = String(s && (s.sectionKey || s.section_key) || "").trim();
          if (k) oldByKey[k] = s;
        });
        ref.sections = draftSections.map(function (ds) {
          var old = oldByKey[ds.sectionKey] || {};
          var oldText = old.text || old.markdown_content || "";
          var updatedText = oldText;
          if (old.title && ds.title !== old.title) {
            updatedText = replaceDraftSectionHeading(updatedText, ds.title);
          }
          return {
            id: old.id || ds.id,
            sectionKey: ds.sectionKey,
            title: ds.title,
            sortOrder: ds.sortOrder,
            text: updatedText,
            savedText: old.savedText || "",
            loaded: true,
            wordCount: old.wordCount || 0,
            dirty: false
          };
        });
        ref.text = ref.sections.map(function (s) { return s.text; }).filter(Boolean).join("\n\n");
        ref.headings = getMarkdownHeadings(ref.text);
        if (key === appState.markdownEditor.referenceKey && activeSection) {
          setRightPanelPreviewOnly(false);
          if (!renderSectionedReferencePreview(ref, activeSection.title || "")) {
            scrollReferenceToHeading(activeSection.title || "");
          } else {
            renderReferenceHeadingList();
          }
        }
      });
    }

    function createNewDraftChapter() {
      if (!isSectionedDraftEditor()) return;
      if (!isSectionedStructureSourceField(appState.markdownEditor.field)) {
        setStatus("Draft is the source of truth for chapter structure. Add chapters there, and Outline/Notes will follow.", "warn");
        return;
      }
      cacheActiveDraftSectionText();
      const nextIndex = (appState.markdownEditor.draftSections || []).length + 1;
      const nextId = "draft-section-" + Date.now();
      appState.markdownEditor.draftSections.push({
        id: nextId,
        sectionKey: "chapter-" + nextIndex,
        title: "Chapter " + nextIndex,
        text: "# Chapter " + nextIndex + "\n\n",
        savedText: "",
        wordCount: countMarkdownWords("# Chapter " + nextIndex),
        sortOrder: nextIndex,
        dirty: true
      });
      appState.markdownEditor.draftStructureDirty = true;
      normalizeDraftSectionsForChapterModel(nextId);
      syncReferenceSectionsToDraft();
      setActiveDraftSection(nextId, { skipCache: true });
      cacheActiveEditorText();
      setStatus("New chapter added.", "ok");
    }

    function renameDraftChapterFromSelector(sectionId) {
      if (!isSectionedDraftEditor()) return;
      if (!isSectionedStructureSourceField(appState.markdownEditor.field)) {
        setStatus("Rename chapters in Draft. Outline and Notes inherit that structure.", "warn");
        return;
      }
      cacheActiveDraftSectionText();
      const target = (appState.markdownEditor.draftSections || []).find(function (section) {
        return String(section && section.id || "") === String(sectionId || "");
      }) || null;
      if (!target) return;

      const currentParts = parseDraftChapterTitleParts(target.title, target.sortOrder || 1);
      const nextCustomTitle = window.prompt("Chapter title", currentParts.customTitle || "");
      if (nextCustomTitle === null) return;

      target.title = buildDraftChapterLabel(target.sortOrder || 1, nextCustomTitle);
      appState.markdownEditor.draftStructureDirty = true;
      if (isDraftSectionLoaded(target)) {
        target.text = replaceDraftSectionHeading(target.text, target.title);
        target.wordCount = countMarkdownWords(target.text);
        target.dirty = target.text !== String(target.savedText || "");
      } else {
        target.wordCount = Number(target.wordCount || 0) || 0;
        target.dirty = false;
      }
      normalizeDraftSectionsForChapterModel(target.id);
      syncReferenceSectionsToDraft();
      setActiveDraftSection(target.id, { skipCache: true });
      cacheActiveEditorText();
      setStatus("Chapter title updated.", "ok");
    }

    function deleteDraftChapter(sectionId) {
      if (!isSectionedDraftEditor()) return;
      if (!isSectionedStructureSourceField(appState.markdownEditor.field)) {
        setStatus("Delete chapters in Draft. Outline and Notes inherit that structure.", "warn");
        return;
      }
      cacheActiveDraftSectionText();
      const sections = appState.markdownEditor.draftSections || [];
      if (sections.length <= 1) {
        setStatus("Keep at least one chapter in Draft.", "warn");
        return;
      }
      const targetIndex = sections.findIndex(function (section) {
        return String(section && section.id || "") === String(sectionId || "");
      });
      if (targetIndex === -1) return;
      const target = sections[targetIndex];
      const confirmed = window.confirm("Delete " + String(target && target.title || "this chapter") + "?");
      if (!confirmed) return;

      sections.splice(targetIndex, 1);
      appState.markdownEditor.draftStructureDirty = true;
      const fallbackSection = sections[Math.max(0, targetIndex - 1)] || sections[0] || null;
      normalizeDraftSectionsForChapterModel(fallbackSection && fallbackSection.id);
      syncReferenceSectionsToDraft();
      if (fallbackSection) {
        setActiveDraftSection(fallbackSection.id, { skipCache: true });
      } else {
        el.markdownEditorTextarea.value = "";
        appState.markdownEditor.activeDraftSectionId = "";
      }
      cacheActiveEditorText();
      setStatus("Chapter deleted.", "ok");
    }

    function cacheActiveDraftSectionText() {
      if (!isSectionedDraftEditor() || !el.markdownEditorTextarea) return null;
      const activeSection = getActiveDraftSection();
      if (!activeSection) return null;
      if (!isDraftSectionLoaded(activeSection)) return activeSection;
      const nextText = String(el.markdownEditorTextarea.value || "");
      activeSection.text = nextText;
      if (isSectionedStructureSourceField(appState.markdownEditor.field)) {
        activeSection.title = getDraftSectionTitleFromText(nextText, activeSection.title);
      }
      activeSection.wordCount = countMarkdownWords(nextText);
      activeSection.dirty = nextText !== String(activeSection.savedText || "");
      return activeSection;
    }

    function getCombinedDraftSectionsText() {
      return (appState.markdownEditor.draftSections || [])
        .map(function (section) {
          return isDraftSectionLoaded(section) ? String(section && section.text || "").trim() : "";
        })
        .filter(function (text) { return text !== ""; })
        .join("\n\n");
    }

    function setActiveDraftSection(sectionId, options) {
      if (!isSectionedDraftEditor()) return;
      const opts = options || {};
      if (!opts.skipCache) {
        cacheActiveDraftSectionText();
      }
      const nextSection = (appState.markdownEditor.draftSections || []).find(function (section) {
        return String(section && section.id || "") === String(sectionId || "");
      }) || null;
      if (!nextSection) return;
      appState.markdownEditor.activeDraftSectionId = String(nextSection.id || "");
      el.markdownEditorTextarea.value = String(nextSection.text || "");
      appState.markdownEditor.savedSnapshot = String(nextSection.savedText != null ? nextSection.savedText : nextSection.text || "");
      appState.markdownEditor.lastSnapshot = el.markdownEditorTextarea.value;
      if (el.markdownEditorColumn) {
        el.markdownEditorColumn.textContent = (appState.markdownEditor.docLabel || "Draft") + " / " + String(nextSection.title || "Section").trim();
      }
      resetMarkdownUndoHistory();
      updateMarkdownPreview();
      if (usesSectionedReferencePanel(appState.markdownEditor.field)) {
        setRightPanelPreviewOnly(false);
        const activeReference = getActiveReferenceDoc();
        if (!renderSectionedReferencePreview(activeReference, String(nextSection.title || ""))) {
          scrollReferenceToHeading(String(nextSection.title || ""));
        } else {
          renderReferenceHeadingList();
        }
      }
    }

    function primeDraftSectionsFromCache(cached, fallbackTitle) {
      const safeSections = Array.isArray(cached && cached.sections) ? cached.sections : [];
      appState.markdownEditor.draftSections = safeSections.map(function (section, index) {
        const text = String(section && (section.text || section.markdown_content) || "").trim();
        const hasLoadedText = typeof (section && (section.text || section.markdown_content)) === "string";
        const title = String(section && (section.title || section.sectionTitle) || getDraftSectionTitleFromText(text, fallbackTitle || ("Section " + (index + 1)))).trim() || ("Section " + (index + 1));
        return {
          id: String(section && (section.id || section.sectionKey || section.section_key) || ("temp-" + (index + 1))),
          sectionKey: String(section && (section.sectionKey || section.section_key) || "").trim(),
          title: title,
          text: hasLoadedText ? text : null,
          savedText: hasLoadedText ? text : null,
          loaded: !!(section && section.loaded) || hasLoadedText,
          wordCount: Number(section && section.wordCount != null ? section.wordCount : countMarkdownWords(text)) || 0,
          sortOrder: Number(section && (section.sortOrder || section.sort_order) || (index + 1)) || (index + 1),
          dirty: false
        };
      });
      appState.markdownEditor.activeDraftSectionId = appState.markdownEditor.draftSections[0] ? String(appState.markdownEditor.draftSections[0].id || "") : "";
      appState.markdownEditor.draftSections = alignSectionsToDraftStructure(appState.markdownEditor.draftSections, getProjectByRow(appState.selectedRowNumber), appState.markdownEditor.field);
      appState.markdownEditor.activeDraftSectionId = appState.markdownEditor.draftSections[0] ? String(appState.markdownEditor.draftSections[0].id || "") : "";
    }

    function refreshSectionedDraftEditorAfterSave(preferredSectionTitle) {
      if (!isSectionedDraftEditor() || !el.markdownEditorTextarea) return;
      const preferredTitle = String(preferredSectionTitle || "").trim().toLowerCase();
      const matchingSection = (appState.markdownEditor.draftSections || []).find(function (section) {
        return preferredTitle && String(section && section.title || "").trim().toLowerCase() === preferredTitle;
      }) || appState.markdownEditor.draftSections[0] || null;
      if (!matchingSection) {
        el.markdownEditorTextarea.value = "";
        appState.markdownEditor.savedSnapshot = "";
        appState.markdownEditor.lastSnapshot = "";
        updateMarkdownPreview();
        return;
      }

      appState.markdownEditor.activeDraftSectionId = String(matchingSection.id || "");
      el.markdownEditorTextarea.value = String(matchingSection.text || "");
      appState.markdownEditor.savedSnapshot = String(matchingSection.savedText != null ? matchingSection.savedText : matchingSection.text || "");
      appState.markdownEditor.lastSnapshot = String(matchingSection.text || "");
      if (el.markdownEditorColumn) {
        el.markdownEditorColumn.textContent = (appState.markdownEditor.docLabel || "Draft") + " / " + String(matchingSection.title || "Section").trim();
      }
      updateMarkdownPreview();
    }

    function updateSectionedDraftChrome() {
      const isSectioned = isSectionedDraftEditor();
      const textareaWrap = el.markdownEditorTextarea ? el.markdownEditorTextarea.closest(".markdown-textarea-wrap") : null;
      if (textareaWrap) {
        textareaWrap.classList.toggle("sectioned-draft", !!isSectioned);
      }
      if (el.markdownHeadingGutter && isSectioned) {
        el.markdownHeadingGutter.innerHTML = "";
      }
    }

    function mergeDraftSectionsIntoState(sectionPayloads, options) {
      const opts = options || {};
      const incoming = Array.isArray(sectionPayloads) ? sectionPayloads : [];
      if (!incoming.length) return;
      const byId = {};
      incoming.forEach(function (section) {
        const key = String(section && (section.id || section.sectionKey || section.section_key) || "").trim();
        if (key) byId[key] = section;
      });
      appState.markdownEditor.draftSections = (appState.markdownEditor.draftSections || []).map(function (section) {
        const key = String(section && (section.id || section.sectionKey) || "").trim();
        const incomingSection = byId[key];
        if (!incomingSection) return section;
        if (!opts.overwriteLoaded && isDraftSectionLoaded(section)) {
          return section;
        }
        const text = String(incomingSection && (incomingSection.text || incomingSection.markdown_content) || "").trim();
        return Object.assign({}, section, {
          sectionKey: String(incomingSection.sectionKey || incomingSection.section_key || section.sectionKey || "").trim() || section.sectionKey,
          title: String(incomingSection.title || section.title || "").trim() || section.title,
          text: text,
          savedText: text,
          loaded: true,
          wordCount: Number(incomingSection.wordCount != null ? incomingSection.wordCount : countMarkdownWords(text)) || 0,
          sortOrder: Number(incomingSection.sortOrder || incomingSection.sort_order || section.sortOrder || 0) || section.sortOrder,
          dirty: false
        });
      });
    }

    function hasUnloadedDraftSections() {
      return (appState.markdownEditor.draftSections || []).some(function (section) {
        return !isDraftSectionLoaded(section);
      });
    }

    function hasUsableDraftSectionCache(cached) {
      const sections = Array.isArray(cached && cached.sections) ? cached.sections : [];
      if (!sections.length) return false;
      return sections.some(function (section) {
        return typeof (section && section.text) === "string" || typeof (section && section.markdown_content) === "string";
      });
    }

    function scheduleDraftSectionPrefetch(anchorSectionId) {
      if (!isSectionedDraftEditor()) return;
      const sections = (appState.markdownEditor.draftSections || []).slice().sort(function (a, b) {
        return Number(a && a.sortOrder || 0) - Number(b && b.sortOrder || 0);
      });
      if (!sections.length) return;
      const anchorId = String(anchorSectionId || appState.markdownEditor.activeDraftSectionId || "").trim();
      const anchorIndex = Math.max(0, sections.findIndex(function (section) {
        return String(section && section.id || "") === anchorId;
      }));
      const candidates = [];
      for (let distance = 1; distance <= 3; distance += 1) {
        const forward = sections[anchorIndex + distance];
        const backward = sections[anchorIndex - distance];
        if (forward && !isDraftSectionLoaded(forward)) candidates.push(forward);
        if (backward && !isDraftSectionLoaded(backward)) candidates.push(backward);
      }
      candidates.forEach(function (section, index) {
        window.setTimeout(function () {
          loadDraftSectionBody(section.id, { silent: true });
        }, 120 * (index + 1));
      });
    }

    function loadDraftSectionBody(sectionId, callbacks) {
      const opts = callbacks || {};
      const field = appState.markdownEditor.field;
      const selected = getProjectByRow(appState.selectedRowNumber);
      const config = getSupabaseProjectMarkdownConfig(field);
      const entity = getSupabaseDocEntityInfo(selected, field);
      const targetSection = (appState.markdownEditor.draftSections || []).find(function (section) {
        return String(section && section.id || "") === String(sectionId || "");
      }) || null;
      if (!targetSection || isDraftSectionLoaded(targetSection)) {
        if (opts.onSuccess) opts.onSuccess(targetSection);
        return;
      }
      const loadKey = String(targetSection.id || targetSection.sectionKey || "");
      if (loadKey && appState.markdownEditor.draftSectionLoads[loadKey]) {
        return;
      }
      if (loadKey) appState.markdownEditor.draftSectionLoads[loadKey] = true;
      updateMarkdownHeadingList({ skipCache: true });
      if (!opts.silent) {
        setStatus("Loading chapter...", "warn");
      }
      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Draft chapter load failed.");
            if (!result.section) throw new Error("Draft chapter load returned no section.");
            if (loadKey) delete appState.markdownEditor.draftSectionLoads[loadKey];
            mergeDraftSectionsIntoState([result.section]);
            normalizeDraftSectionsForChapterModel(sectionId);
            updateMarkdownHeadingList({ skipCache: true });
            if (opts.onSuccess) {
              const refreshed = (appState.markdownEditor.draftSections || []).find(function (section) {
                return String(section && section.id || "") === String(sectionId || "");
              }) || null;
              opts.onSuccess(refreshed);
            }
          } catch (err) {
            if (loadKey) delete appState.markdownEditor.draftSectionLoads[loadKey];
            updateMarkdownHeadingList({ skipCache: true });
            if (!opts.silent) {
              setStatus("Draft chapter load failed: " + err.message, "error");
            }
            if (opts.onFailure) opts.onFailure(err);
          }
        })
        .withFailureHandler(function (error) {
          if (loadKey) delete appState.markdownEditor.draftSectionLoads[loadKey];
          updateMarkdownHeadingList({ skipCache: true });
          if (!opts.silent) {
            setStatus("Draft chapter load failed: " + (error && error.message ? error.message : error), "error");
          }
          if (opts.onFailure) opts.onFailure(error);
        })
        .getSupabaseProjectSectionBodyJsonFromClient(entity && entity.entityId, config && config.docType, String(targetSection.id || targetSection.sectionKey || ""));
    }

    function openDraftSection(sectionId) {
      if (!isSectionedDraftEditor()) return;
      cacheActiveDraftSectionText();
      const targetSection = (appState.markdownEditor.draftSections || []).find(function (section) {
        return String(section && section.id || "") === String(sectionId || "");
      }) || null;
      if (!targetSection) return;
      if (isDraftSectionLoaded(targetSection)) {
        setActiveDraftSection(sectionId);
        scheduleDraftSectionPrefetch(sectionId);
        return;
      }
      el.markdownEditorTextarea.disabled = true;
      loadDraftSectionBody(sectionId, {
        onSuccess: function () {
          el.markdownEditorTextarea.disabled = false;
          setActiveDraftSection(sectionId, { skipCache: true });
          scheduleDraftSectionPrefetch(sectionId);
        },
        onFailure: function () {
          el.markdownEditorTextarea.disabled = false;
        }
      });
    }

    function hydrateAllDraftSectionsBeforeSave(callbacks) {
      const opts = callbacks || {};
      const field = appState.markdownEditor.field;
      const selected = getProjectByRow(appState.selectedRowNumber);
      const config = getSupabaseProjectMarkdownConfig(field);
      const entity = getSupabaseDocEntityInfo(selected, field);
      if (!hasUnloadedDraftSections()) {
        if (opts.onSuccess) opts.onSuccess();
        return;
      }
      setStatus("Loading remaining chapters before save...", "warn");
      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Draft chapter hydration failed.");
            mergeDraftSectionsIntoState(Array.isArray(result.sections) ? result.sections : []);
            normalizeDraftSectionsForChapterModel(appState.markdownEditor.activeDraftSectionId);
            if (opts.onSuccess) opts.onSuccess();
          } catch (err) {
            setStatus("Draft chapter hydration failed: " + err.message, "error");
            if (opts.onFailure) opts.onFailure(err);
          }
        })
        .withFailureHandler(function (error) {
          setStatus("Draft chapter hydration failed: " + (error && error.message ? error.message : error), "error");
          if (opts.onFailure) opts.onFailure(error);
        })
        .getSupabaseProjectAllSectionBodiesJsonFromClient(entity && entity.entityId, config && config.docType);
    }

    function getProjectSummaryCacheKey(project) {
      const rowNumber = Number(project && project.rowNumber || appState.selectedRowNumber || 0);
      return rowNumber ? "project-summary:" + rowNumber : "";
    }

    function isActiveProjectSummaryEditor() {
      return appState.markdownEditor.mode === "doc" && isProjectSummaryMarkdownField(appState.markdownEditor.field);
    }

    function syncProjectSummaryCacheFromDetail(project) {
      const selected = project || getProjectByRow(appState.selectedRowNumber);
      const cacheKey = getProjectSummaryCacheKey(selected);
      if (!cacheKey || !el.detailSummary) return;

      const activeSummary = isActiveProjectSummaryEditor() && appState.markdownEditor.docUrl === cacheKey;
      if (activeSummary && hasUnsavedMarkdownDocChanges()) return;

      const cached = getCachedDoc(cacheKey);
      if (cached && cached.dirty) return;

      setCachedDoc(cacheKey, {
        text: el.detailSummary.value || "",
        title: "Summary",
        dirty: false
      });
    }

    function getEditorialReferenceFieldsForActiveEditor(activeField) {
      const urlKey = String(activeField && activeField.urlKey || "");
      if (urlKey === "dev_edit_doc_url") {
        return EDITORIAL_REFERENCE_FIELDS.filter(function (field) {
          return field.urlKey === "draft_doc_url";
        });
      }
      if (urlKey === "line_edit_doc_url") {
        return EDITORIAL_REFERENCE_FIELDS.filter(function (field) {
          return field.urlKey === "draft_doc_url" || field.urlKey === "dev_edit_doc_url";
        });
      }
      if (urlKey === "copy_edit_doc_url") {
        return EDITORIAL_REFERENCE_FIELDS.filter(function (field) {
          return field.urlKey === "draft_doc_url" || field.urlKey === "dev_edit_doc_url" || field.urlKey === "line_edit_doc_url";
        });
      }
      return [];
    }

    function getReferenceFieldsForActiveEditor(activeField) {
      return getEditorialReferenceFieldsForActiveEditor(activeField).concat(REFERENCE_DOC_FIELDS);
    }

    function getPreferredReferenceFieldForActiveEditor(project, activeField) {
      const urlKey = String(activeField && activeField.urlKey || "");
      let preferredKey = "";
      if (urlKey === "dev_edit_doc_url") preferredKey = "draft_doc_url";
      if (urlKey === "line_edit_doc_url") preferredKey = "dev_edit_doc_url";
      if (urlKey === "copy_edit_doc_url") preferredKey = "line_edit_doc_url";

      const fields = getReferenceFieldsForActiveEditor(activeField);
      if (preferredKey) {
        const preferred = fields.find(function (field) {
          return field.urlKey === preferredKey && (isSupabaseProjectMarkdownField(field) || String(project && project[field.urlKey] || "").trim());
        });
        if (preferred) return preferred;
      }

      return fields.find(function (field) {
        const url = String(project && project[field.urlKey] || "").trim();
        const activeUrl = String(project && activeField && project[activeField.urlKey] || "").trim();
        if (isSupabaseProjectMarkdownField(field)) {
          return !!project;
        }
        return url && url !== activeUrl;
      }) || null;
    }


    function getDocCacheKey(docUrl) {
      return String(docUrl || "").trim();
    }

    function getCachedDoc(docUrl) {
      const key = getDocCacheKey(docUrl);
      return key ? appState.markdownEditor.docCache[key] || null : null;
    }

    function setCachedDoc(docUrl, data) {
      const key = getDocCacheKey(docUrl);
      if (!key) return null;
      const existing = appState.markdownEditor.docCache[key] || {};
      appState.markdownEditor.docCache[key] = Object.assign({}, existing, data || {}, {
        url: key,
        cachedAt: new Date().toISOString()
      });
      return appState.markdownEditor.docCache[key];
    }

    function markDocLoading(docUrl, loading) {
      const cached = setCachedDoc(docUrl, { loading: !!loading });
      if (!loading && cached) cached.loading = false;
    }

    function cacheActiveEditorText() {
      if (appState.markdownEditor.mode !== "doc") return;
      if (!appState.markdownEditor.docUrl) return;
      if (isSectionedDraftEditor()) {
        cacheActiveDraftSectionText();
      }
      setCachedDoc(appState.markdownEditor.docUrl, {
        text: isSectionedDraftEditor() ? getCombinedDraftSectionsText() : (el.markdownEditorTextarea.value || ""),
        title: appState.markdownEditor.docLabel || "Supabase Document",
        sections: isSectionedDraftEditor() ? appState.markdownEditor.draftSections.map(function (section) {
          return {
            id: section.id,
            sectionKey: section.sectionKey,
            title: section.title,
            text: section.text,
            wordCount: section.wordCount,
            sortOrder: section.sortOrder
          };
        }) : undefined,
        dirty: hasUnsavedMarkdownDocChanges()
      });
    }

    function addPendingDocLoadCallback(docUrl, callbacks) {
      const opts = callbacks || {};
      if (!opts.onSuccess && !opts.onFailure) return;
      const cached = getCachedDoc(docUrl) || setCachedDoc(docUrl, {});
      cached.pendingCallbacks = Array.isArray(cached.pendingCallbacks) ? cached.pendingCallbacks : [];
      cached.pendingCallbacks.push(opts);
    }

    function flushPendingDocLoadCallbacks(docUrl, isSuccess, cacheOrError, result) {
      const cached = getCachedDoc(docUrl);
      const pending = cached && Array.isArray(cached.pendingCallbacks) ? cached.pendingCallbacks.slice() : [];
      if (cached) cached.pendingCallbacks = [];
      pending.forEach(function (opts) {
        try {
          if (isSuccess && opts.onSuccess) opts.onSuccess(cacheOrError, result);
          if (!isSuccess && opts.onFailure) opts.onFailure(cacheOrError);
        } catch (err) {
          console.warn("Pending Google Doc callback failed", err);
        }
      });
    }

    function loadGoogleDocIntoCache(docUrl, label, callbacks) {
      const opts = callbacks || {};
      if (!docUrl || (!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;
      const cached = getCachedDoc(docUrl);
      if (cached && cached.loading) {
        addPendingDocLoadCallback(docUrl, opts);
        return;
      }
      if (cached && typeof cached.text === "string" && !cached.dirty && !opts.forceReload) {
        if (opts.onSuccess) opts.onSuccess(cached, { ok: true, text: cached.text, title: cached.title || label || "Google Doc", fromCache: true });
        return;
      }
      addPendingDocLoadCallback(docUrl, opts);
      markDocLoading(docUrl, true);
      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Google Doc load failed.");
            const nextCache = setCachedDoc(docUrl, {
              text: result.text || "",
              title: result.title || label || "Google Doc",
              dirty: false,
              loading: false
            });
            flushPendingDocLoadCallbacks(docUrl, true, nextCache, result);
          } catch (err) {
            markDocLoading(docUrl, false);
            flushPendingDocLoadCallbacks(docUrl, false, err);
          }
        })
        .withFailureHandler(function (error) {
          markDocLoading(docUrl, false);
          flushPendingDocLoadCallbacks(docUrl, false, error);
        })
        .getGoogleDocTextJsonFromClient(docUrl);
    }

    function loadSupabaseProjectDocIntoCache(project, field, callbacks) {
      const selected = project || getProjectByRow(appState.selectedRowNumber);
      const config = getSupabaseProjectMarkdownConfig(field);
      const entity = getSupabaseDocEntityInfo(selected, field);
      const opts = callbacks || {};
      if (!selected || !config || !entity) return;
      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;

      const cacheKey = getSupabaseProjectDocCacheKey(entity.entityId, config.docType, entity.scope);
      if (!cacheKey) return;

      const cached = getCachedDoc(cacheKey);
      if (cached && cached.loading) {
        addPendingDocLoadCallback(cacheKey, opts);
        return;
      }
      const canUseDraftCache = !isSectionedProjectMarkdownField(field)
        || hasUsableDraftSectionCache(cached);
      if (cached && typeof cached.text === "string" && !cached.dirty && !opts.forceReload && canUseDraftCache) {
        if (opts.onSuccess) {
          opts.onSuccess(cached, {
            ok: true,
            text: cached.text,
            title: cached.title || config.label,
            fromCache: true
          });
        }
        return;
      }

      addPendingDocLoadCallback(cacheKey, opts);
      markDocLoading(cacheKey, true);
      const runner = supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Supabase document load failed.");
            const sectionedText = Array.isArray(result.sections)
              ? result.sections.map(function (section) {
                  return String(section && (section.text || section.markdown_content) || "").trim();
                }).filter(function (text) {
                  return text !== "";
                }).join("\n\n")
              : "";
            const nextCache = setCachedDoc(cacheKey, {
              text: sectionedText || result.text || "",
              title: result.title || config.label,
              sections: Array.isArray(result.sections) ? result.sections : [],
              dirty: false,
              loading: false
            });
            flushPendingDocLoadCallbacks(cacheKey, true, nextCache, result);
          } catch (err) {
            markDocLoading(cacheKey, false);
            flushPendingDocLoadCallbacks(cacheKey, false, err);
          }
        })
        .withFailureHandler(function (error) {
          markDocLoading(cacheKey, false);
          flushPendingDocLoadCallbacks(cacheKey, false, error);
        });

      if (entity.scope === "series") {
        runner.getSupabaseSeriesDocumentJsonFromClient(entity.entityId, config.docType);
        return;
      }

      if (isSectionedProjectMarkdownField(field)) {
        runner.getSupabaseProjectSectionDocumentJsonFromClient(entity.entityId, config.docType);
        return;
      }

      runner.getSupabaseProjectDocumentJsonFromClient(entity.entityId, config.docType);
    }

    function preloadProjectDocs(project) {
      if (!project || (!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;
      GOOGLE_DOC_MARKDOWN_FIELDS.forEach(function (field) {
        if (isSupabaseProjectMarkdownField(field)) {
          const config = getSupabaseProjectMarkdownConfig(field);
          const entity = getSupabaseDocEntityInfo(project, field);
          const cacheKey = entity ? getSupabaseProjectDocCacheKey(entity.entityId, config && config.docType, entity.scope) : "";
          if (cacheKey && !getCachedDoc(cacheKey)) {
            loadSupabaseProjectDocIntoCache(project, field);
          }
          return;
        }
        if (!field.urlKey) return;
        const url = String(project[field.urlKey] || "").trim();
        if (!url || getCachedDoc(url)) return;
        loadGoogleDocIntoCache(url, field.label);
      });
    }

    function rememberReferenceDoc(field, cached) {
      if (!field || !cached || typeof cached.text !== "string") return null;
      const referenceText = cached.text || "";
      appState.markdownEditor.referenceDocs[field.key] = {
        field: field,
        text: referenceText,
        title: cached.title || field.label,
        headings: getMarkdownHeadings(referenceText),
        sections: Array.isArray(cached.sections) ? cached.sections : []
      };
      return appState.markdownEditor.referenceDocs[field.key];
    }

    function preloadReferencePanelSelections(project, activeField) {
      if (!project || (!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;
      getReferenceFieldsForActiveEditor(activeField).forEach(function (field) {
        const url = String(project[field.urlKey] || "").trim();
        const activeUrl = String(activeField && project[activeField.urlKey] || "").trim();
        const isSupabaseField = isSupabaseProjectMarkdownField(field);
        if (!isSupabaseField && (!url || (activeUrl && url === activeUrl))) return;

        const cacheKey = isSupabaseField
          ? getSupabaseProjectDocCacheKey(project.rowNumber, getSupabaseProjectMarkdownConfig(field).docType)
          : url;
        const cached = getCachedDoc(cacheKey);
        if (cached && typeof cached.text === "string") {
          rememberReferenceDoc(field, cached);
          return;
        }

        const loader = isSupabaseField ? loadSupabaseProjectDocIntoCache : loadGoogleDocIntoCache;
        loader(isSupabaseField ? project : url, isSupabaseField ? field : field.label, isSupabaseField ? {
          onSuccess: function (nextCache) {
            rememberReferenceDoc(field, nextCache);
            if (appState.markdownEditor.referenceMode === "reference" && appState.markdownEditor.referenceKey === field.key) {
              setReferenceText(field, nextCache.text || "", nextCache.title || field.label);
            }
            renderReferenceTabs();
          }
        } : {
          onSuccess: function (nextCache) {
            const stillSelected = getProjectByRow(appState.selectedRowNumber);
            const stillUrl = String(stillSelected && stillSelected[field.urlKey] || "").trim();
            const currentActiveUrl = String(stillSelected && appState.markdownEditor.field && stillSelected[appState.markdownEditor.field.urlKey] || "").trim();
            if (stillUrl !== url || currentActiveUrl === url) return;
            rememberReferenceDoc(field, nextCache);
            if (appState.markdownEditor.referenceMode === "reference" && appState.markdownEditor.referenceKey === field.key) {
              setReferenceText(field, nextCache.text || "", nextCache.title || field.label);
            }
            renderReferenceTabs();
          }
        });
      });
    }

    function createLinkedDoc(docKey) {
      const payload = getSelectedProjectPayloadForDocCreation();
      if (!payload) return;

      const field = GOOGLE_DOC_MARKDOWN_FIELDS.find(function (item) { return item.key === docKey; });
      const label = field ? field.label : "Linked Doc";
      setStatus("Creating " + label + " doc...", "warn");

      supabaseRunner
        .withSuccessHandler(function (json) {
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Create doc failed.");
            applyCreatedDocResult(docKey, result, payload);
            setStatus(label + " doc created.", "ok");
          } catch (err) {
            console.error("CREATE DOC PARSE ERROR", err, json);
            setStatus("Create doc failed: " + err.message, "error");
          }
        })
        .withFailureHandler(function (error) {
          console.error("CREATE DOC ERROR", error);
          setStatus("Create doc failed: " + (error && error.message ? error.message : error), "error");
        })
        .createLinkedProjectDocJsonFromClient(JSON.stringify(payload), docKey);

    function getSavedImagePickerViewMode() {
      try {
        const saved = localStorage.getItem(IMAGE_PICKER_VIEW_CACHE_KEY);
        return ["list", "small", "large"].indexOf(saved) !== -1 ? saved : "large";
      } catch (err) {
        return "large";

    function persistImagePickerViewMode(mode) {

    function readImagePickerLibraryCache() {
      try {
        const raw = localStorage.getItem(IMAGE_PICKER_LIBRARY_CACHE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || !Array.isArray(parsed.files)) return null;
        return {
          files: parsed.files,
          lastLoadedAt: Number(parsed.lastLoadedAt || 0) || 0
        };
      } catch (err) {
        console.warn("Image picker library cache could not be read", err);
        return null;
      }
    }

    function persistImagePickerLibraryCache(files, lastLoadedAt) {
      try {
        localStorage.setItem(IMAGE_PICKER_LIBRARY_CACHE_KEY, JSON.stringify({
          files: Array.isArray(files) ? files : [],
          lastLoadedAt: Number(lastLoadedAt || Date.now()) || Date.now()
        }));
      } catch (err) {
        console.warn("Image picker library cache could not be saved", err);
      }
    }

    function hydrateImagePickerLibraryFromCache() {
      const cached = readImagePickerLibraryCache();
      if (!cached || !cached.files || !cached.files.length) return false;
      appState.imagePicker.files = cached.files.slice();
      appState.imagePicker.lastLoadedAt = Number(cached.lastLoadedAt || 0) || 0;

    function getDriveImageThumbnailUrl(file) {

      return id ? "https://drive.google.com/thumbnail?id=" + encodeURIComponent(id) + "&sz=w1000" : "";
    }

    function findImagePickerFileByUrl(imageUrl) {
      const safeUrl = normalizeImageUrl(imageUrl || "") || String(imageUrl || "").trim();
      if (!safeUrl) return null;
      return (appState.imagePicker.files || []).find(function (file) {
        return getImageIdentityKeys(file && file.url, file && file.legacyDriveUrl).indexOf(safeUrl) !== -1;
      }) || null;
    }

    function persistImageGeneratorSettingsForAsset(fileRecord) {
      if (!fileRecord || !fileRecord.id) return;
      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return;
      const settings = fileRecord.generatorSettings && typeof fileRecord.generatorSettings === "object"
        ? fileRecord.generatorSettings
        : captureImageGeneratorSettings();
      supabaseRunner
        .withSuccessHandler(function () {})
        .withFailureHandler(function (error) {
          console.warn("IMAGE GENERATOR SETTINGS PERSIST FAILED", error);
        })
        .updateImageAssetGeneratorSettingsJsonFromClient(fileRecord.id, JSON.stringify(settings));
    }

    function backfillLegacyImageGeneratorSettingsToAssets(files) {
      if (!Array.isArray(files) || !files.length) return 0;
      if ((!sbClient && (typeof google === "undefined" || !google.script || !google.script.run))) return 0;
      const store = readImageGeneratorSettingsStore();
      const legacyImages = store && store.images && typeof store.images === "object" ? store.images : {};
      let queued = 0;

      files.forEach(function (fileRecord) {
        if (!fileRecord || !fileRecord.id) return;
        if (fileRecord.generatorSettings && typeof fileRecord.generatorSettings === "object" && Object.keys(fileRecord.generatorSettings).length) return;
        const identityKeys = getImageIdentityKeys(fileRecord.url, fileRecord.legacyDriveUrl);
        let matchedSettings = null;
        for (let i = 0; i < identityKeys.length; i += 1) {
          const key = identityKeys[i];
          if (legacyImages[key] && typeof legacyImages[key] === "object") {
            matchedSettings = legacyImages[key];
            break;
          }
        }
        if (!matchedSettings) return;
        fileRecord.generatorSettings = Object.assign({}, matchedSettings);
        queued += 1;
        persistImageGeneratorSettingsForAsset(fileRecord);
      });

      return queued;
    }

    function getUsedImageUrlsSet() {
      const used = {};
      (appState.projects || []).forEach(function (project) {
        [project && project.image, project && project.series_image].forEach(function (value) {
          const safe = normalizeImageUrl(value || "");
          if (safe) used[safe] = true;
        });
      });
      return used;
    }

    function ensureImagePickerThumbObserver() {
      if (appState.imagePicker.thumbObserver || typeof IntersectionObserver === "undefined") return appState.imagePicker.thumbObserver || null;
      appState.imagePicker.thumbObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          const src = String(img.getAttribute("data-src") || "").trim();
          if (src && !img.getAttribute("src")) {
            img.setAttribute("src", src);
          }
          appState.imagePicker.thumbObserver.unobserve(img);
        });
      }, {
        root: el.imagePickerGrid || null,
        rootMargin: "80px 0px",
        threshold: 0.01
      });
      return appState.imagePicker.thumbObserver;
    }

    function primeImagePickerThumb(img, thumbUrl) {
      if (!img) return;
      const safeUrl = String(thumbUrl || "").trim();
      img.setAttribute("loading", "lazy");
      img.setAttribute("decoding", "async");
      img.classList.add("is-thumb-loading");
      img.addEventListener("load", function handleLoad() {
        img.classList.remove("is-thumb-loading");
        img.classList.add("is-thumb-ready");
        if (safeUrl) appState.imagePicker.loadedThumbs[safeUrl] = true;
        img.removeEventListener("load", handleLoad);
      });
      img.addEventListener("error", function handleError() {
        img.classList.remove("is-thumb-loading");
        img.classList.add("is-thumb-error");
        img.removeEventListener("error", handleError);
      });

      if (!safeUrl) return;

      if (appState.imagePicker.loadedThumbs[safeUrl]) {
        img.setAttribute("src", safeUrl);
        return;
      }

      img.setAttribute("data-src", safeUrl);
      const observer = ensureImagePickerThumbObserver();
      if (observer) {
        observer.observe(img);
      } else {
        img.setAttribute("src", safeUrl);
      }
    }

    function syncImagePickerSelectionState() {
      if (!el.imagePickerGrid) return;
      const selectedUrl = normalizeImageUrl(appState.imagePicker.selectedUrl || "") || String(appState.imagePicker.selectedUrl || "").trim();
      el.imagePickerGrid.querySelectorAll(".image-choice[data-image-url]").forEach(function (button) {
        button.classList.toggle("is-selected", String(button.getAttribute("data-image-url") || "").trim() === selectedUrl);
      });
    }

    function renderImagePickerGrid() {
      if (!el.imagePickerGrid) return;
      const files = appState.imagePicker.files || [];
      const mode = appState.imagePicker.viewMode || "large";
      const fileToken = files.map(function (f) { return String(f.url || f.id || ""); }).join(",");
      appState.imagePicker._lastFileToken = appState.imagePicker._lastFileToken || "";
      const filesChanged = fileToken !== appState.imagePicker._lastFileToken;
      appState.imagePicker._lastFileToken = fileToken;

      el.imagePickerGrid.className = "image-picker-grid view-" + mode;

      if (appState.imagePicker.isLoading) {
        el.imagePickerGrid.innerHTML = "<div class='image-picker-empty tiny'>Loading images...</div>";
        return;
      }

      if (!files.length) {
        el.imagePickerGrid.innerHTML = "<div class='image-picker-empty tiny'>No images are stored in the project image library yet.</div>";
        return;
      }

      if (!filesChanged && el.imagePickerGrid.querySelectorAll(".image-choice").length === files.length) {
        // Files unchanged and DOM count matches â€” CSS handles all layout via className.
        // Only skip rebuild if DOM structure is compatible (list mode has .image-choice-copy).
        var firstButton = el.imagePickerGrid.querySelector(".image-choice");
        var hasCopySection = firstButton && firstButton.querySelector(".image-choice-copy");
        var needsCopySection = mode === "list";
        if (hasCopySection === needsCopySection) {
          return;
        }
      }

      const usedImageUrls = getUsedImageUrlsSet();
      el.imagePickerGrid.innerHTML = "";

      function createImageChoiceButton(file) {
        const url = String(file.url || "").trim();
        const normalizedUrl = normalizeImageUrl(url) || url;
        const identityKeys = getImageIdentityKeys(file.url, file.legacyDriveUrl);
        const thumb = String(file.thumbnailUrl || getDriveImageThumbnailUrl(file) || url).trim();
        const name = String(file.name || "Untitled image");
        const button = document.createElement("button");
        button.type = "button";
        button.className = "image-choice" + (identityKeys.indexOf(normalizeImageUrl(appState.imagePicker.selectedUrl || "") || String(appState.imagePicker.selectedUrl || "").trim()) !== -1 ? " is-selected" : "");
        button.setAttribute("data-image-url", normalizedUrl);
        if (identityKeys.some(function (key) { return !!usedImageUrls[key]; })) button.classList.add("is-in-use");
        const thumbWrap = document.createElement("div");
        thumbWrap.className = "image-choice-thumb";
        const img = document.createElement("img");
        img.alt = name;
        primeImagePickerThumb(img, thumb);
        thumbWrap.appendChild(img);

        if (mode === "list") {
          const copy = document.createElement("div");
          copy.className = "image-choice-copy";
          const title = document.createElement("div");
          title.className = "image-choice-name";
          title.textContent = name;
          const urlLine = document.createElement("div");
          urlLine.className = "image-choice-url tiny";
          urlLine.textContent = url || "No URL";
          copy.appendChild(title);
          copy.appendChild(urlLine);
          button.appendChild(thumbWrap);
          button.appendChild(copy);
        } else {
          const title = document.createElement("div");
          title.className = "image-choice-name";
          title.textContent = name;
          button.appendChild(thumbWrap);
          button.appendChild(title);
        }

        button.addEventListener("click", function () {
          appState.imagePicker.selectedUrl = normalizedUrl;
          syncImagePickerSelectionState();
        });
        return button;
      }

      if (files.length <= 100) {
        // Small-to-moderate count: render synchronously
        var frag = document.createDocumentFragment();
        for (var i = 0; i < files.length; i++) {
          frag.appendChild(createImageChoiceButton(files[i]));
        }
        el.imagePickerGrid.appendChild(frag);
      } else {
        // Large count: yield once before building to keep UI responsive
        window.requestAnimationFrame(function () {
          if (!el.imagePickerGrid) return;
          var frag = document.createDocumentFragment();
          for (var i = 0; i < files.length; i++) {
            frag.appendChild(createImageChoiceButton(files[i]));
          }
          el.imagePickerGrid.appendChild(frag);
        });
      }
    }

    function loadDriveImages(forceRefresh) {
      if (appState.imagePicker.isLoading && !forceRefresh) return;
      const hasCachedFiles = Array.isArray(appState.imagePicker.files) && appState.imagePicker.files.length > 0;
      const showBlockingLoader = !hasCachedFiles || !!forceRefresh;
      appState.imagePicker.isLoading = true;
      if (showBlockingLoader) {
        setImagePickerStatus("Loading images from the library...", "warn");
        renderImagePickerGrid();
      } else {
        setImagePickerStatus("Refreshing cached library images...", "warn");
      }

      supabaseRunner
        .withSuccessHandler(function (json) {
          appState.imagePicker.isLoading = false;
          try {
            const result = parseServerResult(json);
            if (result.ok === false) throw new Error(result.error || "Load images failed.");
            appState.imagePicker.files = Array.isArray(result.files) ? result.files : [];
            const backfilledCount = backfillLegacyImageGeneratorSettingsToAssets(appState.imagePicker.files);
            appState.imagePicker.lastLoadedAt = Date.now();
            persistImagePickerLibraryCache(appState.imagePicker.files, appState.imagePicker.lastLoadedAt);
            setImagePickerStatus(
              appState.imagePicker.files.length + " image" + (appState.imagePicker.files.length === 1 ? "" : "s") + " available." +
              (backfilledCount ? " Backfilled " + backfilledCount + " saved style set" + (backfilledCount === 1 ? "" : "s") + "." : ""),
              "ok"
            );
            renderImagePickerGrid();
          } catch (err) {
            console.error("IMAGE LIST PARSE ERROR", err, json);
            setImagePickerStatus("Load images failed: " + err.message, "error");
            if (showBlockingLoader) renderImagePickerGrid();
          }
        })
        .withFailureHandler(function (error) {
          appState.imagePicker.isLoading = false;
          console.error("IMAGE LIST ERROR", error);
          setImagePickerStatus("Load images failed: " + (error && error.message ? error.message : error), "error");
          if (showBlockingLoader) renderImagePickerGrid();
        })
        .listProjectImagesJsonFromClient(PROJECT_IMAGE_FOLDER_ID);
    }

    function applySelectedImageUrl(url) {
      const imageUrl = String(url || appState.imagePicker.selectedUrl || "").trim();
      if (!imageUrl) {
        setImagePickerStatus("Select an image first.", "error");
        return;
      }
      const mode = getDetailImageMode();
      const activeInput = getDetailImageInputByMode(mode);
      if (!activeInput) return;
      activeInput.value = imageUrl;
      if (mode === "series") {
        updateDetailSeriesImage(imageUrl, el.detailSeries.value || el.detailTitleInput.value);
        handleSeriesOwnedFieldInput();
        closeImagePickerModal();
        saveSeriesImage(imageUrl);
